<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>B13 · Imagens de Produtos</title>
<style>
:root{--bg:#0a0920;--card:#12103a;--border:#2a2660;--mag:#FF0082;--ind:#262366;--text:#e8e4ff;--muted:#9a95c9}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}
header{background:var(--ind);padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:2px solid var(--mag);position:sticky;top:0;z-index:10}
header img{height:32px}
header h1{font-size:16px;font-weight:900;color:#fff;flex:1}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:12px;transition:.15s}
.btn-mag{background:var(--mag);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-grn{background:#1a6b3a;color:#a8f0c8;border:1px solid #2f9e6b}
.btn-sm{padding:4px 10px;font-size:11px}
.wrap{max-width:1200px;margin:0 auto;padding:20px}

.progress-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.progress-title{font-weight:900;font-size:14px;margin-bottom:10px;display:flex;justify-content:space-between}
.progress-bar-bg{background:#0f0d24;border-radius:99px;height:8px;overflow:hidden;margin-bottom:6px}
.progress-bar-fill{background:linear-gradient(90deg,var(--ind),var(--mag));height:100%;border-radius:99px;transition:width .3s}
.progress-info{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
.progress-produto{font-size:10px;color:#514c96;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pstats{display:flex;gap:20px;margin-top:10px}
.pstat b{font-size:18px;font-weight:900;display:block}
.pstat span{font-size:10px;color:var(--muted)}

.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-bar input{background:#0f0d24;border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:#fff;font-size:13px;flex:1;min-width:180px}
.filter-bar select{background:#0f0d24;border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:#fff;font-size:13px}

/* Card de produto com imagens inline */
.prod-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.prod-info{min-width:200px;flex:1}
.prod-nome{font-weight:700;font-size:13px;margin-bottom:2px}
.prod-cat{font-size:11px;color:var(--muted)}
.prod-cod{font-size:10px;color:#514c96;margin-top:2px}
.prod-imgs{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.img-opt{position:relative;cursor:pointer;border-radius:6px;overflow:hidden;border:2px solid var(--border);transition:.15s;width:64px;height:64px;background:#fff;flex-shrink:0}
.img-opt:hover{border-color:#9090ff}
.img-opt.sel{border-color:var(--mag);box-shadow:0 0 0 2px #FF008444}
.img-opt img{width:100%;height:100%;object-fit:contain;padding:2px}
.img-opt .ck{display:none;position:absolute;inset:0;background:#FF008866;align-items:center;justify-content:center;font-size:18px}
.img-opt.sel .ck{display:flex}
.imgs-loading{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;padding:8px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--mag);border-radius:50%;animation:spin 1s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.prod-actions{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0}
.saved-tag{background:#1a6b3a;color:#a8f0c8;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700}
.no-imgs{font-size:11px;color:#514c96;padding:8px}

.loading{text-align:center;padding:40px;color:var(--muted)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#514c96;border-radius:3px}
</style>
</head>
<body>
<header>
  <img src="/logo" onerror="this.style.display='none'">
  <h1>📷 Gerenciador de Imagens</h1>
  <button class="btn btn-ghost btn-sm" onclick="location.href='/operacional'">← Voltar</button>
</header>
<div class="wrap">
  <div class="progress-box" id="progressBox">
    <div class="progress-title">
      <span id="progressTitulo">🔍 Verificando produtos no Bling…</span>
      <span id="progressPct" style="color:var(--mag);font-size:12px">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <div class="progress-info">
      <span id="progressLabel">Iniciando…</span>
      <span id="progressNum"></span>
    </div>
    <div class="progress-produto" id="progressProduto"></div>
    <div class="pstats">
      <div class="pstat"><b class="mag" id="pSemFoto" style="color:var(--mag)">0</b><span>Sem foto</span></div>
      <div class="pstat"><b id="pSalvos" style="color:#a8f0c8">0</b><span>Salvos</span></div>
      <div class="pstat"><b id="pTotal" style="color:#cfc9f5">0</b><span>Verificados</span></div>
    </div>
  </div>

  <div class="filter-bar" id="filterBar" style="display:none">
    <input id="busca" placeholder="🔎 Filtrar por nome..." oninput="filtrar()">
    <select id="filtroCat" onchange="filtrar()"><option value="">Todas as categorias</option></select>
  </div>
  <div id="lista"></div>
</div>

<script>
const B=window.location.origin;
let produtos=[], salvos={}, selecionados={};
let pagAtual=0; const POR_PAG=20;

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function carregar(){
  const ev=new EventSource(B+"/api/imagens/sem-foto/progresso");
  ev.onmessage=function(e){
    const d=JSON.parse(e.data);
    if(d.tipo==="total"){
      document.getElementById("pTotal").textContent=d.total;
      document.getElementById("progressNum").textContent="0 / "+d.total;
    }
    else if(d.tipo==="progresso"){
      const pct=Math.round((d.atual/d.total)*100);
      document.getElementById("progressBar").style.width=pct+"%";
      document.getElementById("progressPct").textContent=pct+"%";
      document.getElementById("progressLabel").textContent="Verificando "+d.atual+" de "+d.total;
      document.getElementById("progressNum").textContent=d.atual+" / "+d.total;
      document.getElementById("progressProduto").textContent=d.nome||"";
      document.getElementById("pTotal").textContent=d.atual;
    }
    else if(d.tipo==="sem_foto"){
      produtos.push(d.item);
      document.getElementById("pSemFoto").textContent=produtos.length;
      const cats=[...new Set(produtos.map(p=>p.categoria).filter(Boolean))];
      const sel=document.getElementById("filtroCat");
      const vals=[...sel.options].map(o=>o.value);
      cats.forEach(c=>{ if(!vals.includes(c)){ const o=document.createElement("option"); o.value=o.textContent=c; sel.appendChild(o); }});
      document.getElementById("filterBar").style.display="flex";
      // só adiciona card se está na primeira página
      if(produtos.length<=POR_PAG) adicionarCard(d.item);
      // atualiza navegação
      renderPaginacao();
    }
    else if(d.tipo==="fim"){
      ev.close();
      document.getElementById("progressBar").style.width="100%";
      document.getElementById("progressPct").textContent="100%";
      document.getElementById("progressTitulo").textContent=`✅ Concluído — ${produtos.length} produto(s) sem foto`;
      document.getElementById("progressLabel").textContent="Concluído!";
      document.getElementById("progressProduto").textContent="";
      if(!produtos.length) document.getElementById("lista").innerHTML='<div class="loading">🎉 Todos os produtos têm imagem!</div>';
    }
    else if(d.tipo==="erro"){
      ev.close();
      document.getElementById("progressTitulo").textContent="❌ Erro: "+d.msg;
    }
  };
  ev.onerror=function(){ ev.close(); document.getElementById("progressLabel").textContent="Conexão interrompida. Recarregue a página."; };
}

// Fila de busca para não sobrecarregar
const filaBusca=[];
let buscandoAtual=false;

function enfileirarBusca(id, nome){
  filaBusca.push({id,nome});
  if(!buscandoAtual) processarFila();
}

async function processarFila(){
  if(!filaBusca.length){ buscandoAtual=false; return; }
  buscandoAtual=true;
  const {id,nome}=filaBusca.shift();
  await buscarImagens(id,nome);
  await new Promise(r=>setTimeout(r,800)); // delay entre buscas
  processarFila();
}

function adicionarCard(prod){
  const div=document.createElement("div");
  div.className="prod-row";
  div.id="row_"+prod.id;
  div.innerHTML=`
    <div class="prod-info">
      <div class="prod-nome">${esc(prod.nome)}</div>
      <div class="prod-cat">${esc(prod.categoria||"—")}</div>
      <div class="prod-cod">ID: ${prod.id} · Cód: ${esc(prod.codigo||"—")}</div>
    </div>
    <div class="prod-imgs" id="imgs_${prod.id}">
      <div class="imgs-loading" style="color:#514c96;font-size:10px">⏳ aguardando…</div>
    </div>
    <div class="prod-actions" id="act_${prod.id}">
      <button class="btn btn-ghost btn-sm" onclick="buscarImagens('${prod.id}','${esc(prod.nome)}')">🔄 Rebuscar</button>
    </div>`;
  document.getElementById("lista").appendChild(div);
  enfileirarBusca(prod.id, prod.nome);
}

async function buscarImagens(id, nome){
  const cont=document.getElementById("imgs_"+id);
  if(!cont) return;
  cont.innerHTML=`<div class="imgs-loading"><span class="spinner"></span>Buscando…</div>`;
  try{
    const r=await fetch(B+"/api/imagens/buscar?nome="+encodeURIComponent(nome));
    const j=await r.json();
    const imgs=(j.data||[]).filter(Boolean).slice(0,4);
    if(!imgs.length){
      cont.innerHTML=`<div class="no-imgs">Nenhuma imagem encontrada</div>
        <a href="https://www.google.com/search?tbm=isch&q=${encodeURIComponent(nome+' supermercado')}" target="_blank"
          style="font-size:10px;color:#9090ff;white-space:nowrap">🔍 Google</a>`;
      return;
    }
    cont.innerHTML=imgs.map((url,i)=>`
      <div class="img-opt" id="opt_${id}_${i}" onclick="selecionar('${id}',${i},'${url.replace(/'/g,"\\'")}')">
        <img src="${url}" onerror="this.parentElement.style.display='none'" loading="lazy">
        <div class="ck">✓</div>
      </div>`).join("")+
      `<a href="https://www.google.com/search?tbm=isch&q=${encodeURIComponent(nome+' supermercado')}" target="_blank"
        title="Ver mais no Google" style="font-size:16px;text-decoration:none;padding:4px">🔍</a>`;
  }catch(e){
    cont.innerHTML=`<div class="no-imgs">Erro ao buscar</div>`;
  }
}

function selecionar(prodId, idx, url){
  // deseleciona outros do mesmo produto
  document.querySelectorAll(`[id^="opt_${prodId}_"]`).forEach(el=>el.classList.remove("sel"));
  document.getElementById(`opt_${prodId}_${idx}`).classList.add("sel");
  selecionados[prodId]=url;
  // mostra botão salvar
  const act=document.getElementById("act_"+prodId);
  act.innerHTML=`
    <button class="btn btn-grn" onclick="salvar('${prodId}')">✅ Salvar</button>
    <button class="btn btn-ghost btn-sm" onclick="buscarImagens('${prodId}','${esc(produtos.find(p=>p.id==prodId)?.nome||"")}')">🔄</button>`;
}

async function salvar(prodId){
  const url=selecionados[prodId];
  const prod=produtos.find(p=>p.id==prodId);
  if(!url||!prod) return;
  // Copia URL e abre Bling — API v3 não suporta salvar imagens externas
  await navigator.clipboard.writeText(url).catch(()=>{});
  window.open(`https://www.bling.com.br/cadastros/produtos/${prod.id}/imagens`,"_blank");
  const act=document.getElementById("act_"+prodId);
  act.innerHTML=`<div style="background:#1a1040;border:1px solid #514c96;border-radius:6px;padding:6px 8px;font-size:10px;color:#cfc9f5;max-width:180px">
    ✅ URL copiada!<br>Cole no Bling que abriu.<br>
    <button class="btn btn-ghost btn-sm" style="margin-top:4px;font-size:10px" onclick="marcarSalvo('${prodId}')">✓ Já colei no Bling</button>
  </div>`;
}

function marcarSalvo(prodId){
  const url=selecionados[prodId];
  salvos[prodId]=url||true;
  document.getElementById("pSalvos").textContent=Object.keys(salvos).length;
  document.getElementById("pSemFoto").textContent=produtos.filter(p=>!salvos[p.id]).length;
  const row=document.getElementById("row_"+prodId);
  if(row){ row.style.opacity=".4"; row.style.pointerEvents="none"; }
  const act=document.getElementById("act_"+prodId);
  act.innerHTML=`<span class="saved-tag">✓ Salvo</span>`;
}

function filtrar(){
  pagAtual=0;
  renderPagina();
}

function renderPagina(){
  const q=document.getElementById("busca").value.toLowerCase();
  const cat=document.getElementById("filtroCat").value;
  const filtrados=produtos.filter(p=>(!q||p.nome.toLowerCase().includes(q))&&(!cat||p.categoria===cat));
  const inicio=pagAtual*POR_PAG;
  const pag=filtrados.slice(inicio,inicio+POR_PAG);
  const lista=document.getElementById("lista");
  lista.innerHTML="";
  pag.forEach(p=>adicionarCard(p));
  renderPaginacao(filtrados.length);
}

function renderPaginacao(total){
  const q=document.getElementById("busca").value.toLowerCase();
  const cat=document.getElementById("filtroCat").value;
  const filtrados=total!==undefined?total:produtos.filter(p=>(!q||p.nome.toLowerCase().includes(q))&&(!cat||p.categoria===cat)).length;
  const totalPags=Math.ceil(filtrados/POR_PAG);
  let nav=document.getElementById("navPag");
  if(!nav){
    nav=document.createElement("div");
    nav.id="navPag";
    nav.style.cssText="display:flex;gap:8px;align-items:center;justify-content:center;padding:16px;flex-wrap:wrap";
    document.getElementById("lista").after(nav);
  }
  if(totalPags<=1){ nav.innerHTML=""; return; }
  const inicio=pagAtual*POR_PAG+1;
  const fim=Math.min((pagAtual+1)*POR_PAG,filtrados);
  nav.innerHTML=`
    <button class="btn btn-ghost btn-sm" onclick="irPag(${pagAtual-1})" ${pagAtual===0?"disabled":""}>← Anterior</button>
    <span style="font-size:12px;color:var(--muted)">${inicio}–${fim} de ${filtrados}</span>
    <button class="btn btn-ghost btn-sm" onclick="irPag(${pagAtual+1})" ${pagAtual>=totalPags-1?"disabled":""}>Próxima →</button>`;
}

function irPag(p){
  const q=document.getElementById("busca").value.toLowerCase();
  const cat=document.getElementById("filtroCat").value;
  const filtrados=produtos.filter(x=>(!q||x.nome.toLowerCase().includes(q))&&(!cat||x.categoria===cat));
  const totalPags=Math.ceil(filtrados.length/POR_PAG);
  if(p<0||p>=totalPags) return;
  pagAtual=p;
  renderPagina();
  window.scrollTo(0,0);
}

carregar();
</script>
</body>
</html>
