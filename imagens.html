<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>B13 · Imagens de Produtos</title>
<style>
:root{--bg:#0a0920;--card:#12103a;--border:#2a2660;--mag:#FF0082;--ind:#262366;--text:#e8e4ff;--muted:#9a95c9}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}
header{background:var(--ind);padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:2px solid var(--mag);position:sticky;top:0;z-index:10}
header img{height:32px}
header h1{font-size:16px;font-weight:900;color:#fff;flex:1}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px;transition:.15s}
.btn-mag{background:var(--mag);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-grn{background:#1a6b3a;color:#a8f0c8;border:1px solid #2f9e6b}
.btn-sm{padding:5px 10px;font-size:11px}
.wrap{max-width:1100px;margin:0 auto;padding:20px}

/* Progresso */
.progress-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:20px}
.progress-title{font-weight:900;font-size:15px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.progress-bar-bg{background:#0f0d24;border-radius:99px;height:10px;overflow:hidden;margin-bottom:8px}
.progress-bar-fill{background:linear-gradient(90deg,var(--ind),var(--mag));height:100%;border-radius:99px;transition:width .3s}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
.progress-produto{font-size:11px;color:#514c96;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.progress-stats{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap}
.pstat{text-align:center}
.pstat b{display:block;font-size:20px;font-weight:900}
.pstat b.mag{color:var(--mag)} .pstat b.grn{color:#a8f0c8} .pstat span{font-size:11px;color:var(--muted)}

.stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 18px;text-align:center;min-width:120px}
.stat b{display:block;font-size:24px;font-weight:900;color:var(--mag)}
.stat span{font-size:12px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:.2s}
.card:hover{border-color:#514c96}
.card-img{width:100%;height:150px;background:#0f0d24;display:flex;align-items:center;justify-content:center;position:relative}
.card-img img{max-width:100%;max-height:100%;object-fit:contain}
.card-body{padding:12px}
.card-nome{font-weight:700;font-size:13px;margin-bottom:4px;line-height:1.3}
.card-cat{font-size:11px;color:var(--muted);margin-bottom:8px}
.saved-badge{background:#1a6b3a;color:#a8f0c8;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;position:absolute;top:6px;right:6px}
.modal{display:none;position:fixed;inset:0;background:#000b;z-index:100;align-items:center;justify-content:center;padding:16px}
.modal.open{display:flex}
.mbox{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:820px;max-height:90vh;display:flex;flex-direction:column}
.mhead{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}
.mhead h2{font-size:15px;font-weight:900;flex:1}
.mbody{flex:1;overflow-y:auto;padding:16px}
.mfoot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap}
.fontes{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.fonte-card{background:#0f0d24;border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.fonte-nome{font-size:11px;font-weight:700;margin-bottom:8px}
.fonte-img{width:100%;height:110px;object-fit:contain;background:#fff;border-radius:6px;padding:4px;cursor:pointer;border:2px solid transparent;transition:.15s}
.fonte-img:hover{border-color:var(--mag)}
.fonte-img.sel{border-color:var(--mag);box-shadow:0 0 0 2px #FF008455}
.fonte-status{font-size:10px;margin-top:6px;color:var(--muted)}
.fonte-link{font-size:10px;margin-top:4px}
.fonte-link a{color:#9090ff;text-decoration:none}
.url-row{display:flex;gap:8px;margin-top:12px}
.url-row input{flex:1;background:#0f0d24;border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:#fff;font-size:13px}
.loading{text-align:center;padding:30px;color:var(--muted);font-size:13px}
.spinner{display:inline-block;width:18px;height:18px;border:3px solid var(--border);border-top-color:var(--mag);border-radius:50%;animation:spin 1s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:#ff8090;font-size:12px;margin-top:6px}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-bar input{background:#0f0d24;border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:#fff;font-size:13px;flex:1;min-width:180px}
.filter-bar select{background:#0f0d24;border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:#fff;font-size:13px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#514c96;border-radius:3px}
</style>
</head>
<body>
<header>
  <img src="/logo" onerror="this.style.display='none'">
  <h1>📷 Gerenciador de Imagens</h1>
  <button class="btn btn-ghost btn-sm" onclick="location.href='/operacional'">← Voltar</button>
</header>
<div class="wrap">
  <!-- Barra de progresso -->
  <div class="progress-box" id="progressBox">
    <div class="progress-title">
      <span id="progressTitulo">🔍 Verificando produtos no Bling…</span>
      <span id="progressPct" style="color:var(--mag);font-size:13px">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <div class="progress-info">
      <span id="progressLabel">Iniciando…</span>
      <span id="progressNum"></span>
    </div>
    <div class="progress-produto" id="progressProduto"></div>
    <div class="progress-stats" id="progressStats" style="display:none">
      <div class="pstat"><b class="mag" id="pSemFoto">0</b><span>Sem foto</span></div>
      <div class="pstat"><b class="grn" id="pSalvos">0</b><span>Salvos agora</span></div>
      <div class="pstat"><b id="pTotal" style="color:#cfc9f5">0</b><span>Verificados</span></div>
    </div>
  </div>

  <div class="filter-bar" id="filterBar" style="display:none">
    <input id="busca" placeholder="🔎 Filtrar por nome..." oninput="filtrar()">
    <select id="filtroCat" onchange="filtrar()"><option value="">Todas as categorias</option></select>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="modal" id="modal">
  <div class="mbox">
    <div class="mhead">
      <h2 id="mTitulo">Escolher imagem</h2>
      <button class="btn btn-ghost btn-sm" onclick="fecharModal()">✕</button>
    </div>
    <div class="mbody" id="mBody"></div>
    <div class="mfoot">
      <button class="btn btn-grn" id="btnSalvar" onclick="salvarImagem()" disabled>✅ Salvar imagem selecionada</button>
      <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
      <div id="erroSalvar" class="err" style="width:100%"></div>
    </div>
  </div>
</div>

<script>
const B=window.location.origin;
let produtos=[], salvos={}, prodAtual=null, urlSelecionada=null;

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function carregar(){
  const evtSource=new EventSource(B+"/api/imagens/sem-foto/progresso");

  evtSource.onmessage=function(e){
    const d=JSON.parse(e.data);

    if(d.tipo==="total"){
      document.getElementById("progressStats").style.display="flex";
      document.getElementById("pTotal").textContent=d.total;
      document.getElementById("progressNum").textContent=`0 / ${d.total}`;
    }
    else if(d.tipo==="progresso"){
      const pct=Math.round((d.atual/d.total)*100);
      document.getElementById("progressBar").style.width=pct+"%";
      document.getElementById("progressPct").textContent=pct+"%";
      document.getElementById("progressLabel").textContent=`Verificando produto ${d.atual} de ${d.total}`;
      document.getElementById("progressNum").textContent=`${d.atual} / ${d.total}`;
      document.getElementById("progressProduto").textContent=d.nome||"";
      document.getElementById("pTotal").textContent=d.atual;
    }
    else if(d.tipo==="sem_foto"){
      produtos.push(d.item);
      document.getElementById("pSemFoto").textContent=produtos.length;
      // adiciona card em tempo real
      const cats=[...new Set(produtos.map(p=>p.categoria).filter(Boolean))];
      const sel=document.getElementById("filtroCat");
      const vals=[...sel.options].map(o=>o.value);
      cats.forEach(c=>{ if(!vals.includes(c)){ const o=document.createElement("option"); o.value=o.textContent=c; sel.appendChild(o); }});
      document.getElementById("filterBar").style.display="flex";
      filtrar();
    }
    else if(d.tipo==="fim"){
      evtSource.close();
      document.getElementById("progressBar").style.width="100%";
      document.getElementById("progressPct").textContent="100%";
      document.getElementById("progressTitulo").textContent=`✅ Verificação concluída — ${produtos.length} produto(s) sem foto`;
      document.getElementById("progressLabel").textContent="Concluído!";
      document.getElementById("progressProduto").textContent="";
      if(!produtos.length){
        document.getElementById("grid").innerHTML='<div class="loading">🎉 Todos os produtos têm imagem!</div>';
      }
    }
    else if(d.tipo==="erro"){
      evtSource.close();
      document.getElementById("progressTitulo").textContent="❌ Erro: "+d.msg;
    }
  };

  evtSource.onerror=function(){
    evtSource.close();
    document.getElementById("progressLabel").textContent="Conexão interrompida. Recarregue a página.";
  };
}

function filtrar(){
  const q=document.getElementById("busca").value.toLowerCase();
  const cat=document.getElementById("filtroCat").value;
  const lista=produtos.filter(p=>(!q||p.nome.toLowerCase().includes(q))&&(!cat||p.categoria===cat));
  if(!lista.length){ document.getElementById("grid").innerHTML=''; return; }
  document.getElementById("grid").innerHTML=lista.map(p=>{
    const ok=salvos[p.id];
    return `<div class="card">
      <div class="card-img">
        ${ok?`<img src="${ok}" onerror="this.remove()"><span class="saved-badge">✓ Salvo</span>`:'<span style="font-size:36px;opacity:.2">📷</span>'}
      </div>
      <div class="card-body">
        <div class="card-nome">${esc(p.nome)}</div>
        <div class="card-cat">${esc(p.categoria||"—")}</div>
        <div style="font-size:10px;color:#514c96;margin-bottom:8px">ID: ${p.id||"—"} · Cód: ${p.codigo||"—"}</div>
        <button class="btn btn-mag btn-sm" style="width:100%" onclick='abrirModal(${JSON.stringify(p)})'>🔍 Buscar imagem</button>
      </div>
    </div>`;
  }).join("");
}

async function abrirModal(prod){
  prodAtual=prod; urlSelecionada=null;
  document.getElementById("btnSalvar").disabled=true;
  document.getElementById("erroSalvar").textContent="";
  document.getElementById("mTitulo").textContent=prod.nome;
  document.getElementById("modal").classList.add("open");

  const q=encodeURIComponent(prod.nome);
  const buscaLinks=[
    {nome:"🟠 Apoio Entrega", cor:"#e8650a", url:`https://www.apoioentrega.com/busca?q=${q}`},
    {nome:"🟢 Verdemar",      cor:"#2e7d32", url:`https://www.loja.verdemaratevoce.com.br/produtos?q=${q}`},
    {nome:"🔵 Villefort",     cor:"#1565c0", url:`https://www.villefortentrega.com.br/produtos?q=${q}`},
    {nome:"🔍 Google Imagens",cor:"#9090ff", url:`https://www.google.com/search?tbm=isch&q=${q}+bebida+embalagem`},
  ];

  renderModal(prod, buscaLinks);
}


function renderModal(prod, buscaLinks){
  document.getElementById("mBody").innerHTML=`
    <div style="background:#1a1040;border:1px solid #514c96;border-radius:10px;padding:12px;margin-bottom:14px;font-size:12px;line-height:1.6">
      <div style="font-weight:700;margin-bottom:6px">Como adicionar a imagem:</div>
      <ol style="padding-left:16px;color:var(--muted)">
        <li>Clique em um dos links abaixo para abrir o site</li>
        <li>Encontre o produto e <b style="color:#fff">clique com botão direito na imagem</b></li>
        <li>Selecione <b style="color:#fff">"Copiar endereço da imagem"</b></li>
        <li>Cole no campo abaixo e clique em Salvar</li>
      </ol>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
      ${buscaLinks.map(l=>`
        <a href="${l.url}" target="_blank" style="display:flex;align-items:center;justify-content:center;padding:10px;background:#0f0d24;border:1px solid ${l.cor};border-radius:8px;color:${l.cor};font-size:12px;text-decoration:none;font-weight:700;gap:6px;text-align:center">
          ${l.nome}
        </a>`).join("")}
    </div>
    <div style="font-size:12px;font-weight:700;margin-bottom:6px;color:var(--muted)">📋 Cole a URL da imagem aqui:</div>
    <div class="url-row">
      <input id="urlCustom" placeholder="https://..." type="url"
        oninput="urlSelecionada=this.value;document.getElementById('btnSalvar').disabled=!this.value.trim()">
      <button class="btn btn-ghost btn-sm" onclick="previewUrl()">👁 Preview</button>
    </div>
    <div id="preview" style="margin-top:10px"></div>
    <div id="erroSalvar2" class="err"></div>`;
}


function selecionarUrl(url,el){
  document.querySelectorAll(".fonte-img.sel").forEach(e=>e.classList.remove("sel"));
  el.classList.add("sel");
  urlSelecionada=url;
  document.getElementById("urlCustom").value=url;
  document.getElementById("btnSalvar").disabled=false;
}

function previewUrl(){
  const url=document.getElementById("urlCustom").value.trim();
  if(!url) return;
  urlSelecionada=url;
  document.getElementById("btnSalvar").disabled=false;
  document.getElementById("preview").innerHTML=`<div style="background:#0f0d24;border-radius:8px;padding:8px;display:inline-block;border:2px solid var(--mag)">
    <img src="${url}" style="max-width:150px;max-height:120px;object-fit:contain"
      onerror="document.getElementById('preview').innerHTML='<span class=err>Imagem não carregou</span>'">
  </div>`;
}

async function salvarImagem(){
  if(!urlSelecionada||!prodAtual) return;
  document.getElementById("btnSalvar").disabled=true;
  document.getElementById("erroSalvar").textContent="";
  try{
    const r=await fetch(B+"/api/imagens/salvar",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({produtoId:prodAtual.id,imagemUrl:urlSelecionada})});
    const j=await r.json();
    if(r.ok&&!j.erro){
      salvos[prodAtual.id]=urlSelecionada;
      document.getElementById("pSalvos").textContent=Object.keys(salvos).length;
      // remove da lista
      produtos=produtos.filter(p=>p.id!==prodAtual.id);
      document.getElementById("pSemFoto").textContent=produtos.length;
      fecharModal();
      filtrar();
    } else {
      document.getElementById("erroSalvar").textContent="Erro: "+(j.erro||"Não foi possível salvar");
      document.getElementById("btnSalvar").disabled=false;
    }
  }catch(e){
    document.getElementById("erroSalvar").textContent="Erro de conexão";
    document.getElementById("btnSalvar").disabled=false;
  }
}

function fecharModal(){
  document.getElementById("modal").classList.remove("open");
  prodAtual=null; urlSelecionada=null;
}

carregar();
</script>
</body>
</html>
