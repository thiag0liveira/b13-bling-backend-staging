<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>B13 Bebidas — Ofertas</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
  body{background:#181542;color:#fff;overflow:hidden;height:100vh}
  #fundo{position:fixed;inset:0;z-index:0;overflow:hidden;
    background-color:#181542;
    background-image:
      linear-gradient(180deg,rgba(12,10,36,.55) 0%,rgba(24,21,66,.30) 35%,rgba(24,21,66,.40) 100%),
      url('/loja-fundo'),
      linear-gradient(160deg,#2b2870 0%,#181542 55%,#0c0a24 100%);
    background-size:cover,contain,cover;
    background-position:center,center top,center;
    background-repeat:no-repeat,no-repeat,no-repeat}
  #fundo .topoEscuro{position:absolute;top:0;left:0;right:0;height:30%;background:linear-gradient(180deg,#0c0a24 0%,rgba(12,10,36,.7) 60%,transparent 100%)}
  #fundo .baixoEscuro{position:absolute;bottom:0;left:0;right:0;height:32%;background:linear-gradient(0deg,#0c0a24 0%,rgba(12,10,36,.75) 55%,transparent 100%)}
  #fundo .brilho{position:absolute;border-radius:50%;filter:blur(60px);opacity:.45}
  #fundo .b1{width:340px;height:340px;background:#FF0082;top:-80px;left:-80px;animation:flutuar 14s ease-in-out infinite}
  #fundo .b2{width:420px;height:420px;background:#6228d7;bottom:-140px;right:-100px;animation:flutuar 18s ease-in-out infinite reverse}
  #fundo .b3{width:260px;height:260px;background:#00c8ff;top:40%;left:45%;opacity:.15;animation:flutuar 22s ease-in-out infinite}
  @keyframes flutuar{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-25px)}}
  #fundo .grao{position:absolute;inset:0;opacity:.05;background-image:
    radial-gradient(rgba(255,255,255,.9) 1px,transparent 1px);
    background-size:3px 3px}
  #fundo .vinheta{position:absolute;inset:0;box-shadow:inset 0 0 220px 60px rgba(0,0,0,.65)}
  #app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;padding:18px 26px}

  .topo{background:linear-gradient(90deg,#FF0082,#ff4fa8);border-radius:18px;padding:10px 26px;display:flex;align-items:center;gap:18px;box-shadow:0 10px 30px rgba(255,0,130,.4);flex:0 0 auto}
  .topo .logoBox{background:#000;border-radius:12px;padding:6px 10px;display:flex;align-items:center;box-shadow:0 4px 12px rgba(0,0,0,.35);border:2px solid rgba(255,255,255,.15)}
  .topo img{height:38px;display:block;border-radius:4px}
  .topo .txt{font-weight:900;font-size:20px;line-height:1.2}
  .topo .zap{display:flex;align-items:center;gap:8px;margin-left:auto;font-weight:900;font-size:24px;background:rgba(0,0,0,.15);padding:6px 18px;border-radius:12px}

  .titulo{text-align:center;margin:18px 0 10px;flex:0 0 auto}
  .titulo .l1{font-size:46px;font-weight:900;color:#fff;letter-spacing:1px;text-shadow:0 4px 0 #0c0a24,0 6px 18px rgba(0,0,0,.5)}
  .titulo .l2{font-size:54px;font-weight:900;color:#FF0082;letter-spacing:1px;text-shadow:0 4px 0 #6b0038,0 8px 24px rgba(255,0,130,.5);margin-top:-6px}

  #grid{flex:1 1 auto;min-height:0;position:relative;display:flex;align-items:center;justify-content:center}
  .grupo{position:absolute;width:100%;display:grid;grid-template-columns:repeat(4,1fr);gap:16px;opacity:0;transition:opacity 1s ease-in-out;align-content:center}
  .grupo.ativo{opacity:1;position:relative}
  .card{position:relative;background:linear-gradient(160deg,#252158,#1a1748);border-radius:18px;padding:3px;
    box-shadow:0 14px 34px rgba(0,0,0,.45),0 0 0 1px rgba(255,0,130,.15);isolation:isolate;align-self:start}
  .card::before{content:"";position:absolute;inset:0;border-radius:18px;padding:2px;
    background:linear-gradient(135deg,#FF0082,#6228d7,#00c8ff,#FF0082);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;opacity:.55;z-index:-1}
  .card .inner{display:flex;flex-direction:column;align-items:center;padding:10px;border-radius:15px}
  .card .nomeTag{background:linear-gradient(90deg,#FF0082,#ff4fa8);color:#fff;font-weight:900;font-size:13px;text-align:center;
    border-radius:9px;padding:6px 10px;margin-bottom:8px;width:100%;box-shadow:0 4px 12px rgba(255,0,130,.35);letter-spacing:.3px}
  .card .imgBox{width:100%;background:radial-gradient(circle at 50% 30%,#ffffff,#f0eefc);border-radius:12px;padding:8px;margin-bottom:10px;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.04),0 4px 10px rgba(0,0,0,.15)}
  .card img{width:100%;height:112px;object-fit:contain;display:block}
  .card .precoTag{background:#0f0d2e;border:2px solid #FF0082;color:#fff;font-weight:900;font-size:23px;border-radius:9px;
    padding:5px 14px;text-align:center;width:100%;box-shadow:0 4px 14px rgba(255,0,130,.25)}
  .card .precoTag small{color:#ffd23f;font-size:14px;font-weight:800}

  .rodape{flex:0 0 auto;text-align:center;font-size:13px;color:#cfc9f5;display:flex;flex-direction:column;gap:2px;
    border:1.5px solid rgba(255,0,130,.55);border-radius:14px;padding:10px 20px;margin-top:12px;
    background:rgba(12,10,36,.55);box-shadow:0 6px 20px rgba(0,0,0,.35)}
  .rodape b{color:#fff}
</style>
</head>
<body>
<div id="fundo">
  <div class="topoEscuro"></div>
  <div class="baixoEscuro"></div>
  <div class="brilho b1"></div>
  <div class="brilho b2"></div>
  <div class="brilho b3"></div>
  <div class="grao"></div>
  <div class="vinheta"></div>
</div>
<div id="app">
  <div class="topo">
    <div class="logoBox"><img src="/logo-ofertas"></div>
    <div class="txt">ATACADO: ENTRE EM CONTATO CONOSCO</div>
    <div class="zap">💬 (31) 9971-9888</div>
  </div>
  <div class="titulo">
    <img src="/logo-ofertas" style="height:90px;mix-blend-mode:screen;display:block;margin:0 auto 6px">
    <div class="l1">OFERTAS</div>
    <div class="l2">IMPERDÍVEIS</div>
  </div>
  <div id="grid"></div>
  <div class="rodape">
    <div><b>Av. Brigadeiro Eduardo Gomes, 1668 — Glória, BH</b> · 📷 @b13_bebidas · 💬 31 9971-9888</div>
    <div>*Beba com moderação. Venda proibida para menores de 18 anos.*</div>
  </div>
</div>
<button id="btnExportar" onclick="exportarImagem()" style="position:fixed;bottom:14px;right:14px;z-index:5;background:#FF0082;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-weight:900;font-size:13px;cursor:pointer;box-shadow:0 8px 20px rgba(255,0,130,.4)">📷 Exportar imagem</button>

<script>
const BACKEND=(location.protocol.indexOf("http")===0)?"":"https://b13-bling-backend-production.up.railway.app";
function brl(n){ return (Number(n)||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"}); }
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

let PRODUTOS=[];
async function carregarProdutos(){
  try{
    const j=await fetch(BACKEND+"/api/catalogo").then(r=>r.json());
    const todos=[];
    (j.categorias||[]).forEach(c=>{
      (c.produtos||[]).forEach(p=>{
        const imagem=p.imagem||(p.sabores||[]).find(s=>s.imagem)?.imagem;
        if(imagem&&p.preco>0) todos.push({nome:p.nome,preco:p.preco,imagem});
      });
    });
    PRODUTOS=todos;
  }catch(e){ PRODUTOS=[]; }
}

function cardHtml(p){
  return `<div class="card"><div class="inner">
    <div class="nomeTag">${esc((p.nome||"").toUpperCase())}</div>
    <div class="imgBox"><img src="${esc(p.imagem)}" onerror="this.style.display='none'"></div>
    <div class="precoTag">R$ ${brl(p.preco).replace("R$","").trim()}<br><small>/un</small></div>
  </div></div>`;
}

let _grupoAtivo=0;
function montarGrupos(){
  const grid=document.getElementById("grid");
  if(!PRODUTOS.length){ grid.innerHTML=`<div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;color:#9a95c9;font-size:20px">Carregando ofertas…</div>`; return; }
  // embaralha e divide em grupos de 8
  const lista=[...PRODUTOS];
  for(let i=lista.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [lista[i],lista[j]]=[lista[j],lista[i]]; }
  const grupos=[];
  for(let i=0;i<lista.length;i+=8) grupos.push(lista.slice(i,i+8));
  grid.innerHTML=grupos.map((g,i)=>`<div class="grupo ${i===0?'ativo':''}" data-i="${i}">${g.map(cardHtml).join("")}</div>`).join("");
  _grupoAtivo=0;
  if(grupos.length>1){
    setInterval(()=>{
      const els=document.querySelectorAll(".grupo");
      if(!els.length) return;
      const prox=(_grupoAtivo+1)%els.length;
      els[_grupoAtivo].classList.remove("ativo");
      els[prox].classList.add("ativo");
      _grupoAtivo=prox;
    },9000);
  }
}

async function iniciar(){
  await carregarProdutos();
  montarGrupos();
}
iniciar();
// atualiza a lista de produtos a cada 10 minutos (preço/estoque podem mudar)
setInterval(async()=>{ await carregarProdutos(); }, 10*60*1000);

function exportarImagem(){
  const btn=document.getElementById("btnExportar");
  btn.style.display="none";
  html2canvas(document.getElementById("app"),{backgroundColor:"#181542",scale:2,useCORS:true}).then(canvas=>{
    btn.style.display="block";
    const a=document.createElement("a");
    a.download="b13_ofertas.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
  }).catch(()=>{ btn.style.display="block"; });
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
