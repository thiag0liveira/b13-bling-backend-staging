<style>
  *{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;margin:0;padding:0}
  :root{--indigo:#262366;--mag:#FF0082;--bg:#0f0d24;--card:#151233;--border:#2c2660}
  body{background:var(--bg);color:#fff;min-height:100vh}
  #app{max-width:1100px;margin:0 auto}
  .top{background:linear-gradient(180deg,#2b2870,var(--indigo));border-bottom:3px solid var(--mag);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
  .top img{height:36px}.top .t{font-weight:900;font-size:15px}.top .sp{flex:1}
  .btn{border:none;border-radius:9px;font-weight:800;cursor:pointer;font-size:13px;padding:9px 14px;color:#fff;touch-action:manipulation}
  .btn-mag{background:var(--mag)}.btn-out{background:transparent;border:2px solid #514c96}
  .btn-ghost{background:#1c1846}.btn-grn{background:#2f9e6b}.btn-red{background:#c0392b}
  .btn-blue{background:#0065f9}.btn-yellow{background:#b8860b}
  .btn:disabled{opacity:.4}
  /* login */
  .login{max-width:380px;margin:12vh auto;text-align:center;padding:16px}
  .login input{width:100%;padding:13px;border-radius:10px;border:2px solid #514c96;background:var(--card);color:#fff;font-size:16px;margin-bottom:10px}
  .login input:focus{outline:none;border-color:var(--mag)}
  /* cards de pedido */
  .lista{padding:12px}
  .pcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
  .pcard.acrescimo{border-color:#ff8c00}
  .pcard.urgente{border-color:var(--mag)}
  .ph{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
  .ph .info{flex:1}
  .pn{font-weight:900;font-size:15px}
  .pc{color:#9a95c9;font-size:12px;margin-top:2px}
  .ptot{color:#ffd23f;font-weight:800;font-size:14px;margin-top:2px}
  .badge{display:inline-block;font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;color:#000;margin-right:4px}
  .pag-info{background:#183a2a;border:1px solid #2f9e6b;border-radius:8px;padding:8px 10px;font-size:12px;margin-bottom:8px}
  .pag-pend{background:#3a2030;border:1px solid #e5563f;border-radius:8px;padding:8px 10px;font-size:12px;margin-bottom:8px;color:#ffbfce}
  .acr-box{background:#ff8c0015;border:1px solid #ff8c00;border-radius:8px;padding:8px 10px;font-size:12px;margin-bottom:8px}
  .acts{display:flex;gap:8px;flex-wrap:wrap}
  .acts .btn{flex:1;min-width:120px}
  .muted{color:#9a95c9;font-size:12px}
  .ok{background:#183a2a;color:#a8f0c8;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;margin:8px 0}
  .err{background:#3a2030;color:#ffbfce;border-radius:8px;padding:8px 12px;font-size:13px;margin:8px 0}
  /* modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0}
  @media(min-width:600px){.modal{align-items:center;padding:16px}}
  .mbox{background:#1c1846;border:1px solid #3a357f;border-radius:14px 14px 0 0;width:100%;max-width:560px;max-height:90vh;overflow:auto;padding:18px}
  @media(min-width:600px){.mbox{border-radius:14px}}
  .mbox h3{margin-bottom:12px}
  .mbox input,.mbox select{width:100%;padding:11px;border-radius:9px;border:1px solid #514c96;background:#0f0d24;color:#fff;font-size:14px;margin-bottom:10px}
  .mbox input:focus,.mbox select:focus{outline:none;border-color:var(--mag)}
  .mbox .lbl{font-size:11px;color:#9a95c9;margin-bottom:3px}
  /* conferência */
  .item-conf{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
  .item-conf.ok-item{border-color:#2f9e6b;background:#183a2a20}
  .item-conf img{width:44px;height:44px;object-fit:contain;background:#fff;border-radius:6px;flex-shrink:0}
  .item-conf .iinfo{flex:1}
  .item-conf .inome{font-weight:700;font-size:13px}
  .item-conf .iqtd{font-size:11px;color:#9a95c9}
  /* kanban */
  .kanban{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;padding:12px;align-items:start}
  .kcol{background:#0d0b1e;border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
  .kcol-head{padding:10px 12px;font-weight:900;font-size:13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:#0d0b1e;position:sticky;top:0}
  .kcol-head .cnt{background:var(--mag);color:#fff;border-radius:999px;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;padding:0 5px}
  .kcol-body{padding:8px;overflow-y:auto;max-height:calc(100vh - 130px);flex:1}
  .refresh-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:#0d0b1e;border-bottom:1px solid var(--border);font-size:11px;color:#9a95c9}
  .dot{width:7px;height:7px;border-radius:50%;background:#2f9e6b;display:inline-block;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @media(max-width:600px){.kanban{grid-template-columns:1fr}}

<script>
const B=location.protocol.indexOf("http")===0?"":"https://b13-bling-backend-production.up.railway.app";
const LOGO="/logo";
const brl=v=>Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const esc=s=>(s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const dataBR=d=>{if(!d)return"";const p=String(d).slice(0,10).split("-");return p.length===3?`${p[2]}/${p[1]}`:d;};

// IDs de status (carregados do backend)
let SIT={AGUARDANDO:818795,EM_SEP:817963,SEP_PEND:819227,SEPARADO:821590,CONF_ENTREGA:821611,VERIFICADO:24,EM_ROTA:820085,ATENDIDO:9};
let FUNC=null, pedidos=[], pags={}, acrs={}, seps={}, formasPag=[], mapSit={}, timer=null;
try{ if(typeof b13GetSession==="function"){ const sess=b13GetSession(); if(sess) FUNC=sess; } }catch(e){}

// permissões por nível
const PODE=(acao)=>{
  if(!FUNC) return false;
  const n=FUNC.permissoes||[FUNC.nivel];
  const mapa={
    receber_pagamento:["financeiro_atacado","admin"],
    enviar_separacao:["financeiro_atacado","vendedor","gerente","admin"],
    ver_aguardando:["financeiro_atacado","vendedor","gerente","admin"],
    ver_separacao:["expedicao","gerente","admin"],
    ver_separado:["conferente","gerente","admin"],
    ver_pend:["conferente","gerente","admin"],
    conferir:["conferente","gerente","admin"],
    editar_pedido:["gerente","admin"],
  };
  return (mapa[acao]||[]).some(x=>n.includes(x));
};

async function login(){
  const senha=document.getElementById("pwInp").value;
  try{
    const r=await fetch(B+"/api/funcionarios/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({login:document.getElementById("loginInp")?.value?.trim()||"",senha})});
    const j=await r.json();
    if(r.ok&&j.ok){
      FUNC=j.funcionario;
      try{if(typeof b13SetSession==="function") b13SetSession(FUNC);}catch(e){}
      iniciar();
    } else { document.getElementById("pwErr").textContent=j.erro||"Senha incorreta."; }
  }catch(e){ document.getElementById("pwErr").textContent="Erro de conexão."; }
}
function sair(){ FUNC=null; if(typeof b13ClearSession==="function") b13ClearSession(); if(timer)clearInterval(timer); location.href="/login"; }

async function iniciar(){
  // carrega status e formas de pagamento
  try{
    const [rSit,rFp,rSitFluxo]=await Promise.all([
      fetch(B+"/api/situacoes?modulo=98310").then(r=>r.json()),
      fetch(B+"/api/formas-pagamento").then(r=>r.json()),
      fetch(B+"/api/fluxo/status").then(r=>r.json()),
    ]);
    mapSit={}; (rSit.data||[]).forEach(s=>mapSit[s.id]={nome:s.nome,cor:s.cor||"#cbcbcb"});
    formasPag=rFp.data||[];
    if(rSitFluxo.sit) SIT=rSitFluxo.sit;
  }catch(e){}
  await carregar();
  if(timer) clearInterval(timer);
  timer=setInterval(carregar,10000);
}

async function carregar(){
  try{
    if(!window._logsCache) window._logsCache={};
    const sits=[SIT.AGUARDANDO,SIT.EM_SEP,SIT.SEP_PEND,SIT.SEPARADO,SIT.CONF_ENTREGA,SIT.EM_ROTA,SIT.ATENDIDO].filter(Boolean).join(",");
    const [rPed,rPag,rAcr,rSep,rPend]=await Promise.all([
      fetch(B+"/api/pedidos?limite=100&idsSituacoes="+sits).then(r=>r.json()),
      fetch(B+"/api/pagamentos").then(r=>r.json()),
      fetch(B+"/api/acrescimos").then(r=>r.json()),
      fetch(B+"/api/separacoes").then(r=>r.json()),
      fetch(B+"/api/pendencias").then(r=>r.json()),
    ]);
    pedidos=rPed.data||[];
    pags=rPag.data||{};
    // carrega logs dos pedidos Em Separação em background (para saber origem)
    pedidos.filter(p=>p.situacao?.id===SIT.EM_SEP).forEach(p=>{
      if(!window._logsCache[String(p.id)]){
        fetch(B+"/api/log/"+p.id).then(r=>r.json()).then(j=>{ window._logsCache[String(p.id)]=j.data||[]; }).catch(()=>{});
      }
    });
    const acrsArr=rAcr.data||[]; acrs={}; acrsArr.filter(a=>a.status==="pendente").forEach(a=>acrs[String(a.pedidoId)]=a);
    seps=rSep.data||{};
    const pendArr=rPend.data||[]; window._pends={}; pendArr.filter(x=>x.status==="pendente").forEach(x=>window._pends[String(x.pedidoId)]=x);
  }catch(e){}
  render();
}

function render(){
  const app=document.getElementById("app");
  const top=`<div class="top"><img src="${LOGO}">
    <div class="t">${FUNC?`B13 · ${esc(FUNC.nome)}`:"Operacional B13"}</div><div class="sp"></div>
    ${FUNC?`<a href="/gerenciamento" class="btn btn-out" style="text-decoration:none;font-size:12px">📊 Gestão</a>
    <button class="btn btn-ghost" onclick="sair()">Sair</button>`:""}
  </div>`;

  if(!FUNC){
    app.innerHTML=top+`<div class="login">
      <div style="font-size:52px;margin-bottom:10px">🏭</div>
      <h2 style="margin-bottom:6px">Painel Operacional</h2>
      <p class="muted" style="margin-bottom:16px">Entre com sua senha pessoal</p>
      <input id="loginInp" placeholder="Seu login (usuário)" style="margin-bottom:8px" onkeydown="if(event.key==='Enter')login()">
      <input id="pwInp" type="password" placeholder="Sua senha" onkeydown="if(event.key==='Enter')login()">
      <button class="btn btn-mag" style="width:100%" onclick="login()">Entrar</button>
      <div id="pwErr" class="muted" style="margin-top:8px"></div>
    </div>`; return;
  }

  // monta colunas do kanban conforme permissões
  const colunas=[];
  if(PODE("ver_aguardando")) colunas.push({label:"⏳ Aguardando",cor:"#fbff00",sit:SIT.AGUARDANDO});
  if(PODE("ver_separacao"))  colunas.push({label:"🔄 Em Separação",cor:"#00aaff",sit:SIT.EM_SEP});
  if(PODE("ver_pend"))       colunas.push({label:"⚠️ C/ Pendências",cor:"#d400ff",sit:SIT.SEP_PEND});
  if(PODE("ver_separado")||PODE("conferir")) colunas.push({label:"📦 Separados",cor:"#8e42a3",sit:SIT.SEPARADO});
  if(PODE("conferir")||PODE("editar_pedido")) colunas.push({label:"🚚 Em Rota",cor:"#6d2390",sit:SIT.EM_ROTA});
  if(PODE("editar_pedido"))  colunas.push({label:"✅ Atendidos",cor:"#2f9e6b",sit:SIT.ATENDIDO});

  if(!colunas.length){ app.innerHTML=top+`<div style="padding:30px;text-align:center"><div class="muted">Seu perfil não tem acesso a nenhuma fila.<br>Fale com o administrador.</div></div>`; return; }

  const totalPed=colunas.reduce((s,c)=>s+pedidos.filter(p=>p.situacao?.id===c.sit).length,0);
  const cols=colunas.map(col=>{
    const lista=pedidos.filter(p=>p.situacao?.id===col.sit);
    const cards=lista.length
      ? lista.map(p=>cardPedido(p,col)).join("")
      : `<div class="muted" style="text-align:center;padding:20px;font-size:12px">Nenhum pedido</div>`;
    return `<div class="kcol">
      <div class="kcol-head">
        <span>${col.label}</span>
        <span class="cnt" style="background:${col.cor};color:#000">${lista.length}</span>
      </div>
      <div class="kcol-body">${cards}</div>
    </div>`;
  }).join("");

  app.innerHTML=top+`
    <div class="refresh-bar"><span class="dot"></span> Atualiza a cada 10s · ${totalPed} pedido(s) total</div>
    <div class="kanban">${cols}</div>`;
  document.querySelectorAll(".top img").forEach(i=>i.src=LOGO);
}

function nomeSit(id){ return mapSit[id]?.nome||""; }
function corSit(id){ return mapSit[id]?.cor||"#cbcbcb"; }

function cardPedido(p,aba){
  const idStr=String(p.id);
  const pag=pags[idStr];
  const acr=acrs[idStr];
  const sep=seps[idStr];
  const pago=pag?.statusPagamento==="pago";
  const parcial=pag?.statusPagamento==="parcial";
  const saldo=pag?+(pag.valorPedido||p.total||0)-(pag.valorPago||0):0;

  let pagInfo="";
  if(pago) pagInfo=`<div class="pag-info">✅ Pago — ${brl(pag.valorPago)}</div>`;
  else if(parcial) pagInfo=`<div class="pag-pend">⚠️ Pago parcial ${brl(pag.valorPago)} · falta ${brl(Math.abs(saldo))}</div>`;
  else if(pag?.statusPagamento==="pendente") pagInfo=`<div class="pag-pend">💰 Pagamento pendente</div>`;

  let acrInfo="";
  if(acr) acrInfo=`<div class="acr-box">🆕 ${acr.itensNovos?.length?`<b>Acréscimo:</b> ${acr.itensNovos.map(i=>`+${esc(i.descricao)}`).join(", ")}`:""} ${acr.itensRetirados?.length?`<b>Retirada:</b> ${acr.itensRetirados.map(i=>esc(i.descricao)).join(", ")}`:""}</div>`;
  // pendências da separação
  const pendItem=window._pends&&window._pends[String(p.id)];
  let pendInfo="";
  if(pendItem&&(pendItem.faltas||[]).length){
    pendInfo=`<div style="background:#2a0a1e;border:1px solid #d400ff;border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:12px">
      <div style="font-weight:800;color:#d400ff;margin-bottom:4px">⚠️ Itens com falta:</div>
      ${pendItem.faltas.map(f=>`<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #3a1050">
        <span>${esc(f.descricao)}</span>
        <span style="color:#ff8090">faltou ${f.falta} de ${f.quantidade} un</span>
      </div>`).join("")}
    </div>`;
  }

  const tipoLock={separacao:"🔧",conferencia:"🔍",edicao:"✏️"};
  const tipoNome={separacao:"separando",conferencia:"conferindo",edicao:"editando"};
  let sepInfo=sep?`<span style="font-size:11px;color:#00aaff;background:#0d2a3a;border:1px solid #00aaff;border-radius:5px;padding:2px 7px;display:inline-block;margin-bottom:6px">
    ${tipoLock[sep.tipo]||"🔧"} <b>${esc(sep.funcionarioNome)}</b> ${tipoNome[sep.tipo]||""}</span>`:"";

  const botoes=montarBotoes(p,aba,pago,parcial);

  return `<div class="pcard ${acr?'acrescimo':''}">
    <div class="ph" onclick="verPedido(${p.id})" style="cursor:pointer" title="Clique para ver detalhes">
      <div class="info">
        <div class="pn">Pedido ${esc(p.numero||p.id)} <span class="badge" style="background:${corSit(p.situacao?.id)}">${esc(nomeSit(p.situacao?.id))}</span>
          <span style="font-size:10px;color:#514c96;margin-left:4px">👁</span>
        </div>
        <div class="pc">${esc(p.contato?.nome||"—")} · ${dataBR(p.data)}</div>
        <div class="ptot">${brl(p.total)}</div>
      </div>
    </div>
    ${pagInfo}${pendInfo||""}${acrInfo}${sepInfo}
    <div class="acts">${botoes}</div>
    <div id="msg-${p.id}"></div>
  </div>`;
}

function montarBotoes(p,aba,pago,parcial){
  const id=p.id; const sit=p.situacao?.id;
  // ABA: aguardando
  if(sit===SIT.AGUARDANDO){
    const btnSep=PODE("enviar_separacao")?`<button class="btn btn-blue" onclick="enviarSep(${id},false)">▶ Separar sem pagar</button>`:"";
    const btnPag=PODE("receber_pagamento")?`<button class="btn btn-grn" onclick="abrirPagamento(${id},${p.total})">💰 Receber e Separar</button>`:"";
    const btnEdit=PODE("editar_pedido")?`<button class="btn btn-ghost" onclick="abrirEditar(${id})">✏️ Editar</button>`:"";
    const btnWhats=`<button class="btn btn-ghost" style="background:#075e54" onclick="whatsAguardando(${id})">🟢 WhatsApp</button>`;
    return `<div style="display:flex;gap:6px;flex-wrap:wrap;width:100%">${btnPag}${btnSep}${btnEdit}${btnWhats}</div>`;
  }
  // ABA: em separação
  if(sit===SIT.EM_SEP){
    const sep=seps[String(id)];
    const quem=sep?`<div style="font-size:11px;color:#00aaff;margin-top:4px">🔧 ${esc(sep.funcionarioNome)} separando</div>`:"";
    if(sep) return quem; // travado — não mostra botões
    // descobre origem pelo log
    const logPed=window._logsCache?.[String(id)]||[];
    const veioDepend=logPed.some(e=>e.evento==="separacao_com_falta");
    if(!PODE("editar_pedido")) return quem;
    const btnVoltar=veioDepend
      ?`<button class="btn btn-yellow" onclick="voltarPendencias(${id})">↩ Voltar para pendências</button>`
      :`<button class="btn btn-yellow" onclick="voltarAguardando(${id})">↩ Voltar para aguardando</button>`;
    return btnVoltar+quem;
  }
  // ABA: c/ pendências
  if(sit===SIT.SEP_PEND){
    return `<div style="display:flex;gap:6px;flex-wrap:wrap;width:100%">
      ${PODE("editar_pedido")?`<button class="btn btn-ghost" style="flex:1" onclick="abrirEditar(${id})">🔧 Resolver pendências</button>`:""}
      ${PODE("ver_pend")?`<button class="btn btn-yellow" style="flex:1" onclick="enviarSepNovamente(${id})">↩ Voltar separação</button>`:""}
      ${PODE("ver_pend")?`<button class="btn btn-grn" style="flex:1" onclick="retirarPendenciasESeguir(${id})">✂️ Retirar pendências e confirmar</button>`:""}
    </div>`;
  }
  // ABA: separados — conferente
  if(sit===SIT.SEPARADO && PODE("conferir")){
    return `<button class="btn btn-mag" onclick="abrirConferencia(${id})">🔍 Conferir pedido</button>`;
  }
  // ABA: em rota
  if(sit===SIT.EM_ROTA){
    const pag2=pags[String(id)]; const pago2=pag2?.statusPagamento==="pago";
    return `<div style="display:flex;gap:6px;flex-wrap:wrap;width:100%">
      ${!pago2&&PODE("receber_pagamento")?`<button class="btn btn-grn" onclick="abrirPagamentoRota(${id},${p.total})">💰 Receber pagamento</button>`:""}
      <button class="btn btn-blue" onclick="abrirConfirmarEntrega(${id})">📦 Confirmar entrega</button>
    </div>`;
  }
  // ABA: atendidos
  if(sit===SIT.ATENDIDO){
    return `<div class="muted" style="margin-top:4px;font-size:11px">✅ Entregue</div>`;
  }
  return "";
}

// ---- ações ----
function toggleLog(btn){
  const el=document.getElementById("logCompleto"); if(!el) return;
  const aberto=el.style.display!=="none";
  el.style.display=aberto?"none":"block";
  btn.textContent=aberto?`Ver tudo (${el.children.length})`:"Recolher";
}
// ---- PAGAMENTO EM ROTA ----
function abrirPagamentoRota(id,total){
  _parcelas=[{valor:Number(total).toFixed(2),formaId:formasPag[0]?.id||"",formaNome:formasPag[0]?.nome||"",obs:""}];
  window._pagTotal=Number(total);
  // reutiliza o mesmo modal de pagamento mas sem enviar pra separação
  const opts=formasPag.map(f=>`<option value="${f.id}">${esc(f.nome||f.id)}</option>`).join("");
  const somaParcelas=_parcelas.reduce((s,p)=>s+parseFloat(p.valor||0),0);
  document.getElementById("modal").style.display="flex";
  renderModalPagRota(id,total);
}
function renderModalPagRota(id,total){

        onchange="_parcelas[${ix}].valor=this.value;renderModalPagRota(${id},${total})">

      </select>
      ${_parcelas.length>1?`<button onclick="_parcelas.splice(${ix},1);renderModalPagRota(${id},${total})" style="background:none;border:none;color:#ff8090;cursor:pointer;font-size:18px">✕</button>`:""}
    </div>`).join("");
  document.getElementById("mbox").innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3>💰 Receber Pagamento — Entrega</h3><span style="color:#ffd23f;font-weight:900">${brl(total)}</span></div>
    ${rows}
    <button class="btn btn-ghost" style="width:100%;margin-bottom:10px;font-size:12px"
      onclick="_parcelas.push({valor:'${diff>0?diff.toFixed(2):'0.00'}',formaId:formasPag[0]?.id||'',formaNome:formasPag[0]?.nome||'',obs:''});renderModalPagRota(${id},${total})">
      + Adicionar parcela${diff>0?` (falta ${brl(diff)})`:''}</button>

    <div id="pMsgRota"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-grn" style="flex:1" onclick="confirmarPagRota(${id},${total})">✅ Confirmar pagamento</button>
      <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button></div>`;
}
async function confirmarPagRota(id,total){
  const totalParcelas=+_parcelas.reduce((s,p)=>s+parseFloat(p.valor||0),0).toFixed(2);
  const diff=+(totalParcelas-Number(total)).toFixed(2);
  if(Math.abs(diff)>0.01){ document.getElementById("pMsgRota").innerHTML=`<div class="err">❌ Valor não confere com o total (${brl(totalParcelas)} ≠ ${brl(total)})</div>`; return; }
  document.getElementById("pMsgRota").innerHTML=`<div class="muted">Registrando…</div>`;
  try{
    const r=await fetch(B+"/api/pagamentos/"+id,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({valor:totalParcelas,formaId:_parcelas[0]?.formaId,formaNome:_parcelas[0]?.formaNome,parcelas:_parcelas,funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome})});

    if(r.ok&&j.ok){ fecharModal(); await carregar(); }

}

async function marcarOcorrencia(id,ix,tipo){
  const it=window._entregaPed?.itens?.[ix]; if(!it) return;
  if(tipo==="danificado"){
    // pede foto
    const input=document.createElement("input"); input.type="file"; input.accept="image/*"; input.capture="environment";
    input.onchange=async(e)=>{
      const file=e.target.files[0]; if(!file) return;
      // converte pra base64 (comprimido)
      const canvas=document.createElement("canvas"); const img=new Image();
      const url=URL.createObjectURL(file);
      img.onload=()=>{
        const MAX=800; let w=img.width,h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        canvas.width=w; canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        const foto=canvas.toDataURL("image/jpeg",0.7);
        window._itensOcorrencia=window._itensOcorrencia.filter(o=>o.ix!==ix);
        window._itensOcorrencia.push({ix,tipo:"danificado",descricao:it.descricao||it.produto?.nome||"",quantidade:it.quantidade,valorItem:+(it.valor||0)*it.quantidade,foto});
        renderConfirmarEntrega(id,window._entregaPed,window._entregaPag,window._itensOcorrencia);
      };
      img.src=url;
    };
    input.click();
  } else {
    window._itensOcorrencia=window._itensOcorrencia.filter(o=>o.ix!==ix);
    window._itensOcorrencia.push({ix,tipo:"nao_entregue",descricao:it.descricao||it.produto?.nome||"",quantidade:it.quantidade,valorItem:+(it.valor||0)*it.quantidade});
    renderConfirmarEntrega(id,window._entregaPed,window._entregaPag,window._itensOcorrencia);
  }
}

async function concluirEntrega(id){
  const ped=window._entregaPed; const pag=window._entregaPag;
  const ocorr=window._itensOcorrencia||[];
  // verificar se itens danificados têm foto
  const semFoto=ocorr.filter(o=>o.tipo==="danificado"&&!o.foto);
  if(semFoto.length){ document.getElementById("entregaMsg").innerHTML=`<div class="err">📷 Foto obrigatória para ${semFoto.length} item(ns) danificado(s)</div>`; return; }
  const valorAbatido=+ocorr.reduce((s,o)=>s+(o.valorItem||0),0).toFixed(2);

function selecionarResolucao(btn,tipo){

async function executarRetirarSeguir(id,resolucao,valorAbatido){
  document.getElementById("retMsg").innerHTML=`<div class="muted">Salvando…</div>`;
  const itensFiltrados=window.itensEdit.filter(i=>i.quantidade>0);
  const ped=window.pedidoEditOrig;
  try{
    await fetch(B+"/api/pedidos/"+id+"/itens",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({itens:itensFiltrados.map(i=>({produtoId:i.produtoId,quantidade:i.quantidade,valor:i.valor}))})});
    await fetch(B+"/api/pedidos/"+id+"/situacao",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({idSituacao:SIT.SEPARADO,funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome})});
    await fetch(B+"/api/pendencias/"+id,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:"resolvido"})}).catch(()=>{});
    if(resolucao==="credito"&&valorAbatido>0&&ped?.contato?.id){
      await fetch(B+"/api/fluxo/"+id+"/confirmar-entrega",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome,itensNaoEntregues:[],itensDanificados:[],valorAbatido,resolucao:"credito",clienteId:ped.contato.id,clienteNome:ped.contato.nome})}).catch(()=>{});
    }
    const formaEstorno=resolucao==="estorno"?{formaId:window._estornoFormaId,formaNome:window._estornoFormaNome}:null;
    await fetch(B+"/api/log/"+id,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({evento:"pendencias_retiradas_seguiu",funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome,detalhes:{itensAjustados:itensFiltrados.length,valorAbatido,resolucao,formaEstorno}})}).catch(()=>{});
    fecharModal(); await carregar();
    if(resolucao==="credito") alert(`✅ Pendências retiradas!
💳 Crédito de ${brl(valorAbatido)} registrado para ${ped?.contato?.nome||"o cliente"}.`);
    if(resolucao==="estorno") alert(`✅ Pendências retiradas!
↩ Estorno de ${brl(valorAbatido)} via ${window._estornoFormaNome||""}. Efetue o estorno manualmente.`);
  }catch(e){ document.getElementById("retMsg").innerHTML=`<div class="err">Erro ao salvar</div>`; }
}

async function confirmarPagamento(id){
  const totalParcelas=+_parcelas.reduce((s,p)=>s+parseFloat(p.valor||0),0).toFixed(2);
  const totalPedido=+window._pagTotal;
  const diff=+(totalParcelas-totalPedido).toFixed(2);
  if(!totalParcelas||totalParcelas<=0){ document.getElementById("pMsg").innerHTML=`<div class="err">Informe o valor</div>`; return; }
  if(diff>0.01){ document.getElementById("pMsg").innerHTML=`<div class="err">❌ Valor das parcelas (${brl(totalParcelas)}) é maior que o total do pedido (${brl(totalPedido)}). Corrija antes de confirmar.</div>`; return; }
  if(diff<-0.01){ document.getElementById("pMsg").innerHTML=`<div class="err">❌ Valor das parcelas (${brl(totalParcelas)}) é menor que o total do pedido (${brl(totalPedido)}). Corrija antes de confirmar.</div>`; return; }
  const total=totalParcelas;
  document.getElementById("pMsg").innerHTML=`<div class="muted">Registrando…</div>`;
  try{
    const r=await fetch(B+"/api/fluxo/"+id+"/enviar-separacao",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({funcionarioId:FUNC.id,funcionarioNome:FUNC.nome,pagamento:{valor:total,parcelas:_parcelas,formaId:_parcelas[0]?.formaId,formaNome:_parcelas[0]?.formaNome}})});
    const j=await r.json();
    if(r.ok&&j.ok){ fecharModal(); await carregar(); }
    else document.getElementById("pMsg").innerHTML=`<div class="err">${esc(j.erro||"Erro")}</div>`;
  }catch(e){ document.getElementById("pMsg").innerHTML=`<div class="err">Erro de conexão</div>`; }
}

        <div id="logCompleto" style="display:none">${logItems.slice().reverse().map(l=>{const dt=new Date(l.em);return `<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);font-size:11px"><span>${LBL2[l.evento]||esc(l.evento)}${l.funcionarioNome?` <span style="color:#9a95c9">— ${esc(l.funcionarioNome)}</span>`:""}</span><span style="color:#514c96;white-space:nowrap;margin-left:6px">${dt.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})} ${dt.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}</span></div>`;}).join("")}</div>
      </div>`;
    })()}`;
}

window.retirarItem=function(ix){ window.itensEdit.splice(ix,1); const ped=window.pedidoEditOrig; renderModalEditar(window.pedidoEditId,ped,window.itensEdit,pags[String(window.pedidoEditId)],[],[],window.confLog||[]); };
let _bet;
window.buscarProdEdit=function(term){
  clearTimeout(_bet); const box=document.getElementById("resEdit"); if(!box)return;
  if((term||"").trim().length<2){box.innerHTML="";return;}
  _bet=setTimeout(async()=>{
    try{ const r=await fetch(B+"/api/buscar-atacado?nome="+encodeURIComponent(term.trim())); const j=await r.json(); const lista=j.data||[];
      box.innerHTML=""; lista.forEach(p=>{ const btn=document.createElement("button"); btn.className="btn btn-ghost"; btn.style="display:block;width:100%;text-align:left;margin-top:4px;font-size:12px";
        btn.innerHTML=`${esc(p.nome)} <span class="muted">#${esc(p.codigo)} · ${brl(p.preco)}</span>`;
        btn.addEventListener("click",()=>{ window.itensEdit.push({produtoId:p.id,descricao:p.nome,quantidade:1,valor:p.preco||0,_orig:false}); renderModalEditar(window.pedidoEditId,window.pedidoEditOrig,window.itensEdit,pags[String(window.pedidoEditId)],[],[]); });
        box.appendChild(btn); });
    }catch(e){}
  },400);
};

async function salvarEdicao(){
  const id=window.pedidoEditId;
  document.getElementById("editMsg").innerHTML=`<div class="muted">Salvando…</div>`;
  try{
    const novos=window.itensEdit.filter(i=>!i._orig);
    const retirados=[]; // comparar com original
    const r=await fetch(B+"/api/pedidos/"+id+"/itens",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({itens:window.itensEdit.map(i=>({produtoId:i.produtoId,quantidade:i.quantidade,valor:i.valor}))})});
    const j=await r.json();
    if(r.ok&&!j.erro){
      // se tinha novos ou retirados, registrar acréscimo e voltar pra expedição
      if(novos.length||retirados.length){
        await fetch(B+"/api/fluxo/"+id+"/acrescimo",{method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({pedidoId:id,numero:window.pedidoEditOrig.numero,cliente:window.pedidoEditOrig.contato?.nome||"",itensNovos:novos,itensRetirados:retirados})});
      }
      // liberar lock de edição
      if(window._editLockId && FUNC && !window._editSoVis){
        fetch(B+"/api/separacoes/"+window._editLockId,{method:"DELETE",headers:{"Content-Type":"application/json"},body:JSON.stringify({funcionarioId:FUNC.id,funcionarioNome:FUNC.nome,tipo:"edicao"})}).catch(()=>{});
        if(window._editHeartbeat){clearInterval(window._editHeartbeat);window._editHeartbeat=null;}
        window._editLockId=null;
      }
      fecharModal(); await carregar();
    } else document.getElementById("editMsg").innerHTML=`<div class="err">${esc(j.erro||"Erro")}</div>`;
  }catch(e){ document.getElementById("editMsg").innerHTML=`<div class="err">Erro de conexão</div>`; }
}

// ---- CONFERÊNCIA ----
async function abrirConferencia(id){
  document.getElementById("modal").style.display="flex";
  document.getElementById("mbox").innerHTML=`<div class="muted">Carregando pedido…</div>`;
  try{
    // tenta pegar lock de conferência
    const rLock=await fetch(B+"/api/separacoes",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({pedidoId:id,funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome,tipo:"conferencia"})});
    let confSoVisualizacao=false;
    let lockMsg="";
    if(rLock.status===409){
      const jl=await rLock.json();
      const min=Math.floor((Date.now()-(jl.lock.ultimaAtividade||jl.lock.inicio))/60000);
      lockMsg=`<div style="background:#1c1846;border:1px solid #514c96;border-radius:8px;padding:8px 10px;font-size:12px;margin-bottom:8px">👁 ${esc(jl.lock.funcionarioNome)} está ${jl.lock.tipo==="conferencia"?"conferindo":"trabalhando n"}este pedido (há ${min}min)</div>`;
      confSoVisualizacao=true;
    }
    // heartbeat
    if(window._confHeartbeat) clearInterval(window._confHeartbeat);
    if(!confSoVisualizacao && FUNC) window._confHeartbeat=setInterval(()=>{
      fetch(B+"/api/separacoes/"+id,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({funcionarioId:FUNC.id})}).catch(()=>{});
    },2*60*1000);
    window._confLockId=id; window._confSoVis=confSoVisualizacao;

    const [rPed,rPag,rAcr]=await Promise.all([
      fetch(B+"/api/expedicao/pedido/"+id).then(r=>r.json()),
      fetch(B+"/api/pagamentos/"+id).then(r=>r.json()),
      fetch(B+"/api/acrescimos").then(r=>r.json()),
    ]);
    const itens=rPed.itens||[]; const ped=rPed.pedido||{}; const pag=rPag.data;
    const acr=(rAcr.data||[]).find(a=>String(a.pedidoId)===String(id)&&a.status==="pendente");
    const conf=itens.map(i=>({...i,conferido:false}));
    window._confFoto=null; // limpa foto ao abrir nova conferência
    renderConferencia(id,ped,conf,pag,acr);
  }catch(e){ document.getElementById("mbox").innerHTML=`<div class="err">Erro ao carregar</div>`; }
}

function renderConferencia(id,ped,conf,pag,acr,etapa){
  const total=+(ped.total||0); const pago=+(pag?.valorPago||0); const saldo=+(total-pago).toFixed(2);
  const isPago=pag?.statusPagamento==="pago";
  window.confItems=conf; window.confPed=ped; window.confPag=pag; window.confAcr=acr;
  window.confEtapa=etapa||"itens";
  const feitos=conf.filter(c=>c.conferido).length; const todos=feitos===conf.length;

  let pagBanner="";
  if(isPago) pagBanner=`<div class="pag-info">✅ Pago — ${brl(pago)}</div>`;
  else pagBanner=`<div class="pag-pend" style="background:#3a0010;border-color:#ff0044">🔴 NÃO PAGO — falta ${brl(saldo)}</div>`;

  if(etapa==="destino"){
    // tela de escolha: entrega ou retirada
    document.getElementById("mbox").innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3>✅ Pedido Conferido</h3>
        <button class="btn btn-ghost" onclick="fecharModal()">✕</button></div>
      <div class="muted" style="margin-bottom:10px">Pedido ${esc(ped.numero||id)} — ${esc(ped.contato?.nome||"")}</div>
      ${pagBanner}
      <div style="margin-top:16px;font-weight:800;font-size:14px;margin-bottom:10px">Como será o pedido?</div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-blue" style="flex:1;padding:16px;font-size:15px" onclick="confirmarDestino(${id},'entrega')">
          🚚 ENTREGA${!isPago?`<br><small style="font-size:11px;font-weight:400">sem pagamento ok</small>`:""}
        </button>
        <button class="btn ${isPago?'btn-grn':'btn-red'}" style="flex:1;padding:16px;font-size:15px" onclick="confirmarDestino(${id},'retirada')">
          🏪 RETIRADA${!isPago?`<br><small style="font-size:11px;font-weight:400">⚠️ pagamento obrigatório</small>`:""}
        </button>
      </div>
      <div id="confMsg" style="margin-top:8px"></div>
      <button class="btn btn-ghost" style="width:100%;margin-top:10px;font-size:12px" onclick="renderConferencia(${id},window.confPed,window.confItems,window.confPag,window.confAcr,'itens')">← Voltar aos itens</button>`;
    return;
  }

  // etapa: conferência dos itens
  const rows=conf.map((c,ix)=>`<div class="item-conf ${c.conferido?'ok-item':''}">
    ${c.imagem?`<img src="${esc(c.imagem)}" onerror="this.remove()">`:""}
    <div class="iinfo">
      <div class="inome">${esc(c.descricao)}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:3px">
        <span style="background:#262366;color:#fff;font-size:16px;font-weight:900;padding:2px 10px;border-radius:6px;min-width:44px;text-align:center">${c.quantidade}</span>
        <span style="font-size:11px;color:#9a95c9">un · est ${c.estoque??'?'}</span>
      </div>
    </div>
    <button style="flex-shrink:0;min-width:48px;height:48px;border-radius:10px;border:2px solid ${c.conferido?'#2f9e6b':'#514c96'};background:${c.conferido?'#183a2a':'transparent'};cursor:pointer;font-size:22px;font-weight:900;color:${c.conferido?'#2f9e6b':'#514c96'};transition:.15s" onclick="(()=>{const el=document.querySelector('#mbox .conf-list');const st=el?el.scrollTop:0;window.confItems[${ix}].conferido=!window.confItems[${ix}].conferido;renderConferencia(${id},window.confPed,window.confItems,window.confPag,window.confAcr,'itens');requestAnimationFrame(()=>{const el2=document.querySelector('#mbox .conf-list');if(el2)el2.scrollTop=st;})})()">
      ${c.conferido?'✓':'◯'}</button>
  </div>`).join("");

  const fotoPreview=window._confFoto?`<div style="margin-bottom:8px;border:2px solid #2f9e6b;border-radius:8px;overflow:hidden"><img src="${window._confFoto}" style="width:100%;max-height:120px;object-fit:cover"></div>`:"";
  document.getElementById("mbox").innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h3>🔍 Conferência — Pedido ${esc(ped.numero||id)}</h3>
      <button class="btn btn-ghost" onclick="fecharModal()">✕</button></div>
    ${acr?`<div class="acr-box">🆕 Itens alterados — confira os destaques</div>`:""}
    ${pagBanner}
    <div class="conf-list" style="max-height:38vh;overflow:auto;margin:8px 0">${rows}</div>
    <div style="color:#9a95c9;font-size:12px;margin-bottom:8px">${feitos}/${conf.length} itens conferidos</div>
    <div style="background:#0d0b1e;border:1px dashed #514c96;border-radius:8px;padding:10px;margin-bottom:8px">
      <div style="font-size:12px;color:#9a95c9;margin-bottom:6px">📸 Foto/filmagem do pedido separado (opcional)</div>
      ${fotoPreview}
      <button class="btn btn-ghost" style="width:100%;font-size:12px" onclick="tirarFotoConferencia(${id})">
        ${window._confFoto?'🔄 Trocar foto':'📷 Tirar foto / Anexar'}</button>
    </div>
    <div id="confMsg"></div>
    <button class="btn btn-mag" style="width:100%" ${todos?"":"disabled"}
      onclick="renderConferencia(${id},window.confPed,window.confItems,window.confPag,window.confAcr,'destino')">
      ✅ PEDIDO CONFERIDO →</button>
    <button class="btn btn-ghost" style="width:100%;margin-top:8px" onclick="fecharModal()">Cancelar</button>`;
}

function tirarFotoConferencia(id){
  const input=document.createElement("input"); input.type="file"; input.accept="image/*,video/*"; input.capture="environment";
  input.onchange=async(e)=>{
    const file=e.target.files[0]; if(!file) return;
    if(file.type.startsWith("video/")){
      window._confFoto=URL.createObjectURL(file);
    } else {
      const canvas=document.createElement("canvas"); const img=new Image();
      img.onload=()=>{
        const MAX=1200; let w=img.width,h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        canvas.width=w; canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        window._confFoto=canvas.toDataURL("image/jpeg",0.8);
        renderConferencia(id,window.confPed,window.confItems,window.confPag,window.confAcr,"itens");
      };
      img.src=URL.createObjectURL(file);
      return;
    }
    renderConferencia(id,window.confPed,window.confItems,window.confPag,window.confAcr,"itens");
  };
  input.click();
}

async function confirmarDestino(id,tipo){
  const pag=window.confPag; const isPago=pag?.statusPagamento==="pago";
  const total=+(window.confPed?.total||0); const pago=+(pag?.valorPago||0); const saldo=+(total-pago).toFixed(2);
  if(tipo==="retirada"&&!isPago){
    document.getElementById("confMsg").innerHTML=`<div class="err" style="background:#3a0010;border:1px solid #ff0044">
      🔴 Retirada bloqueada — pagamento pendente (falta ${brl(saldo)})<br>
      <small>O cliente precisa pagar antes de retirar o pedido.</small></div>`;
    return;
  }
  document.getElementById("confMsg").innerHTML=`<div class="muted">Finalizando…</div>`;
  // salvar foto da conferência no log se tiver
  if(window._confFoto&&window._confFoto.startsWith("data:")){
    fetch(B+"/api/log/"+id,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({evento:"foto_conferencia",funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome,detalhes:{foto:window._confFoto.slice(0,100)+"..."}})}).catch(()=>{});
  }
  try{
    const r=await fetch(B+"/api/fluxo/"+id+"/conferido",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome,tipoEntrega:tipo})});
    const j=await r.json();
    if(r.ok&&j.ok){
      fecharModal(); await carregar();
      const msg=tipo==="retirada"?"✅ Pedido liberado para RETIRADA — marcado como VERIFICADO!":
        (j.pago?"✅ Pedido para ENTREGA — marcado como VERIFICADO!":"📦 Pedido para ENTREGA — marcado como CONFERIDO PARA ENTREGA (pagar na entrega).");
      alert(msg);
    } else document.getElementById("confMsg").innerHTML=`<div class="err">${esc(j.erro||"Erro")}</div>`;
  }catch(e){ document.getElementById("confMsg").innerHTML=`<div class="err">Erro de conexão</div>`; }
}

async function concluirConferencia(id){ await confirmarDestino(id,"entrega"); }

// init
document.getElementById("app").innerHTML=`<div class="top"><img src="${LOGO}"></div>`;
if(FUNC) iniciar(); else render();
</script>
