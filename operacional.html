  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0}

  .mbox{background:#1c1846;border:1px solid #3a357f;border-radius:14px 14px 0 0;width:100%;max-width:560px;max-height:90vh;overflow:auto;padding:18px}

  .item-conf{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px}

<script>
const B=location.protocol.indexOf("http")===0?"":"https://b13-bling-backend-production.up.railway.app";
const LOGO="/logo";
const brl=v=>Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const esc=s=>(s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const dataBR=d=>{if(!d)return"";const p=String(d).slice(0,10).split("-");return p.length===3?`${p[2]}/${p[1]}`:d;};

// IDs de status (carregados do backend)
let SIT={AGUARDANDO:818795,EM_SEP:817963,SEP_PEND:819227,SEPARADO:821590,CONF_ENTREGA:821611,VERIFICADO:24,EM_ROTA:820085,ATENDIDO:9};
let FUNC=null, pedidos=[], pags={}, acrs={}, seps={}, ents={}, formasPag=[], mapSit={}, timer=null;
let periodoIni=null, periodoFim=null; // null = padrão (últimos 7 dias)
try{ if(typeof b13GetSession==="function"){ const sess=b13GetSession(); if(sess) FUNC=sess; } }catch(e){}

// permissões por nível
const PODE=(acao)=>{
  if(!FUNC) return false;
  const n=FUNC.permissoes||[FUNC.nivel];
  const mapa={
    receber_pagamento:["financeiro_atacado","admin"],
    enviar_separacao:["financeiro_atacado","vendedor","gerente","admin"],
    ver_aguardando:["financeiro_atacado","vendedor","gerente","admin"],
    ver_separacao:["expedicao","gerente","admin"],
    ver_separado:["conferente","gerente","admin"],
    ver_pend:["conferente","gerente","admin"],
    conferir:["conferente","gerente","admin"],
    editar_pedido:["gerente","admin"],
  };
  return (mapa[acao]||[]).some(x=>n.includes(x));
};

async function login(){
  const senha=document.getElementById("pwInp").value;
  try{
    const r=await fetch(B+"/api/funcionarios/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({login:document.getElementById("loginInp")?.value?.trim()||"",senha})});
    const j=await r.json();
    if(r.ok&&j.ok){
      FUNC=j.funcionario;
      try{if(typeof b13SetSession==="function") b13SetSession(FUNC);}catch(e){}
      iniciar();
    } else { document.getElementById("pwErr").textContent=j.erro||"Senha incorreta."; }
  }catch(e){ document.getElementById("pwErr").textContent="Erro de conexão."; }
}
function sair(){ FUNC=null; if(typeof b13ClearSession==="function") b13ClearSession(); if(timer)clearInterval(timer); location.href="/login"; }

async function iniciar(){
  // carrega status e formas de pagamento
  try{
    const [rSit,rFp,rSitFluxo]=await Promise.all([
      fetch(B+"/api/situacoes?modulo=98310").then(r=>r.json()),
      fetch(B+"/api/formas-pagamento").then(r=>r.json()),
      fetch(B+"/api/fluxo/status").then(r=>r.json()),
    ]);
    mapSit={}; (rSit.data||[]).forEach(s=>mapSit[s.id]={nome:s.nome,cor:s.cor||"#cbcbcb"});
    formasPag=rFp.data||[];
    if(rSitFluxo.sit) SIT=rSitFluxo.sit;
  }catch(e){}
  await carregar();
  if(timer) clearInterval(timer);
  timer=setInterval(carregar,10000);
}

async function carregar(){
  try{
    if(!window._logsCache) window._logsCache={};
    const sits=[SIT.AGUARDANDO,SIT.EM_SEP,SIT.SEP_PEND,SIT.SEPARADO,SIT.CONF_ENTREGA,SIT.EM_ROTA].filter(Boolean).join(",");
    // período configurável — padrão: últimos 7 dias
    const agora=new Date(); agora.setHours(agora.getHours()-3);
    const dataFim=periodoFim||agora.toISOString().slice(0,10);
    const dataIni=periodoIni||new Date(agora-7*86400000).toISOString().slice(0,10);
    const [rPed,rAtend,rPag,rAcr,rSep,rPend,rEnt]=await Promise.all([
      // status ativos: pagina tudo (todos=1) — garante todos os pedidos do período
      fetch(B+`/api/pedidos?todos=1&dataInicial=${dataIni}&dataFinal=${dataFim}&idsSituacoes=`+sits).then(r=>r.json()),
      // atendidos: só últimos 100 (muitos pedidos, só visualização)
      fetch(B+`/api/pedidos?limite=100&dataInicial=${dataIni}&dataFinal=${dataFim}&idsSituacoes=${SIT.ATENDIDO}`).then(r=>r.json()),
      fetch(B+"/api/pagamentos").then(r=>r.json()),
      fetch(B+"/api/acrescimos").then(r=>r.json()),
      fetch(B+"/api/separacoes").then(r=>r.json()),
      fetch(B+"/api/pendencias").then(r=>r.json()),
      fetch(B+"/api/entregas").then(r=>r.json()),
    ]);
    // junta pedidos normais + atendidos (sem duplicatas)
    const todosIds=new Set();
    const todosPedidos=[...(rPed.data||[]),...(rAtend.data||[])].filter(p=>{ if(todosIds.has(p.id)) return false; todosIds.add(p.id); return true; });
    pedidos=todosPedidos;
    pags=rPag.data||{};
    // carrega logs dos pedidos Em Separação em background (para saber origem)
    pedidos.filter(p=>p.situacao?.id===SIT.EM_SEP).forEach(p=>{
      if(!window._logsCache[String(p.id)]){
        fetch(B+"/api/log/"+p.id).then(r=>r.json()).then(j=>{ window._logsCache[String(p.id)]=j.data||[]; }).catch(()=>{});
      }
    });
    const acrsArr=rAcr.data||[]; acrs={}; acrsArr.filter(a=>a.status==="pendente").forEach(a=>acrs[String(a.pedidoId)]=a);
    seps=rSep.data||{};
    ents=rEnt.data||{};
    const pendArr=rPend.data||[]; window._pends={}; pendArr.filter(x=>x.status==="pendente").forEach(x=>window._pends[String(x.pedidoId)]=x);
  }catch(e){}
  render();
}

function render(){
  const app=document.getElementById("app");
  const top=`<div class="top"><img src="${LOGO}">
    <div class="t">${FUNC?`B13 · ${esc(FUNC.nome)}`:"Operacional B13"}</div><div class="sp"></div>
    ${FUNC?`<a href="/gerenciamento" class="btn btn-out" style="text-decoration:none;font-size:12px">📊 Gestão</a>
    <button class="btn btn-ghost" onclick="sair()">Sair</button>`:""}
  </div>`;

  if(!FUNC){
    app.innerHTML=top+`<div class="login">
      <div style="font-size:52px;margin-bottom:10px">🏭</div>
      <h2 style="margin-bottom:6px">Painel Operacional</h2>
      <p class="muted" style="margin-bottom:16px">Entre com sua senha pessoal</p>
      <input id="loginInp" placeholder="Seu login (usuário)" style="margin-bottom:8px" onkeydown="if(event.key==='Enter')login()">
      <input id="pwInp" type="password" placeholder="Sua senha" onkeydown="if(event.key==='Enter')login()">
      <button class="btn btn-mag" style="width:100%" onclick="login()">Entrar</button>
      <div id="pwErr" class="muted" style="margin-top:8px"></div>
    </div>`; return;
  }

  // monta colunas do kanban conforme permissões
  const colunas=[];
  if(PODE("ver_aguardando")) colunas.push({label:"⏳ Aguardando",cor:"#fbff00",sit:SIT.AGUARDANDO});
  if(PODE("ver_separacao"))  colunas.push({label:"🔄 Em Separação",cor:"#00aaff",sit:SIT.EM_SEP});
  if(PODE("ver_pend"))       colunas.push({label:"⚠️ C/ Pendências",cor:"#d400ff",sit:SIT.SEP_PEND});
  if(PODE("ver_separado")||PODE("conferir")) colunas.push({label:"📦 Separados",cor:"#8e42a3",sit:SIT.SEPARADO});
  if(PODE("conferir")||PODE("editar_pedido")) colunas.push({label:"🚚 Em Rota",cor:"#6d2390",sit:SIT.EM_ROTA});
  if(PODE("editar_pedido"))  colunas.push({label:"✅ Atendidos",cor:"#2f9e6b",sit:SIT.ATENDIDO});

  if(!colunas.length){ app.innerHTML=top+`<div style="padding:30px;text-align:center"><div class="muted">Seu perfil não tem acesso a nenhuma fila.<br>Fale com o administrador.</div></div>`; return; }

  const totalPed=colunas.reduce((s,c)=>s+pedidos.filter(p=>p.situacao?.id===c.sit).length,0);
  const cols=colunas.map(col=>{
    // Filtrar Consumidor Final de todas as colunas
    let lista=pedidos.filter(p=>p.situacao?.id===col.sit);
    lista=lista.filter(p=>p.contato?.nome&&!p.contato.nome.toLowerCase().includes("consumidor final"));

    let cards="";
    if(!lista.length){
      cards=`<div class="muted" style="text-align:center;padding:20px;font-size:12px">Nenhum pedido</div>`;
    } else if(col.sit===SIT.ATENDIDO){
      // Agrupa por cliente
      const grupos={};
      lista.forEach(p=>{
        const nome=p.contato?.nome||"—";
        if(!grupos[nome]) grupos[nome]={nome,pedidos:[],total:0,contato:p.contato};
        grupos[nome].pedidos.push(p);
        grupos[nome].total+=+(p.total||0);
      });
      cards=Object.values(grupos).map(g=>{
        const datas=[...new Set(g.pedidos.map(p=>p.data).filter(Boolean))].sort().reverse();
        const dataStr=datas.map(d=>new Date(d+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit"})).join(", ");
        const nums=g.pedidos.map(p=>`<span onclick="verPedidoAtendido(${p.id},'${esc(g.nome)}')" style="cursor:pointer;color:#9090ff;text-decoration:underline;font-size:11px">#${p.numero||p.id}</span>`).join(" ");
        return `<div class="pcard" style="border-left:3px solid #2f9e6b">
          <div style="font-weight:700;font-size:13px;margin-bottom:4px">${esc(g.nome)}</div>
          <div style="margin-bottom:3px;display:flex;flex-wrap:wrap;gap:4px">${nums}</div>
          ${dataStr?`<div style="font-size:11px;color:#514c96;margin-bottom:3px">📅 ${dataStr}</div>`:""}
          <div style="font-size:13px;color:#2f9e6b;font-weight:700">${brl(g.total)}</div>
          <div style="font-size:10px;color:#9a95c9;margin-top:2px">${g.pedidos.length} pedido(s)</div>
        </div>`;
      }).join("");
    } else {
      cards=lista.map(p=>cardPedido(p,col)).join("");
    }

    return `<div class="kcol">
      <div class="kcol-head">
        <span>${col.label}</span>
        <span class="cnt" style="background:${col.cor};color:#000">${lista.length}</span>
      </div>
      <div class="kcol-body">${cards}</div>
    </div>`;
  }).join("");

  app.innerHTML=top+`
    <div class="refresh-bar" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span><span class="dot"></span> ${totalPed} pedido(s)</span>
      <div id="periodBar" style="display:flex;gap:4px;flex-wrap:wrap;align-items:center"></div>
    </div>
    <div class="kanban">${cols}</div>`;
  document.querySelectorAll(".top img").forEach(i=>i.src=LOGO);
  renderPeriodBar();
}

function calcPeriodo(tipo){
  const now=new Date(); now.setHours(now.getHours()-3);
  const hoje=now.toISOString().slice(0,10);
  const d=(n)=>new Date(now-n*86400000).toISOString().slice(0,10);
  const primeiroDiaMes=hoje.slice(0,8)+"01";
  if(tipo==="hoje") return {ini:hoje,fim:hoje};
  if(tipo==="ontem") return {ini:d(1),fim:d(1)};
  if(tipo==="anteontem") return {ini:d(2),fim:d(2)};
  if(tipo==="semana") return {ini:d(6),fim:hoje};
  if(tipo==="mes") return {ini:primeiroDiaMes,fim:hoje};
  if(tipo==="7dias") return {ini:d(6),fim:hoje};
  if(tipo==="30dias") return {ini:d(29),fim:hoje};
  return {ini:d(6),fim:hoje};
}

let periodoAtivo="7dias";

function setPeriodo(tipo, iniCustom, fimCustom){
  if(tipo==="custom"){
    periodoIni=iniCustom; periodoFim=fimCustom; periodoAtivo="custom";
  } else {
    const p=calcPeriodo(tipo);
    periodoIni=p.ini; periodoFim=p.fim; periodoAtivo=tipo;
  }
  carregar();
  renderPeriodBar();
}

function renderPeriodBar(){
  const bar=document.getElementById("periodBar");
  if(!bar) return;
  const opcoes=[
    {k:"hoje",l:"Hoje"},{k:"ontem",l:"Ontem"},{k:"anteontem",l:"Anteontem"},
    {k:"semana",l:"Semana"},{k:"mes",l:"Mês"},{k:"7dias",l:"7 dias"},{k:"30dias",l:"30 dias"},
  ];
  bar.innerHTML=opcoes.map(o=>`<button class="periodo-btn ${periodoAtivo===o.k?'ativo':''}" onclick="setPeriodo('${o.k}')">${o.l}</button>`).join("")+
    `<span style="font-size:11px;color:var(--muted);margin-left:2px">📅</span>
     <input type="date" class="periodo-custom" id="pIni" value="${periodoIni||''}" onchange="atualizarCustom()">
     <span style="font-size:11px;color:var(--muted)">→</span>
     <input type="date" class="periodo-custom" id="pFim" value="${periodoFim||''}" onchange="atualizarCustom()">`;
}

function atualizarCustom(){
  const ini=document.getElementById("pIni")?.value;
  const fim=document.getElementById("pFim")?.value;
  if(ini&&fim&&ini<=fim) setPeriodo("custom",ini,fim);
}

function nomeSit(id){ return mapSit[id]?.nome||""; }
function corSit(id){ return mapSit[id]?.cor||"#cbcbcb"; }

function cardPedido(p,aba){
  const idStr=String(p.id);
  const pag=pags[idStr];
  const acr=acrs[idStr];
  const sep=seps[idStr];
  const pago=pag?.statusPagamento==="pago";
  const parcial=pag?.statusPagamento==="parcial";
  const saldo=pag?+(pag.valorPedido||p.total||0)-(pag.valorPago||0):0;
  const diverg=pag?._divergencia;

  let pagInfo="";
  if(pago) pagInfo=`<div class="pag-info">✅ Pago — ${brl(pag.valorPago)}${diverg?` <span title="${esc(diverg.msg||'')}" style="color:#ffd23f;font-size:10px;cursor:help">⚠️ divergência</span>`:""}</div>`;
  else if(parcial) pagInfo=`<div class="pag-pend">⚠️ Pago parcial ${brl(pag.valorPago)} · falta ${brl(Math.abs(saldo))}</div>`;
  else if(pag?.statusPagamento==="pendente") pagInfo=`<div class="pag-pend">💰 Pagamento pendente</div>`;

  // tag "Entrega"/"Retirada" — mostra em todas as colunas, não só Aguardando
  let entregaTag="";
  {
    const ent=ents[idStr];
    const freteCalc=+(((p.total||0)-(p.totalProdutos||0))).toFixed(2);
    // usa o registro real (cobre frete grátis); sem registro (pedido criado direto no Bling), cai no cálculo por diferença
    const ehEntrega=ent?ent.tipo==="entrega":freteCalc>0.01;
    if(ehEntrega){
      const freteMostrar=ent?(ent.freteOriginal||0):freteCalc;
      entregaTag=`<div style="font-size:11px;color:#00aaff;background:#0d2a3a;border:1px solid #00aaff44;border-radius:5px;padding:2px 7px;display:inline-block;margin-bottom:6px">🛵 Entrega${freteMostrar>0.01?` — frete ${brl(freteMostrar)}`:" — frete grátis"}</div>`;

      entregaTag=`<div style="font-size:11px;color:#2f9e6b;background:#0d2a1a;border:1px solid #2f9e6b44;border-radius:5px;padding:2px 7px;display:inline-block;margin-bottom:6px">🏪 Retirada</div>`;
    }
  }

  let acrInfo="";
  if(acr) acrInfo=`<div class="acr-box">🆕 ${acr.itensNovos?.length?`<b>Acréscimo:</b> ${acr.itensNovos.map(i=>`+${esc(i.descricao)}`).join(", ")}`:""} ${acr.itensRetirados?.length?`<b>Retirada:</b> ${acr.itensRetirados.map(i=>esc(i.descricao)).join(", ")}`:""}</div>`;
  // pendências da separação
  const pendItem=window._pends&&window._pends[String(p.id)];

        <div style="display:flex;justify-content:space-between;align-items:center;gap:6px">

        <div class="pn">Pedido ${esc(p.numero||p.id)} <span class="badge" style="background:${corSit(p.situacao?.id)}">${esc(nomeSit(p.situacao?.id))}</span>
          <span style="font-size:10px;color:#514c96;margin-left:4px">👁</span>
        </div>
        <div class="pc">${esc(p.contato?.nome||"—")} · ${dataBR(p.data)}</div>
        <div class="ptot">${brl(p.total)}</div>
      </div>
    </div>
    ${pagInfo}${entregaTag}${pendInfo||""}${acrInfo}${sepInfo}
    <div class="acts">${botoes}</div>
    <div id="msg-${p.id}"></div>
  </div>`;
}

function montarBotoes(p,aba,pago,parcial){
  const id=p.id; const sit=p.situacao?.id;
  // frete estimado = diferença entre total e total dos produtos (não vem detalhado na listagem)
  const freteVal=+(((p.total||0)-(p.totalProdutos||0))).toFixed(2);
  const temFrete=freteVal>0.01;
  // ABA: aguardando
  if(sit===SIT.AGUARDANDO){
    const jaPago=pago||parcial;
    const btnSep=(!jaPago&&PODE("enviar_separacao"))?`<button class="btn btn-blue" onclick="enviarSep(${id},false)">▶ Separar para entregar</button>`:"";
    const btnPag=(!jaPago&&PODE("receber_pagamento"))?`<button class="btn btn-grn" onclick="iniciarRecebimentoAguardando(${id},${p.total},${temFrete},${freteVal},'receber')">💰 RECEBER E SEPARAR</button>`:"";
    const btnSepPago=(jaPago&&PODE("enviar_separacao"))?`<button class="btn btn-grn" onclick="enviarSep(${id},true)">▶ Separar (já pago)</button>`:"";
    const btnClienteSep=PODE("receber_pagamento")?`<button class="btn btn-ghost" onclick="iniciarRecebimentoAguardando(${id},${p.total},${temFrete},${freteVal},'clienteSeparou',${pago})">💰 SÓ RECEBER (SEPARAÇÃO PELO CLIENTE)</button>`:"";
    const btnWhats=`<button class="btn btn-ghost" style="background:#075e54" onclick="whatsAguardando(${id})">🟢 WhatsApp</button>`;
    const btnQR=`<button class="btn btn-ghost" onclick="abrirQR(${id},'${p.numero||id}')" title="QR Code do pedido">📱</button>`;
    return `<div style="display:flex;gap:6px;flex-wrap:wrap;width:100%">${btnPag}${btnSep}${btnSepPago}${btnClienteSep}${btnWhats}${btnQR}</div>`;
  }
  // ABA: em separação
  if(sit===SIT.EM_SEP){
    const sep=seps[String(id)];
    const quem=sep?`<div style="font-size:11px;color:#00aaff;margin-top:4px">🔧 ${esc(sep.funcionarioNome)} separando</div>`:"";
    if(sep) return quem; // travado — não mostra botões
    const logPed=window._logsCache?.[String(id)]||[];
    const veioDepend=logPed.some(e=>e.evento==="separacao_com_falta");
    // botão voltar só para admin
    if(!PODE("admin")) return quem;
    const btnVoltar=veioDepend
      ?`<button class="btn btn-yellow" onclick="voltarPendencias(${id})">↩ Voltar para pendências</button>`
      :`<button class="btn btn-yellow" onclick="voltarAguardando(${id})">↩ Voltar para aguardando</button>`;
    return btnVoltar+quem;
  }
  // ABA: c/ pendências
  if(sit===SIT.SEP_PEND){
    return `<div style="display:flex;gap:6px;flex-wrap:wrap;width:100%">
      ${(PODE("ver_pend")||PODE("editar_pedido"))?`<button class="btn btn-mag" style="flex:1;font-weight:900" onclick="resolverPendencias(${id})">✂️ Resolver pendências</button>`:""}
      ${PODE("admin")?`<button class="btn btn-yellow" style="flex:1" onclick="enviarSepNovamente(${id})">↩ Voltar separação</button>`:""}
    </div>`
  }
  // ABA: separados — conferente
  if(sit===SIT.SEPARADO && PODE("conferir")){
    return `<button class="btn btn-mag" onclick="abrirConferencia(${id})">🔍 Conferir pedido</button>`;
  }
  // ABA: em rota
  if(sit===SIT.EM_ROTA){
    return `<div style="display:flex;gap:6px;flex-wrap:wrap;width:100%">
      <button class="btn btn-blue" style="flex:1" onclick="abrirConfirmarEntrega(${id})">📦 Confirmar entrega</button>
    </div>`;
  }
  // ABA: atendidos
  if(sit===SIT.ATENDIDO){
    return `<div class="muted" style="margin-top:4px;font-size:11px">✅ Entregue</div>`;
  }
  return "";
}

  document.getElementById("modal").style.display="flex";
  renderModalPagRota(id,total);

function renderModalPagRota(id,total){
  const somaParcelas=+_parcelas.reduce((s,p)=>s+parseFloat(p.valor||0),0).toFixed(2);
  const diff=+(Number(total)-somaParcelas).toFixed(2);
  const rows=_parcelas.map((p,ix)=>`
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap">
      <span style="font-size:11px;color:#9a95c9;min-width:20px">${ix+1}</span>
      <input type="number" step="0.01" min="0" value="${p.valor}" style="width:110px;padding:8px;background:#0f0d24;border:1px solid #514c96;border-radius:8px;color:#fff;font-size:13px"
        onchange="_parcelas[${ix}].valor=Math.max(0,parseFloat(this.value)||0);renderModalPagRota(${id},${total})">
      <select style="flex:1;padding:8px;background:#0f0d24;border:1px solid #514c96;border-radius:8px;color:#fff;font-size:12px"
        onchange="_parcelas[${ix}].formaId=this.value;_parcelas[${ix}].formaNome=this.options[this.selectedIndex].text">
        ${formasPag.map(f=>`<option value="${f.id}" ${f.id==p.formaId?'selected':''}>${esc(f.nome||f.id)}</option>`).join("")}
      </select>
      ${_parcelas.length>1?`<button onclick="_parcelas.splice(${ix},1);renderModalPagRota(${id},${total})" style="background:none;border:none;color:#ff8090;cursor:pointer;font-size:18px">✕</button>`:""}
    </div>`).join("");
  document.getElementById("mbox").innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3>💰 Receber Pagamento — Entrega</h3><span style="color:#ffd23f;font-weight:900">${brl(total)}</span></div>
    ${rows}
    <button class="btn btn-ghost" style="width:100%;margin-bottom:10px;font-size:12px"
      onclick="_parcelas.push({valor:'${diff>0?diff.toFixed(2):'0.00'}',formaId:formasPag[0]?.id||'',formaNome:formasPag[0]?.nome||'',obs:''});renderModalPagRota(${id},${total})">
      + Adicionar parcela${diff>0?` (falta ${brl(diff)})`:''}</button>
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--border);margin-bottom:10px;font-size:13px">
      <span>Total:</span><b style="color:${Math.abs(diff)<0.01?'#2f9e6b':diff<0?'#e5563f':'#ffd23f'}">${brl(somaParcelas)} ${Math.abs(diff)<0.01?'✅':diff>0?`(falta ${brl(diff)})`:''}</b></div>
    <div id="pMsgRota"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-grn" style="flex:1" onclick="confirmarPagRota(${id},${total})">✅ Confirmar pagamento</button>
      <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button></div>`;
}
async function confirmarPagRota(id,total){
  const totalParcelas=+_parcelas.reduce((s,p)=>s+parseFloat(p.valor||0),0).toFixed(2);
  const diff=+(totalParcelas-Number(total)).toFixed(2);
  if(Math.abs(diff)>0.01){ document.getElementById("pMsgRota").innerHTML=`<div class="err">❌ Valor não confere com o total (${brl(totalParcelas)} ≠ ${brl(total)})</div>`; return; }
  document.getElementById("pMsgRota").innerHTML=`<div class="muted">Registrando…</div>`;
  try{
    const r=await fetch(B+"/api/pagamentos/"+id,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({valor:totalParcelas,formaId:_parcelas[0]?.formaId,formaNome:_parcelas[0]?.formaNome,parcelas:_parcelas,funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome,substituir:!!window._pagSubstituir})});
    const j=await r.json();
    if(r.ok&&j.ok){ fecharModal(); await carregar(); }
    else document.getElementById("pMsgRota").innerHTML=`<div class="err">${esc(j.erro||"Erro")}</div>`;
  }catch(e){ document.getElementById("pMsgRota").innerHTML=`<div class="err">Erro de conexão</div>`; }
}

// ---- CONFIRMAR ENTREGA (EM ROTA → ATENDIDO) ----
async function abrirConfirmarEntrega(id){
  document.getElementById("modal").style.display="flex";
  document.getElementById("mbox").innerHTML=`<div class="muted">Carregando pedido…</div>`;
  try{
    const [rPed,rPag]=await Promise.all([
      fetch(B+"/api/pedidos/"+id).then(r=>r.json()),
      fetch(B+"/api/pagamentos/"+id).then(r=>r.json()),
    ]);
    const ped=rPed.data||rPed; const pag=rPag.data;
    const pago=pag?.statusPagamento==="pago";
    const valorPago=+(pag?.valorPago||0);
    const total=+(ped.total||ped.totalProdutos||0);
    const falta=+(total-valorPago).toFixed(2);
    window._entregaPed=ped; window._entregaPag=pag;
    window._itensOcorrencia=[];
    window._editItemIx=null; window._editOcorrencia=null;
    // Se não pago ou parcial, mostra aviso mas permite continuar
    if(!pago&&falta>0.01){
      window._entregaFalta=falta;
    } else {
      window._entregaFalta=0;
    }
    renderConfirmarEntrega(id,ped,pag,[]);
  }catch(e){ document.getElementById("mbox").innerHTML=`<div class="err">Erro ao carregar</div>`; }
}

function renderConfirmarEntrega(id,ped,pag,ocorrencias){
  const pago=pag?.statusPagamento==="pago";
  const total=+(ped.total||ped.totalProdutos||0); const pago_val=+(pag?.valorPago||0);
  const falta=+(total-pago_val).toFixed(2);
  const valOcorr=ocorrencias.reduce((s,o)=>s+(o.valorItem||0),0);
  const saldoFinal=+(total-valOcorr).toFixed(2);
  const editIx=window._editItemIx;
  const ed=window._editOcorrencia;
  const itens=(ped.itens||[]).map((it,ix)=>{
    const ocorr=ocorrencias.find(o=>o.ix===ix);

    // painel de edição inline (aberto pra esse item)
    if(editIx===ix&&ed){
      const valorAbaterEd=+((it.valor||0)*ed.qtd).toFixed(2);
      const fotoOk=ed.tipo!=="danificado"||!!ed.foto;
      const motivoOk=ed.tipo!=="nao_entregue"||!!(ed.motivo||"").trim();
      return `<div style="border:1px solid #FF0082;border-radius:10px;padding:10px;margin:6px 0;background:#1a0a20">
        <div style="font-weight:800;font-size:13px;margin-bottom:8px">${ed.tipo==="danificado"?"📷 Danificado":"📦 Não entregue"} — ${esc(it.descricao||it.produto?.nome||"")}</div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <span style="font-size:12px;color:#9a95c9">Quantidade:</span>
          <button class="btn btn-ghost" style="padding:4px 10px;font-size:16px" onclick="ajustarQtdEdicao(${id},-1)">−</button>
          <span style="font-weight:900;font-size:16px;min-width:24px;text-align:center">${ed.qtd}</span>
          <button class="btn btn-ghost" style="padding:4px 10px;font-size:16px" onclick="ajustarQtdEdicao(${id},1)">+</button>
          <span style="font-size:12px;color:#9a95c9">de ${it.quantidade}</span>
        </div>
        <div style="font-size:13px;margin-bottom:8px">Valor a abater do pedido: <b style="color:#ff8090">${brl(valorAbaterEd)}</b></div>
        ${ed.tipo==="danificado"?`
          <div style="margin-bottom:8px">
            ${ed.foto
              ?`<div style="display:flex;align-items:center;gap:8px"><img src="${ed.foto}" style="width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid #514c96"><button class="btn btn-ghost" style="font-size:11px;padding:6px 10px" onclick="tirarFotoOcorrencia(${id})">🔄 Trocar foto</button></div>`
              :`<button class="btn btn-mag" style="width:100%;font-size:12px" onclick="tirarFotoOcorrencia(${id})">📷 Adicionar foto (obrigatória)</button>`}
          </div>`:`
          <div style="margin-bottom:8px">
            <div style="font-size:12px;color:#9a95c9;margin-bottom:4px">Motivo de não ter sido entregue:</div>
            <input type="text" value="${esc(ed.motivo||'')}" placeholder="Ex: cliente ausente, endereço errado…" style="width:100%;padding:8px;background:#0f0d24;border:1px solid #514c96;border-radius:8px;color:#fff;font-size:13px"

          <button class="btn btn-ghost" onclick="cancelarEdicaoOcorrencia(${id})">Cancelar</button>

    <div class="muted" style="margin-bottom:8px">${esc(ped.contato?.nome||"—")}</div>

      <br>Novo total: <b>${brl(saldoFinal)}</b></div>`:""}
    <div id="entregaMsg"></div>
    <button class="btn btn-grn" style="width:100%;margin-top:8px" ${podeConfirmar?"":"disabled title=\"Registre o pagamento do valor total (já recalculado) antes de confirmar\""} onclick="concluirEntrega(${id})">

    ${!podeConfirmar?`<div class="muted" style="text-align:center;margin-top:4px;font-size:11px">Registre o pagamento do valor total antes de confirmar</div>`:""}
    <button class="btn btn-ghost" style="width:100%;margin-top:6px" onclick="fecharModal()">Cancelar</button>`;
}

function abrirEdicaoOcorrencia(id,ix,tipo){
  const it=window._entregaPed?.itens?.[ix]; if(!it) return;
  window._editItemIx=ix;
  window._editOcorrencia={tipo, qtd: it.quantidade, motivo:"", foto:null};
  renderConfirmarEntrega(id,window._entregaPed,window._entregaPag,window._itensOcorrencia);
}

function ajustarQtdEdicao(id,delta){
  const it=window._entregaPed?.itens?.[window._editItemIx]; if(!it||!window._editOcorrencia) return;
  let q=(window._editOcorrencia.qtd||1)+delta;
  if(q<1) q=1; if(q>it.quantidade) q=it.quantidade;
  window._editOcorrencia.qtd=q;
  renderConfirmarEntrega(id,window._entregaPed,window._entregaPag,window._itensOcorrencia);
}

function tirarFotoOcorrencia(id){
  const input=document.createElement("input"); input.type="file"; input.accept="image/*"; input.capture="environment";
  input.onchange=(e)=>{
    const file=e.target.files[0]; if(!file) return;
    const canvas=document.createElement("canvas"); const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=800; let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      window._editOcorrencia.foto=canvas.toDataURL("image/jpeg",0.7);
      renderConfirmarEntrega(id,window._entregaPed,window._entregaPag,window._itensOcorrencia);
    };
    img.src=url;
  };
  input.click();
}

function renderModalPagEntregaInline(id){

      </select>
      ${parcelas.length>1?`<button onclick="window._parcelasEntrega.splice(${ix},1);renderModalPagEntregaInline(${id})" style="background:none;border:none;color:#ff8090;cursor:pointer;font-size:18px">✕</button>`:""}
    </div>`).join("");

      <div style="font-weight:700;margin-bottom:8px">💰 Registrar pagamento — total ${brl(total)}</div>
      <div style="font-size:11px;color:#9a95c9;margin-bottom:8px">Já considera abatimento de ocorrências (📦/📷), se houver.</div>

async function confirmarPagEntregaInline(id){
  const total=window._totalEntregaAtual;
  const parcelas=window._parcelasEntrega;
  const soma=+parcelas.reduce((s,p)=>s+parseFloat(p.valor||0),0).toFixed(2);
  const diff=+(Number(total)-soma).toFixed(2);
  if(Math.abs(diff)>0.01){
    document.getElementById("entregaMsg").innerHTML+=`<div class="err">Valor informado (${brl(soma)}) não bate com o total (${brl(total)}). Corrija antes de confirmar.</div>`;
    return;
  }
  try{
    await fetch(B+"/api/pagamentos/"+id,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({valor:soma,parcelas,formaId:parcelas[0]?.formaId,formaNome:parcelas[0]?.formaNome,funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome,substituir:true,valorEsperado:total})});
    const rPag=await fetch(B+"/api/pagamentos/"+id).then(r=>r.json());
    window._entregaPag=rPag.data;
    renderConfirmarEntrega(id,window._entregaPed,rPag.data,window._itensOcorrencia||[]);
  }catch(e){ document.getElementById("entregaMsg").innerHTML=`<div class="err">Erro ao registrar</div>`; }
}



async function concluirEntrega(id){
  const ped=window._entregaPed; const pag=window._entregaPag;
  const ocorr=window._itensOcorrencia||[];
  // verificar se itens danificados têm foto
  const semFoto=ocorr.filter(o=>o.tipo==="danificado"&&!o.foto);
  if(semFoto.length){ document.getElementById("entregaMsg").innerHTML=`<div class="err">📷 Foto obrigatória para ${semFoto.length} item(ns) danificado(s)</div>`; return; }
  const valorAbatido=+ocorr.reduce((s,o)=>s+(o.valorItem||0),0).toFixed(2);
  // não deixa concluir sem receber o valor esperado (total já descontado das ocorrências)
  const totalPed=+(ped.total||ped.totalProdutos||0);
  const saldoFinal=+(totalPed-valorAbatido).toFixed(2);
  const pagoVal=+(pag?.valorPago||0);
  if(pagoVal<saldoFinal-0.01){
    document.getElementById("entregaMsg").innerHTML=`<div class="err">🔴 Não é possível confirmar entrega sem receber o pagamento. Falta ${brl(saldoFinal-pagoVal)} — clique em "Registrar" acima.</div>`;
    return;
  }
  // se tem abatimento e já pagou, perguntar sobre crédito/estorno
  if(valorAbatido>0 && pag?.statusPagamento==="pago"){
    document.getElementById("entregaMsg").innerHTML=`
      <div style="background:#1c1846;border:1px solid #3a357f;border-radius:10px;padding:12px;margin-top:8px">
        <div style="font-weight:800;margin-bottom:8px">💬 Como resolver o abatimento de ${brl(valorAbatido)}?</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-grn" style="flex:1" onclick="finalizarEntrega(${id},'credito')">💳 Crédito para próximo pedido</button>
          <button class="btn btn-ghost" style="flex:1" onclick="finalizarEntrega(${id},'registrar')">📋 Só registrar</button>
        </div>
      </div>`;
  } else {
    await finalizarEntrega(id, valorAbatido>0?"registrar":"ok");
  }
}

  const ped=window._entregaPed; const ocorr=window._itensOcorrencia||[];

async function whatsAguardando(id){
  showMsg(id,`<div class="muted">Buscando pedido…</div>`);
  try{
    const r=await fetch(B+"/api/pedidos/"+id); const j=await r.json(); const ped=j.data||j;
    // busca telefone — primeiro tenta no pedido, depois busca contato completo por ID
    let tel=(ped.contato?.celular||ped.contato?.telefone||ped.contato?.fone||"").replace(/\D/g,"");
    if(!tel && ped.contato?.id){
      try{
        // busca contato completo pelo ID (retorna celular que não vem no pedido)
        const rc=await fetch(B+"/api/contatos/"+ped.contato.id);
        const jc=await rc.json(); const cont=jc.data||jc;
        tel=(cont?.celular||cont?.telefone||cont?.fone||"").replace(/\D/g,"");
      }catch(e){}
    }
    if(!tel && ped.contato?.id){
      try{
        // fallback: busca por documento
        const doc=ped.contato?.numeroDocumento||ped.contato?.cpfCnpj||"";
        if(doc){
          const rc=await fetch(B+"/api/contatos?doc="+encodeURIComponent(doc));
          const jc=await rc.json(); const cont=jc.data?.[0];
          tel=(cont?.celular||cont?.telefone||cont?.fone||"").replace(/\D/g,"");
        }
      }catch(e){}
    }
    if(!tel && ped.observacoes){
      // fallback final: extrai telefone da observação do pedido (colocado pelo totem)
      const m=ped.observacoes.match(/\((\d[\d\s().-]{7,})\)/);
      if(m) tel=m[1].replace(/\D/g,"");
    }
    if(!tel){ showMsg(id,`<div class="err">Telefone não encontrado para este cliente</div>`); return; }
    const num=tel.startsWith("55")?tel:"55"+tel;
    const itens=(ped.itens||[]).map(i=>`- ${i.descricao||i.produto?.nome||"Produto"}: ${i.quantidade} un`).join("\n");
    const msg=`Olá${ped.contato?.nome?" "+ped.contato.nome:""}! Seu pedido *${ped.numero||id}* foi recebido na B13 Bebidas. ✅\n\n*Itens do pedido:*\n${itens}\n\n*Total: ${brl(ped.total||0)}*\n\nEm breve entraremos em contato! 😊`;
    showMsg(id,"");
    window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`,"_blank");
  }catch(e){ showMsg(id,`<div class="err">Erro ao buscar pedido</div>`); }
}

// Controla qtd temporária na busca
const _qtdsNovo={};
function mudaQtdNovo(key,delta,un){
  const k=String(key).replace(/\W/g,"_");
  _qtdsNovo[k]=Math.max(0,(_qtdsNovo[k]||0)+delta*un);
  const el=document.getElementById("qtdnovo_"+k)||document.getElementById("qtdnovo_"+String(key));
  if(el) el.textContent=un>1?`${_qtdsNovo[k]/un}cx (${_qtdsNovo[k]}un)`:_qtdsNovo[k]+"un";
}

function addProdutoPend(prod,sabor,id,qtdForcar){
  const key=String((sabor?.id||sabor?.codigo||prod.id||prod.nome)).replace(/\W/g,"_");
  const qtd=qtdForcar||_qtdsNovo[key]||prod.un||1;
  // ID real do Bling: sabor.id > primeiro sabor.id > null
  const saborReal=sabor||(prod.sabores?.length===1?prod.sabores[0]:null);
  const prodId=saborReal?.id||null;
  const nome=sabor?`${prod.nome} ${sabor.nome}`:prod.nome;
  const existe=window.itensEdit.find(i=>String(i.produtoId)===String(prodId)||i.descricao===nome);
  if(existe&&!existe._removido){ existe.quantidade+=qtd; }
  else if(existe&&existe._removido){ existe._removido=false; existe.quantidade=qtd; }
  else{
    window.itensEdit.push({
      produtoId:prodId, descricao:nome,
      quantidade:qtd, quantidadeOriginal:0, temQtd:0, faltaQtd:0,
      valor:prod.preco||0, _teveFalta:false, _removido:false, _novo:true, _un:prod.un||1,
    });
  }
  _qtdsNovo[key]=0;
  document.getElementById("buscaNovoItem").value="";
  document.getElementById("resultadosNovoItem").innerHTML="";
  renderRetirarPend(id,window._pendFaltas||[]);
}

// Adiciona produto pelo índice do array de matches (evita JSON inline)
function addProdutoPendIdx(mi,si,pedidoId){
  const p=window._buscaMatches?.[mi];
  if(!p) return;
  const sabor=si!=null?p.sabores?.[si]:null;
  // pega qtd do stepper
  const key=si!=null?`p${mi}s${si}`:`p${mi}n`;
  const qtdStepper=(_qtdsNovo[key]||0);
  const qtd=qtdStepper>0?qtdStepper:(p.un||1);
  addProdutoPend(p,sabor,pedidoId,qtd);
}

// Manter compatibilidade
function acrescentarItemPend(prod,id){ addProdutoPend(prod,null,id); }

function calcDestinoAtual(){
  const items=window.itensEdit||[];
  const removidos=items.filter(i=>i._removido||i.quantidade===0);
  // só conta como alteração se o item tinha falta registrada E a qtd mudou
  const qtdAlterada=items.filter(i=>!i._removido&&i.quantidade>0&&i._teveFalta&&i.temQtd>0&&i.quantidade!==i.temQtd);
  const novos=items.filter(i=>i._novo&&!i._removido&&i.quantidade>0);
  return (removidos.length>0||qtdAlterada.length>0||novos.length>0) ? "sep" : "separado";
}

function atualizarBtnDestino(){
  const btn=document.getElementById("btnConfirmarPend");
  if(!btn) return;
  const dest=calcDestinoAtual();
  if(dest==="sep"){
    btn.style.background="#1a3a6b"; btn.style.borderColor="#2f6b9e"; btn.style.color="#a8c8f0";
    btn.innerHTML="🔄 Confirmar e voltar para Em Separação";

}

async function confirmarRetirarSeguir(id){
  document.getElementById("retMsg").innerHTML=`<div class="muted">Verificando pagamento…</div>`;
  try{
    const [rPed2,rPag]=await Promise.all([
      fetch(B+"/api/pedidos/"+id).then(r=>r.json()),
      fetch(B+"/api/pagamentos/"+id).then(r=>r.json()),
    ]);
    window.pedidoEditOrig=window.pedidoEditOrig||(rPed2.data||rPed2);
    const pag=rPag.data;
    const itensFiltrados=window.itensEdit.filter(i=>i.quantidade>0);
    
    // Valor real do pedido após ajustes (itens + frete original — o frete não muda ao mexer nos itens)
    const freteOrig=+(window.pedidoEditOrig?.transporte?.frete||0);
    const valorNovoPedido=+(itensFiltrados.reduce((s,i)=>s+(i.quantidade*(i.valor||0)),0)+freteOrig).toFixed(2);
    const valorPago=+(pag?.valorPago||0);
    const statusPag=pag?.statusPagamento||"pendente";
    
    // Itens alterados para descrição na observação
    const itensAlterados=window.itensEdit.filter(i=>i._teveFalta&&(i._removido||i.quantidade!==i.quantidadeOriginal));
    const descItens=itensAlterados.map(i=>i._removido?`${i.descricao} (removido)`:`${i.descricao} (${i.quantidadeOriginal}→${i.quantidade})`).join(", ");
    
    const diff=+(valorPago-valorNovoPedido).toFixed(2); // positivo=estorno, negativo=falta pagamento

    // pedidos de ENTREGA só recebem o pagamento lá na etapa "Em Rota" (na
    // confirmação de entrega) — não faz sentido exigir pagamento aqui ainda,
    // deixa o pedido seguir o fluxo normalmente
    const entInfo=ents[String(id)];
    const freteCalcPend=+(((window.pedidoEditOrig?.total||0)-(window.pedidoEditOrig?.totalProdutos||0))).toFixed(2);
    const ehEntregaPend=entInfo?entInfo.tipo==="entrega":freteCalcPend>0.01;
    if(ehEntregaPend){
      await executarRetirarSeguir(id,'ok',0,'');
      return;
    }

    // salvar em globais para uso nos onclicks
    window._pendDescItens=descItens||"";
    window._pendDiff=Math.abs(diff);
    // Caso 1: pagou mais do que o novo total (seja pago total ou parcial) — precisa de estorno
    if(diff>0.01){
      const optsForma=formasPag.map(f=>`<option value="${f.id}">${esc(f.nome||f.id)}</option>`).join("");
      window._estornoFormaId=formasPag[0]?.id||""; window._estornoFormaNome=formasPag[0]?.nome||"";
      const histPag=(pag?.historico||[]).map(h=>`${h.formaNome||""}(${brl(h.valor||0)})`).join(", ");
      document.getElementById("retMsg").innerHTML=`
        <div style="background:#1c1846;border:1px solid #3a357f;border-radius:10px;padding:14px;margin-top:8px">
          <div style="font-weight:900;font-size:14px;margin-bottom:6px">💬 Pedido já pago — precisa de estorno</div>
          <div style="font-size:12px;color:#9a95c9;margin-bottom:4px">Pagamento original: <b style="color:#fff">${histPag||brl(valorPago)}</b></div>
          <div style="font-size:13px;margin-bottom:6px">
            Novo total: <b style="color:#ffd23f">${brl(valorNovoPedido)}</b> &nbsp;
            <b style="color:#ff8090">Estorno: ${brl(diff)}</b>
          </div>
          <div style="font-size:12px;color:#9a95c9;margin-bottom:10px">Itens alterados: ${esc(descItens)}</div>
          <div style="font-weight:700;margin-bottom:6px">Como realizar o estorno de ${brl(diff)}?</div>
          <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
            <button class="btn btn-ghost" style="flex:1;min-width:120px" onclick="selecionarResolucao(this,'credito')">💳 Crédito ao cliente</button>
            <button class="btn btn-ghost" style="flex:1;min-width:120px" onclick="selecionarResolucao(this,'estorno')">↩ Devolução</button>
            <button class="btn btn-ghost" style="flex:1;min-width:120px" onclick="selecionarResolucao(this,'registrar')">📋 Só registrar</button>
          </div>
          <div id="estornoDetalheBox" style="display:none;margin-bottom:10px">
            <div style="font-size:12px;color:#9a95c9;margin-bottom:4px">Forma da devolução:</div>
            <select id="estornoFormaSelect" onchange="window._estornoFormaId=this.value;window._estornoFormaNome=this.options[this.selectedIndex].text"
              style="width:100%;padding:8px;background:#0f0d24;border:1px solid #514c96;border-radius:8px;color:#fff;font-size:13px;margin-bottom:6px">
              ${optsForma}
            </select>
            <input id="estornoContaNome" placeholder="Nome da conta para devolução (ex: João Silva - Nubank)"
              style="width:100%;padding:8px;background:#0f0d24;border:1px solid #514c96;border-radius:8px;color:#fff;font-size:12px"
              oninput="window._estornoContaNome=this.value">
          </div>
          <div id="resolucaoSel" style="font-size:12px;color:#9a95c9;margin-bottom:8px"></div>
          <button id="btnConfirmarRetirar" class="btn btn-mag" style="width:100%;display:none"
            onclick="executarRetirarSeguir(${id},window._resolucaoSel||'registrar',window._pendDiff,window._pendDescItens)">
            ✅ Confirmar
          </button>
        </div>`;
      desativarBotoesFundoPend();
      return;
    }

    // Caso 2: o novo total ficou maior do que o que já foi pago (pedido novo,
    // parcial, ou até já marcado como "pago" no valor antigo) — precisa cobrar
    // a diferença do cliente antes de mandar de volta pra separação
    if(diff<-0.01){
      const falta=Math.abs(diff);
      const optsForma=formasPag.map(f=>`<option value="${f.id}">${esc(f.nome||f.id)}</option>`).join("");
      window._novaFormaId=formasPag[0]?.id||""; window._novaFormaNome=formasPag[0]?.nome||"";
      document.getElementById("retMsg").innerHTML=`
        <div style="background:#1c1846;border:1px solid #ffd23f;border-radius:10px;padding:14px;margin-top:8px">
          <div style="font-weight:900;font-size:14px;margin-bottom:6px;color:#ffd23f">💰 Valor do pedido mudou</div>
          <div style="font-size:13px;margin-bottom:6px">
            Já pago: <b style="color:#a8f0c8">${brl(valorPago)}</b> &nbsp;
            Novo total: <b style="color:#ffd23f">${brl(valorNovoPedido)}</b> &nbsp;
            <b style="color:#ff8090">Falta: ${brl(falta)}</b>
          </div>
          <div style="font-weight:700;margin-bottom:6px">Registrar pagamento adicional de ${brl(falta)}:</div>
          <select id="novaFormaSelect" onchange="window._novaFormaId=this.value;window._novaFormaNome=this.options[this.selectedIndex].text"
            style="width:100%;padding:8px;background:#0f0d24;border:1px solid #514c96;border-radius:8px;color:#fff;font-size:13px;margin-bottom:8px">
            ${optsForma}
          </select>
          <div id="resolucaoSel" style="font-size:12px;color:#9a95c9;margin-bottom:8px"></div>
          <button class="btn btn-grn" style="width:100%"
            onclick="executarRetirarSeguir(${id},'pagamento_adicional',window._pendDiff,window._pendDescItens)">
            ✅ Registrar e Confirmar
          </button>
        </div>`;
      desativarBotoesFundoPend();
      return;
    }

    // Caso 3: sem diferença ou não pago — segue normalmente
    await executarRetirarSeguir(id,'ok',0,'');
  }catch(e){ document.getElementById("retMsg").innerHTML=`<div class="err">Erro ao verificar pagamento: ${e.message}</div>`; }
}

function selecionarResolucao(btn,tipo){
  window._resolucaoSel=tipo;
  document.querySelectorAll("#retMsg .btn").forEach(b=>{ if(b.id!=="btnConfirmarRetirar"){ b.style.opacity="0.5"; b.style.outline=""; } });
  btn.style.opacity="1"; btn.style.outline="2px solid #FF0082";
  const box=document.getElementById("estornoDetalheBox");
  if(box) box.style.display=tipo==="estorno"?"block":"none";

  if(info) info.textContent=

    tipo==="estorno"?"↩ Devolução — informe a forma e nome da conta":
    "📋 Só registrar a diferença no log";
  const btnConf=document.getElementById("btnConfirmarRetirar");
  if(btnConf){ btnConf.style.display="block"; btnConf.style.opacity="1"; }
}

async function executarRetirarSeguir(id,resolucao,valorAbatido,descItens){
  document.getElementById("retMsg").innerHTML=`<div class="muted">Salvando…</div>`;
  const itensFiltrados=window.itensEdit.filter(i=>i.quantidade>0);
  const ped=window.pedidoEditOrig;
  try{
    const itensOriginais=window.itensEdit;
    // Item removido de verdade = marcado como removido OU zerado, mas SÓ conta
    // como alteração física (precisa voltar pra separação) se esse item tinha
    // algo realmente separado antes (temQtd>0). Se já tinha 0 (nunca foi
    // encontrado) e continua em 0, não mudou nada em relação ao que foi
    // fisicamente separado — não precisa voltar pra separação por causa dele.
    const itensRemovidos=itensOriginais.filter(i=>(i._removido||i.quantidade===0)&&(i.temQtd||0)>0);
    // Quantidade diferente da que foi separada (temQtd) → alteração real
    const itensComQtdAlterada=itensOriginais.filter(i=>
      !i._removido && i.quantidade>0 && i._teveFalta && i.temQtd>0 && i.quantidade!==i.temQtd
    );
    const itensNovosAdd=itensOriginais.filter(i=>i._novo&&!i._removido&&i.quantidade>0);

    // Regra:
    // → Confirmou com a qtd que tinha (temQtd) = vai para SEPARADO
    // → Removeu item que tinha algo separado, OU mudou qtd, OU adicionou item novo = volta para EM SEPARAÇÃO
    const temAlteracao = itensRemovidos.length>0 || itensComQtdAlterada.length>0 || itensNovosAdd.length>0;
    const destinoSit  = temAlteracao ? SIT.EM_SEP : SIT.SEPARADO;
    const logEvento   = temAlteracao ? "pendencias_voltou_separacao" : "pendencias_confirmadas_separado";

    // Notificação para expedição — itens totalmente removidos, com quantidade
    // reduzida, E itens novos acrescentados (tudo que precisa de ajuste na separação)
    if(temAlteracao&&(itensRemovidos.length>0||itensComQtdAlterada.length>0||itensNovosAdd.length>0)){
      const detalhesItens=[
        ...itensRemovidos.map(i=>({descricao:i.descricao,tipo:"removido_total",quantidadeOriginal:i.quantidadeOriginal||i.quantidade})),
        ...itensComQtdAlterada.map(i=>({descricao:i.descricao,tipo:"reduzido",quantidadeOriginal:i.quantidade,quantidadeNova:i.temQtd,quantidadeRemover:i.quantidade-i.temQtd})),
        ...itensNovosAdd.map(i=>({descricao:i.descricao,tipo:"adicionado",quantidadeNova:i.quantidade})),
      ];
      await fetch(B+"/api/log/"+id,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({evento:"itens_removidos_conferencia",funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome,
          detalhes:{itens:itensRemovidos.map(i=>i.descricao),itensDetalhado:detalhesItens,motivo:"ajuste na resolução de pendências"}})}).catch(()=>{});
    }

    const rItens=await fetch(B+"/api/pedidos/"+id+"/itens",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({itens:itensFiltrados.map(i=>({produtoId:i.produtoId,quantidade:i.quantidade,valor:i.valor}))})});
    const jItens=await rItens.json();
    if(!rItens.ok) throw new Error("Erro ao salvar itens: "+(jItens.erro||JSON.stringify(jItens).slice(0,100)));
    console.log("Itens salvos:",itensFiltrados.map(i=>({desc:i.descricao,produtoId:i.produtoId,qtd:i.quantidade})));
    await fetch(B+"/api/pedidos/"+id+"/situacao",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({idSituacao:destinoSit,funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome})});
    await fetch(B+"/api/pendencias/"+id,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:"resolvido"})}).catch(()=>{});

    // Montar observação para salvar no Bling
    if(resolucao!=="ok"&&(valorAbatido>0.01||resolucao==="pagamento_adicional")){
      const histPag=(await fetch(B+"/api/pagamentos/"+id).then(r=>r.json()).catch(()=>({}))).data?.historico||[];
      const histTxt=histPag.map(h=>`${h.formaNome||""}:${brl(h.valor||0)}`).join(", ");
      let obs="";
      if(resolucao==="estorno"){
        const contaNome=window._estornoContaNome||"";
        obs=`Estorno de ${brl(valorAbatido)} via ${window._estornoFormaNome||""}${contaNome?` para ${contaNome}`:""} em decorrência de pendências nos itens: ${descItens||""}. Pgto original: ${histTxt}`;
      } else if(resolucao==="credito"){
        obs=`Crédito de ${brl(valorAbatido)} registrado para o cliente em decorrência de pendências: ${descItens||""}. Pgto original: ${histTxt}`;
      } else if(resolucao==="pagamento_adicional"){
        obs=`Pgto adicional de ${brl(valorAbatido)} via ${window._novaFormaNome||""} referente a ajuste de itens: ${descItens||""}. Pgto anterior: ${histTxt}`;
      } else {
        obs=`Diferença de ${brl(valorAbatido)} registrada. Ajuste nos itens: ${descItens||""}. Pgto: ${histTxt}`;
      }
      if(obs) await fetch(B+"/api/pedidos/"+id+"/observacao",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({texto:obs,funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome})}).catch(()=>{});
      
      // Pagamento adicional — registra nova forma
      if(resolucao==="pagamento_adicional"&&window._novaFormaId){
        await fetch(B+"/api/pagamentos/"+id,{method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({valor:valorAbatido,formaId:window._novaFormaId,formaNome:window._novaFormaNome,funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome,adicional:true})}).catch(()=>{});
      }
      // Estorno — registra no pagamento
      if(resolucao==="estorno"&&valorAbatido>0){
        await fetch(B+"/api/pagamentos/"+id+"/estorno",{method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({valor:valorAbatido,formaId:window._estornoFormaId,formaNome:window._estornoFormaNome,contaNome:window._estornoContaNome||"",funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome})}).catch(()=>{});
      }
    }

    if(resolucao==="credito"&&valorAbatido>0&&ped?.contato?.id){
      await fetch(B+"/api/fluxo/"+id+"/confirmar-entrega",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome,itensNaoEntregues:[],itensDanificados:[],valorAbatido,resolucao:"credito",clienteId:ped.contato.id,clienteNome:ped.contato.nome})}).catch(()=>{});
    }
    const formaEstorno=resolucao==="estorno"?{formaId:window._estornoFormaId,formaNome:window._estornoFormaNome}:null;
    await fetch(B+"/api/log/"+id,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({evento:logEvento,funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome,detalhes:{itensAjustados:itensFiltrados.length,valorAbatido,resolucao,formaEstorno,voltouSep:temAlteracao}})}).catch(()=>{});
    fecharModal(); await carregar();
    if(resolucao==="credito") alert(`✅ Pendências retiradas!
💳 Crédito de ${brl(valorAbatido)} registrado para ${ped?.contato?.nome||"o cliente"}.`);
    if(resolucao==="estorno") alert(`✅ Pendências retiradas!
↩ Estorno de ${brl(valorAbatido)} via ${window._estornoFormaNome||""}. Efetue o estorno manualmente.`);
  }catch(e){ document.getElementById("retMsg").innerHTML=`<div class="err">Erro ao salvar: ${esc(e.message||"desconhecido")}</div>`; console.error("executarRetirarSeguir erro:",e); }
}

// Quando o pedido foi criado como ENTREGA (tem frete) mas o cliente está
// retirando em loja — pergunta e remove o frete do pedido no Bling antes
// de seguir com o recebimento normal.
async function iniciarRecebimentoAguardando(id,total,temFrete,freteVal,modo,jaPagoTotal){
  if(!temFrete){
    if(modo==="clienteSeparou"){
      if(jaPagoTotal) return moverParaSeparadoJaPago(id,total);
      return receberEClienteJaSeparou(id,total);
    }
    return abrirPagamento(id,total);
  }
  const ok=confirm(
    `Este pedido foi criado como ENTREGA (frete de ${brl(freteVal)}).\n\n`+
    `Ao confirmar o pagamento a seguir, o frete será removido do pedido (o pedido no Bling é atualizado e fica registrado na observação) `+
    `e o valor cobrado será sem o frete: ${brl(total-freteVal)}.\n\n`+
    `Confirma que o cliente vai retirar em loja?`
  );
  if(!ok) return;
  // NÃO remove o frete ainda — só marca como pendente. A conversão de verdade
  // só acontece quando o pagamento for realmente confirmado (se cancelar a
  // tela de pagamento, nada é alterado no Bling).
  window._pendenteConverterRetirada=id;
  const novoTotal=+(total-freteVal).toFixed(2);
  if(modo==="clienteSeparou") return receberEClienteJaSeparou(id,novoTotal);
  return abrirPagamento(id,novoTotal);
}

// Executa a conversão entrega→retirada (remove frete) que ficou pendente,
// só chamado no momento em que o pagamento é realmente confirmado.
async function commitarConversaoRetiradaSePendente(id){
  if(window._pendenteConverterRetirada!==id) return {ok:true};
  try{
    const r=await fetch(B+"/api/fluxo/"+id+"/converter-retirada",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome})});
    const j=await r.json();
    if(!r.ok||j.erro) return {ok:false,erro:j.erro||"Erro ao remover frete"};
    window._pendenteConverterRetirada=null;
    return {ok:true};
  }catch(e){ return {ok:false,erro:"Erro de conexão ao remover frete"}; }
}

async function moverParaSeparadoJaPago(id,total){
  if(!confirm(`Este pedido já está pago (${brl(total)}).\n\nConfirma mover direto pra SEPARADO?`)) return;
  showMsg(id,`<div class="muted">Movendo para Separado…</div>`);
  try{
    const r=await fetch(B+"/api/pedidos/"+id+"/situacao",{method:"PATCH",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({idSituacao:SIT.SEPARADO,funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome})});
    const j=await r.json();
    if(r.ok&&!j.erro){
      await fetch(B+"/api/log/"+id,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({evento:"recebido_cliente_separou",funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome,detalhes:{total,jaEstavaPago:true}})}).catch(()=>{});
      await carregar();
    } else showMsg(id,`<div class="err">${esc(j.erro||"Erro ao mover para Separado")}</div>`);
  }catch(e){ showMsg(id,`<div class="err">Erro de conexão</div>`); }
}

async function receberEClienteJaSeparou(id, total){
  abrirPagamento(id, total, "clienteSeparou");
}

async function voltarAguardando(id){
  if(!confirm("Voltar o pedido para Aguardando Separação?")) return;
  showMsg(id,`<div class="muted">Voltando…</div>`);
  try{
    // verifica se tinha pagamento para exigir re-pagamento
    const rPag=await fetch(B+"/api/pagamentos/"+id).then(r=>r.json());
    const pag=rPag.data;
    const r=await fetch(B+"/api/pedidos/"+id+"/situacao",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({idSituacao:SIT.AGUARDANDO,funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome})});
    const j=await r.json();
    if(r.ok&&!j.erro){
      if(pag?.statusPagamento==="pago"){
        // registra no log e reseta pagamento
        await fetch(B+"/api/log/"+id,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({evento:"voltou_aguardando_pago",funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome,detalhes:{valorPagoAntes:pag.valorPago}})}).catch(()=>{});
        // marca como pendente (resetar)
        await fetch(B+"/api/pagamentos/"+id+"/resetar",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome})}).catch(()=>{});
      }
      await carregar();
    } else showMsg(id,`<div class="err">${esc(j.erro||"Erro")}</div>`);
  }catch(e){ showMsg(id,`<div class="err">Erro de conexão</div>`); }
}

// parcelas de pagamento (igual ao Bling)
let _parcelas=[];
function abrirPagamento(id,total,modo){
  window._pagModo=modo||"receber"; // "receber" = manda pra Em Separação; "clienteSeparou" = vai direto pra Separado
  window._pagSubstituir=window._pagModo==="clienteSeparou";
  _parcelas=[{valor:Number(total).toFixed(2),formaId:formasPag[0]?.id||"",formaNome:formasPag[0]?.nome||"",obs:""}];
  window._pagTotal=Number(total);
  renderModalPagamento(id,total);
}
function renderModalPagamento(id,total){
  const opts=formasPag.map(f=>`<option value="${f.id}">${esc(f.nome||f.id)}</option>`).join("");
  const somaParcelas=_parcelas.reduce((s,p)=>s+parseFloat(p.valor||0),0);
  const diff=+(Number(total)-somaParcelas).toFixed(2);
  const rows=_parcelas.map((p,ix)=>`
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap">
      <span style="font-size:11px;color:#9a95c9;min-width:20px">${ix+1}</span>
      <input type="number" step="0.01" min="0" value="${p.valor}" style="width:110px;padding:8px;background:#0f0d24;border:1px solid #514c96;border-radius:8px;color:#fff;font-size:13px"
        onchange="_parcelas[${ix}].valor=Math.max(0,parseFloat(this.value)||0);renderModalPagamento(${id},${total})">
      <select style="flex:1;padding:8px;background:#0f0d24;border:1px solid #514c96;border-radius:8px;color:#fff;font-size:12px"
        onchange="_parcelas[${ix}].formaId=this.value;_parcelas[${ix}].formaNome=this.options[this.selectedIndex].text">
        ${formasPag.map(f=>`<option value="${f.id}" ${f.id==p.formaId?'selected':''}>${esc(f.nome||f.id)}</option>`).join("")}
      </select>
      <input placeholder="Obs." value="${esc(p.obs||'')}" style="width:90px;padding:8px;background:#0f0d24;border:1px solid #514c96;border-radius:8px;color:#fff;font-size:12px"
        onchange="_parcelas[${ix}].obs=this.value">
      ${_parcelas.length>1?`<button onclick="_parcelas.splice(${ix},1);renderModalPagamento(${id},${total})" style="background:none;border:none;color:#ff8090;cursor:pointer;font-size:18px">✕</button>`:""}
    </div>`).join("");
  document.getElementById("modal").style.display="flex";
  document.getElementById("mbox").innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3>💰 Receber Pagamento</h3>
      <span style="color:#ffd23f;font-weight:900">${brl(total)}</span>
    </div>
    ${rows}
    <button class="btn btn-ghost" style="width:100%;margin-bottom:10px;font-size:12px"
      onclick="_parcelas.push({valor:'${diff>0?diff.toFixed(2):'0.00'}',formaId:formasPag[0]?.id||'',formaNome:formasPag[0]?.nome||'',obs:''});renderModalPagamento(${id},${total})">
      + Adicionar parcela ${diff>0?`(falta ${brl(diff)})`:''}</button>
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--border);margin-bottom:10px;font-size:13px">
      <span>Total parcelas:</span>
      <b style="color:${Math.abs(diff)<0.01?'#2f9e6b':diff<0?'#e5563f':'#ffd23f'}">${brl(somaParcelas)} ${Math.abs(diff)<0.01?'✅':diff>0?`(falta ${brl(diff)})`:``}</b>
    </div>
    <div id="pMsg"></div>
    <div style="display:flex;gap:8px">
      ${window._pagModo==="clienteSeparou"
        ?`<button class="btn btn-blue" style="flex:1" onclick="confirmarPagamentoClienteSeparou(${id})">✅ Confirmar — SEPARADO (separação pelo cliente)</button>`
        :`<button class="btn btn-grn" style="flex:1" onclick="confirmarPagamento(${id})">✅ Confirmar e enviar pra separação</button>`}
      <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
    </div>`;
}

async function confirmarPagamentoClienteSeparou(id){
  const totalParcelas=+_parcelas.reduce((s,p)=>s+parseFloat(p.valor||0),0).toFixed(2);
  const totalPedido=+window._pagTotal;
  const diff=+(totalParcelas-totalPedido).toFixed(2);
  if(!totalParcelas||totalParcelas<=0){ document.getElementById("pMsg").innerHTML=`<div class="err">Informe o valor</div>`; return; }
  if(Math.abs(diff)>0.01){ document.getElementById("pMsg").innerHTML=`<div class="err">❌ Valor das parcelas (${brl(totalParcelas)}) não bate com o total do pedido (${brl(totalPedido)}). Corrija antes de confirmar.</div>`; return; }
  document.getElementById("pMsg").innerHTML=`<div class="muted">Confirmando…</div>`;
  const conv=await commitarConversaoRetiradaSePendente(id);
  if(!conv.ok){ document.getElementById("pMsg").innerHTML=`<div class="err">${esc(conv.erro)}</div>`; return; }
  document.getElementById("pMsg").innerHTML=`<div class="muted">Registrando pagamento…</div>`;
  try{
    const rPag=await fetch(B+"/api/pagamentos/"+id,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({valor:totalParcelas,parcelas:_parcelas,formaId:_parcelas[0]?.formaId,formaNome:_parcelas[0]?.formaNome,funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome,substituir:true,valorEsperado:totalPedido})});
    const jPag=await rPag.json();
    if(!rPag.ok||jPag.erro){ document.getElementById("pMsg").innerHTML=`<div class="err">${esc(jPag.erro||"Erro ao registrar pagamento")}</div>`; return; }
    document.getElementById("pMsg").innerHTML=`<div class="muted">Movendo para Separado…</div>`;
    const r=await fetch(B+"/api/pedidos/"+id+"/situacao",{method:"PATCH",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({idSituacao:SIT.SEPARADO,funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome})});
    const j=await r.json();
    if(r.ok&&!j.erro){
      await fetch(B+"/api/log/"+id,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({evento:"recebido_cliente_separou",funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome,detalhes:{total:totalParcelas}})}).catch(()=>{});
      fecharModal(); await carregar();
    } else document.getElementById("pMsg").innerHTML=`<div class="err">${esc(j.erro||"Erro ao mover para Separado")}</div>`;
  }catch(e){ document.getElementById("pMsg").innerHTML=`<div class="err">Erro de conexão</div>`; }
}

async function confirmarPagamento(id){
  const totalParcelas=+_parcelas.reduce((s,p)=>s+parseFloat(p.valor||0),0).toFixed(2);
  const totalPedido=+window._pagTotal;
  const diff=+(totalParcelas-totalPedido).toFixed(2);
  if(!totalParcelas||totalParcelas<=0){ document.getElementById("pMsg").innerHTML=`<div class="err">Informe o valor</div>`; return; }
  if(diff>0.01){ document.getElementById("pMsg").innerHTML=`<div class="err">❌ Valor das parcelas (${brl(totalParcelas)}) é maior que o total do pedido (${brl(totalPedido)}). Corrija antes de confirmar.</div>`; return; }
  if(diff<-0.01){ document.getElementById("pMsg").innerHTML=`<div class="err">❌ Valor das parcelas (${brl(totalParcelas)}) é menor que o total do pedido (${brl(totalPedido)}). Corrija antes de confirmar.</div>`; return; }
  const total=totalParcelas;
  document.getElementById("pMsg").innerHTML=`<div class="muted">Confirmando…</div>`;
  const conv=await commitarConversaoRetiradaSePendente(id);
  if(!conv.ok){ document.getElementById("pMsg").innerHTML=`<div class="err">${esc(conv.erro)}</div>`; return; }
  document.getElementById("pMsg").innerHTML=`<div class="muted">Registrando…</div>`;
  try{
    const r=await fetch(B+"/api/fluxo/"+id+"/enviar-separacao",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({funcionarioId:FUNC.id,funcionarioNome:FUNC.nome,pagamento:{valor:total,parcelas:_parcelas,formaId:_parcelas[0]?.formaId,formaNome:_parcelas[0]?.formaNome}})});

    if(r.ok&&j.ok){ fecharModal(); await carregar(); }
    else document.getElementById("pMsg").innerHTML=`<div class="err">${esc(j.erro||"Erro")}</div>`;
  }catch(e){ document.getElementById("pMsg").innerHTML=`<div class="err">Erro de conexão</div>`; }
}

window.retirarItem=function(ix){ window.itensEdit.splice(ix,1); const ped=window.pedidoEditOrig; renderModalEditar(window.pedidoEditId,ped,window.itensEdit,pags[String(window.pedidoEditId)],[],[],window.confLog||[]); };

window.buscarProdEdit=function(term){

async function salvarEdicao(){
  const id=window.pedidoEditId;
  document.getElementById("editMsg").innerHTML=`<div class="muted">Salvando…</div>`;
  try{
    const novos=window.itensEdit.filter(i=>!i._orig);
    const retirados=[]; // comparar com original
    const r=await fetch(B+"/api/pedidos/"+id+"/itens",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({itens:window.itensEdit.map(i=>({produtoId:i.produtoId,quantidade:i.quantidade,valor:i.valor}))})});
    const j=await r.json();
    if(r.ok&&!j.erro){
      // se tinha novos ou retirados, registrar acréscimo e voltar pra expedição
      if(novos.length||retirados.length){
        await fetch(B+"/api/fluxo/"+id+"/acrescimo",{method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({pedidoId:id,numero:window.pedidoEditOrig.numero,cliente:window.pedidoEditOrig.contato?.nome||"",itensNovos:novos,itensRetirados:retirados})});
      }
      // liberar lock de edição
      if(window._editLockId && FUNC && !window._editSoVis){
        fetch(B+"/api/separacoes/"+window._editLockId,{method:"DELETE",headers:{"Content-Type":"application/json"},body:JSON.stringify({funcionarioId:FUNC.id,funcionarioNome:FUNC.nome,tipo:"edicao"})}).catch(()=>{});
        if(window._editHeartbeat){clearInterval(window._editHeartbeat);window._editHeartbeat=null;}
        window._editLockId=null;
      }
      fecharModal(); await carregar();
    } else document.getElementById("editMsg").innerHTML=`<div class="err">${esc(j.erro||"Erro")}</div>`;
  }catch(e){ document.getElementById("editMsg").innerHTML=`<div class="err">Erro de conexão</div>`; }
}

}

function tirarFotoConferencia(id){
  const input=document.createElement("input"); input.type="file"; input.accept="image/*,video/*"; input.capture="environment";
  input.onchange=async(e)=>{
    const file=e.target.files[0]; if(!file) return;
    if(file.type.startsWith("video/")){
      window._confFoto=URL.createObjectURL(file);
    } else {
      const canvas=document.createElement("canvas"); const img=new Image();
      img.onload=()=>{
        const MAX=1200; let w=img.width,h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        canvas.width=w; canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        window._confFoto=canvas.toDataURL("image/jpeg",0.8);
        renderConferencia(id,window.confPed,window.confItems,window.confPag,window.confAcr,"itens");
      };
      img.src=URL.createObjectURL(file);
      return;
    }
    renderConferencia(id,window.confPed,window.confItems,window.confPag,window.confAcr,"itens");
  };
  input.click();
}

async function confirmarDestino(id,tipo){
  const pag=window.confPag; const isPago=pag?.statusPagamento==="pago";
  const total=+(window.confPed?.total||0); const pago=+(pag?.valorPago||0); const saldo=+(total-pago).toFixed(2);
  if(tipo==="retirada"&&!isPago){
    document.getElementById("confMsg").innerHTML=`<div class="err" style="background:#3a0010;border:1px solid #ff0044">
      🔴 Retirada bloqueada — pagamento pendente (falta ${brl(saldo)})<br>
      <small>O cliente precisa pagar antes de retirar o pedido.</small></div>`;
    return;
  }
  document.getElementById("confMsg").innerHTML=`<div class="muted">Finalizando…</div>`;
  // salvar foto da conferência no log se tiver
  if(window._confFoto&&window._confFoto.startsWith("data:")){
    fetch(B+"/api/log/"+id,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({evento:"foto_conferencia",funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome,detalhes:{foto:window._confFoto.slice(0,100)+"..."}})}).catch(()=>{});
  }
  try{
    const r=await fetch(B+"/api/fluxo/"+id+"/conferido",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({funcionarioId:FUNC?.id,funcionarioNome:FUNC?.nome,tipoEntrega:tipo})});
    const j=await r.json();
    if(r.ok&&j.ok){
      fecharModal(); await carregar();
      const msg=tipo==="retirada"?"✅ Pedido liberado para RETIRADA — marcado como VERIFICADO!":
        (j.pago?"✅ Pedido para ENTREGA — marcado como VERIFICADO!":"📦 Pedido para ENTREGA — marcado como CONFERIDO PARA ENTREGA (pagar na entrega).");
      alert(msg);
    } else document.getElementById("confMsg").innerHTML=`<div class="err">${esc(j.erro||"Erro")}</div>`;
  }catch(e){ document.getElementById("confMsg").innerHTML=`<div class="err">Erro de conexão</div>`; }
}

async function concluirConferencia(id){ await confirmarDestino(id,"entrega"); }

// init
document.getElementById("app").innerHTML=`<div class="top"><img src="${LOGO}"></div>`;
if(FUNC) iniciar(); else render();
</script>
