<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>B13 Bebidas — Pedido Atacado</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:Arial,Helvetica,sans-serif}
  :root{--indigo:#262366;--indigo2:#2b2870;--mag:#FF0082;--mag2:#FF0F86;--bg:#0f0d24}
  body{margin:0;background:var(--bg);color:#fff;overscroll-behavior:none}
  /* scrollbar estilizada */
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:#514c96;border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--mag)}
  * { scrollbar-width:thin; scrollbar-color:#514c96 var(--bg); }
  #app{max-width:900px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  .top{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--indigo2),var(--indigo));display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:3px solid var(--mag)}
  @media(max-width:480px){.top{padding:8px 10px}}
  .top img{height:46px}
  .top .t{font-weight:900;font-size:18px;letter-spacing:.5px}
  .top .sp{flex:1}
  .btn{border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:16px;padding:14px 18px;color:#fff;touch-action:manipulation}
  @media(max-width:480px){.btn{padding:13px 14px;font-size:15px}}
  .btn-mag{background:var(--mag)}
  .btn-out{background:transparent;border:2px solid #514c96}
  .btn-ghost{background:#1c1846}
  .btn:disabled{opacity:.4}
  .cartbtn{position:relative;background:var(--mag);color:#fff;border:none;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer;font-size:15px}
  .cartbtn .cnt{position:absolute;top:-8px;right:-8px;background:#fff;color:var(--indigo);border-radius:999px;min-width:22px;height:22px;font-size:12px;display:flex;align-items:center;justify-content:center;font-weight:900;padding:0 5px}
  .wrap{flex:1;padding:16px}
  @media(max-width:480px){.wrap{padding:10px}}
  .center{max-width:520px;margin:5vh auto;text-align:center}
  h1{font-size:26px;margin:0 0 6px}
  .sub{color:#b9b4e6;margin-bottom:22px}
  input{width:100%;padding:14px;border-radius:12px;border:2px solid #514c96;background:#151233;color:#fff;font-size:16px;margin:8px 0}
  @media(max-width:480px){input{padding:13px;font-size:15px}}
  input:focus{outline:none;border-color:var(--mag)}
  .big{padding:18px;font-size:19px;width:100%;margin-top:10px}
  .searchbar{position:sticky;top:70px;z-index:6;background:var(--bg);padding:8px 12px;display:flex;gap:8px}
  @media(max-width:480px){.searchbar{padding:6px 10px;top:62px}}
  .searchbar input{margin:0;font-size:16px}
  .clr{background:#1c1846;border:none;color:#fff;border-radius:12px;padding:0 16px;font-weight:800;cursor:pointer;font-size:16px}
  .cats{display:flex;gap:8px;overflow-x:auto;padding:8px 16px;position:sticky;top:136px;background:var(--bg);z-index:5}
  .cat{white-space:nowrap;padding:10px 14px;border-radius:999px;background:#1c1846;color:#cfc9f5;font-weight:700;border:2px solid transparent;cursor:pointer;font-size:14px}
  .cat.on{background:var(--mag);color:#fff}
  .layout{display:flex;gap:14px;align-items:flex-start}
  .side{display:none}
  @media(min-width:760px){
    .side{display:flex;flex-direction:column;gap:6px;width:220px;flex-shrink:0;position:sticky;top:130px;max-height:calc(100vh - 150px);overflow:auto}
    .side .scat{padding:12px 14px;border-radius:10px;background:#1c1846;color:#cfc9f5;font-weight:700;cursor:pointer;font-size:14px;border:2px solid transparent}
    .side .scat.on{background:var(--mag);color:#fff}
  }
  .grid{display:grid;grid-template-columns:1fr;gap:10px}
  @media(min-width:480px){.grid{grid-template-columns:1fr 1fr}}
  @media(min-width:760px){.grid{grid-template-columns:1fr 1fr 1fr}}
  .card{background:#151233;border:1px solid #2c2660;border-radius:14px;padding:12px}
  .card .nm{font-weight:800;font-size:16px}
  .pimg{width:100%;height:96px;object-fit:contain;background:#fff;border-radius:8px;margin-bottom:8px}
  .card .obs{font-size:11px;color:#9a95c9;font-weight:700}
  .card .pr{color:#ffd23f;font-weight:900;margin-top:4px}
  .card .cx{font-size:12px;color:#b9b4e6}
  .card .est{font-size:11px;color:#8f8ac0;margin-top:2px}
  .esg{opacity:.55}
  .tag{display:inline-block;background:#3a2030;color:#ff9db0;font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;margin-top:4px}
  .addrow{display:flex;gap:8px;margin-top:10px;align-items:center}
  .addrow .btn{flex:1}
  .flavs{display:flex;flex-direction:column;gap:6px;margin-top:8px}
  .flav{display:flex;justify-content:space-between;align-items:center;gap:8px;background:#1c1846;border:1px solid #2c2660;border-radius:10px;padding:8px 10px;font-size:13px}
  .flav button{background:var(--mag);border:none;color:#fff;border-radius:8px;padding:8px 12px;font-weight:800;cursor:pointer}
  .flav.esg{opacity:.5}
  .step{display:flex;align-items:center;gap:12px}
  .step button{width:48px;height:48px;border-radius:10px;border:none;background:var(--mag);color:#fff;font-size:22px;font-weight:900;cursor:pointer;touch-action:manipulation}
  @media(max-width:480px){.step button{width:52px;height:52px;font-size:24px}}
  .step .q{font-weight:900;font-size:16px;min-width:74px;text-align:center}
  .line{display:flex;justify-content:space-between;align-items:center;gap:10px;background:#151233;border:1px solid #2c2660;border-radius:12px;padding:12px;margin-bottom:8px}
  .line .info{flex:1}
  .line .rm{background:none;border:none;color:#ff8090;font-size:20px;cursor:pointer}
  .bar{position:sticky;bottom:0;background:linear-gradient(0deg,var(--indigo) 40%,transparent);padding:14px 16px}
  .barbox{background:#151233;border:1px solid #2c2660;border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px}
  .barbox .tot{flex:1;font-weight:900;font-size:20px}
  .warn{background:#3a2030;color:#ffbfce;border-radius:10px;padding:10px 12px;font-size:13px;font-weight:700;margin:8px 0}
  .ok{background:#183a2a;color:#a8f0c8;border-radius:10px;padding:10px 12px;font-size:13px;font-weight:700;margin:8px 0}
  .radio{display:flex;gap:10px;margin:10px 0}
  .radio label{flex:1;background:#151233;border:2px solid #514c96;border-radius:12px;padding:16px;text-align:center;font-weight:800;cursor:pointer}
  .radio label.on{border-color:var(--mag);color:var(--mag)}
  .muted{color:#9a95c9;font-size:13px}
  .chk{display:flex;gap:10px;align-items:flex-start;margin:10px 0;font-size:14px}
  .chk input{width:22px;height:22px;margin-top:2px}
  @media print{ body *{visibility:hidden} #recibo,#recibo *{visibility:visible} #recibo{position:absolute;left:0;top:0;width:100%;color:#000;padding:10px} }
  #recibo{display:none}
  /* modo tabela responsivo */
  @media(max-width:700px){
    #tabelaGrid{grid-template-columns:repeat(2,1fr) !important}
    #tabelaGrid > div:nth-child(2n){border-right:none !important}
    #tabelaGrid > div{border-right:1px solid var(--mag) !important}
  }
  @media(max-width:420px){
    #tabelaGrid{grid-template-columns:1fr !important}
    #tabelaGrid > div{border-right:none !important}
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="recibo"></div>
<script>
const BACKEND=(location.protocol.indexOf("http")===0)?"":"https://b13-bling-backend-production.up.railway.app"; // hospedado: mesmo servidor; local: Railway
const LOGO="/logo";
const WHATS="5531999719888";
const MIN_ID=100, MIN_ANON=600;

let CAT=null, META={}, ERRO=null;
let S = novoEstado();
function novoEstado(){ return { etapa:"splash", modo:"catalogo", doc:"", identificado:false, docNome:null, docInfo:null, docChecado:false, catAtiva:0, busca:"", expandido:null,
  carrinho:{}, nome:"", telefone:"", email:"", confDoc:false, entrega:"", endereco:"", end:{cep:"",rua:"",numero:"",complemento:"",bairro:"",cidade:"",uf:""}, cepMsg:"", frete:null, freteMsg:"", enviando:false, resultado:null }; }

const brl=(v)=>Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const soDig=(s)=>(s||"").replace(/\D/g,"");
function validaCPF(c){ c=soDig(c); if(c.length!==11||/^(\d)\1+$/.test(c))return false; let s=0; for(let i=0;i<9;i++)s+=+c[i]*(10-i); let d1=11-(s%11); if(d1>=10)d1=0; if(d1!==+c[9])return false; s=0; for(let i=0;i<10;i++)s+=+c[i]*(11-i); let d2=11-(s%11); if(d2>=10)d2=0; return d2===+c[10]; }
function validaCNPJ(c){ c=soDig(c); if(c.length!==14||/^(\d)\1+$/.test(c))return false; const calc=(x)=>{let n=0,p=x-7; for(let i=x;i>=1;i--){n+=+c[x-i]*p--; if(p<2)p=9;} const r=11-(n%11); return r>9?0:r;}; return calc(12)===+c[12]&&calc(13)===+c[13]; }
function docValido(d){ d=soDig(d); return d.length===11?validaCPF(d):d.length===14?validaCNPJ(d):false; }
const esc=(s)=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
function maxUnid(estoque,un){ un=un||1; return Math.floor((estoque||0)/un)*un; }

async function carregarCatalogo(){
  try{
    const r=await fetch(BACKEND+"/api/catalogo"); const j=await r.json();
    CAT=j.categorias||[]; META=j.meta||{}; ERRO=null;
  }catch(e){ ERRO="Não consegui carregar o catálogo. Verifique a conexão."; }
  render();
}

// ------- helpers de produto/sabor -------
function ordenarSabores(sabores){
  return [...sabores].sort((a,b)=>{
    const tA=/(tradicional|original)/i.test(a.nome)?1:0;
    const tB=/(tradicional|original)/i.test(b.nome)?1:0;
    if(tB!==tA) return tB-tA; // tradicional/original primeiro
    return (b.estoque||0)-(a.estoque||0); // depois por maior estoque
  });
}
function saboresDisp(p){ return ordenarSabores((p.sabores||[]).filter(s=>maxUnid(s.estoque,p.un)>0)); }
function produtoDisp(p){ return saboresDisp(p).length>0; }
function todosProdutos(){ const arr=[]; (CAT||[]).forEach(c=>c.produtos.forEach(p=>arr.push({...p,cat:c.nome}))); return arr; }

// ------- carrinho -------
function addItem(prod, sabor){
  const cap=maxUnid(sabor.estoque, prod.un);
  if(cap<=0) return;
  const key=String(sabor.codigo);
  const at=S.carrinho[key];
  const nova=(at?at.qtd:0)+prod.un;
  if(nova>cap){ if(!at){ S.carrinho[key]={codigo:sabor.codigo,id:sabor.id,nomeProduto:prod.nome,sabor:sabor.nome,preco:prod.preco,un:prod.un,estoque:sabor.estoque,imagem:(sabor.imagem||prod.imagem||''),qtd:cap}; } render(); return; }
  S.carrinho[key]={codigo:sabor.codigo,id:sabor.id,nomeProduto:prod.nome,sabor:sabor.nome,preco:prod.preco,un:prod.un,estoque:sabor.estoque,imagem:(sabor.imagem||prod.imagem||''),qtd:nova};
  render();
}
function mudaQtd(key,delta){
  const it=S.carrinho[key]; if(!it) return;
  const cap=maxUnid(it.estoque,it.un);
  let q=it.qtd+delta*it.un;
  if(q<=0){ delete S.carrinho[key]; render(); return; }
  if(q>cap) q=cap;
  it.qtd=q; render();
}
function removeItem(key){ delete S.carrinho[key]; render(); }
function itens(){ return Object.entries(S.carrinho).map(([k,v])=>({key:k,...v})); }
function subtotal(){ return itens().reduce((s,i)=>s+i.preco*i.qtd,0); }
function contagem(){ return itens().length; }
function minAtual(){ return S.docChecado ? (S.docNome?MIN_ID:MIN_ANON) : null; }

// ================= RENDER =================
function header(showCart){
  const modoBtn = S.etapa==="catalogo"
    ? `<button class="btn btn-ghost" style="padding:8px 10px;font-size:12px" onclick="S.modo=S.modo==='tabela'?'catalogo':'tabela';S.expandido=null;render()">
        ${S.modo==="tabela"?"☰ Catálogo":"⊞ Tabela"}</button>`
    : "";
  return `<div class="top"><img src="${LOGO}"><div class="t">PEDIDO ATACADO</div><div class="sp"></div>
    ${modoBtn}
    ${showCart?`<button class="cartbtn" onclick="irCarrinho()">🛒 ${contagem()>0?`<span class="cnt">${contagem()}</span>`:""}</button>`:""}
    ${S.etapa!=="inicio"?`<button class="btn btn-out" style="padding:10px 12px" onclick="recomecar(true)">Recomeçar</button>`:""}</div>`;
}
function render(){
  const app=document.getElementById("app");
  if(ERRO){ app.innerHTML=header(false)+`<div class="wrap"><div class="warn">${ERRO}</div><button class="btn btn-mag big" onclick="carregarCatalogo()">Tentar de novo</button></div>`; return; }
  if(!CAT){ app.innerHTML=header(false)+`<div class="center" style="padding-top:8vh">
    <div style="margin-bottom:20px">
      <div style="width:60px;height:60px;border:5px solid #2c2660;border-top-color:var(--mag);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto"></div>
    </div>
    <div style="font-weight:800;font-size:18px;margin-bottom:8px">Carregando catálogo…</div>
    <div style="color:#9a95c9;font-size:13px">Buscando produtos e estoque ao vivo</div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>`; return; }
  if(S.etapa==="splash") return telaSplash(app);
  if(S.etapa==="inicio") return telaInicio(app);
  if(S.etapa==="catalogo") return S.modo==="tabela" ? telaTabela(app) : telaCatalogo(app);
  if(S.etapa==="carrinho") return telaCarrinho(app);
  if(S.etapa==="checkout") return telaCheckout(app);
  if(S.etapa==="sucesso") return telaSucesso(app);
}

let _splashTimer=null;
function produtosDestaque(){
  const vistos=new Set(); const itens=[];
  todosProdutos().forEach(p=>{
    saboresDisp(p).forEach(s=>{
      if(!vistos.has(s.id)){
        vistos.add(s.id);
        itens.push({imagem:s.imagem,nome:s.nome||p.nome,preco:p.preco});
      }
    });
  });
  for(let i=itens.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [itens[i],itens[j]]=[itens[j],itens[i]]; }
  // pool bem maior, pra demorar bastante até repetir produto
  return itens.filter(i=>i.imagem).slice(0,60);
}

function cardProdutoHtml(it){
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:12px;flex:1;min-width:0;max-width:220px">
    <div style="background:#fff;border-radius:20px;padding:16px;box-shadow:0 16px 40px rgba(0,0,0,.4)">
      <img src="${it.imagem}" style="width:180px;height:180px;object-fit:contain;display:block">
    </div>
    <div style="background:linear-gradient(90deg,#FF0082,#ff4fa8);border-radius:10px;padding:7px 16px;font-weight:900;font-size:14px;max-width:220px;text-align:center;box-shadow:0 6px 16px rgba(255,0,130,.3)">
      ${esc((it.nome||"").toUpperCase())}
    </div>
    <div style="background:#181542;border:2px solid #FF0082;border-radius:10px;padding:5px 20px;font-weight:900;font-size:27px;color:#ffd23f;box-shadow:0 6px 18px rgba(0,0,0,.35)">
      ${brl(it.preco)}
    </div>
  </div>`;
}

let INSTAGRAM_POSTS=[];
async function carregarInstagramPosts(){
  try{
    const j=await fetch(B+"/api/instagram/posts").then(r=>r.json());
    INSTAGRAM_POSTS=(j.data||[]).filter(p=>p.imagem);
  }catch(e){ INSTAGRAM_POSTS=[]; }
  // se ainda estiver na tela splash, redesenha pra já usar os posts recém-carregados
  if(S.etapa==="splash") render();
}

let _instagramIdx=0;
function cardInstagramHtml(){
  if(INSTAGRAM_POSTS.length){
    const post=INSTAGRAM_POSTS[_instagramIdx%INSTAGRAM_POSTS.length];
    _instagramIdx++;
    return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;width:100%">
      <div style="position:relative;border-radius:22px;overflow:hidden;box-shadow:0 20px 50px rgba(238,42,123,.35);border:3px solid transparent;background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);padding:4px">
        <img src="${esc(post.imagem)}" style="width:220px;height:220px;object-fit:cover;display:block;border-radius:18px">
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ee2a7b" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="6"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.3" cy="6.7" r="1.1" fill="#ee2a7b" stroke="none"/></svg>
        <span style="font-size:22px;font-weight:900;background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);-webkit-background-clip:text;background-clip:text;color:transparent">@b13_bebidas</span>
      </div>
      ${post.legenda?`<div style="color:#e8e5ff;font-size:14px;max-width:420px;text-align:center;line-height:1.4">${esc(post.legenda)}</div>`:""}
    </div>`;
  }
  return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;width:100%">
    <div style="width:130px;height:130px;border-radius:32px;background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);display:flex;align-items:center;justify-content:center;box-shadow:0 20px 50px rgba(238,42,123,.4)">
      <svg width="70" height="70" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="6"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.3" cy="6.7" r="1.1" fill="#fff" stroke="none"/></svg>
    </div>
    <div style="font-size:26px;font-weight:900;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.5)">Siga a gente no Instagram</div>
    <div style="font-size:30px;font-weight:900;background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);-webkit-background-clip:text;background-clip:text;color:transparent">@b13_bebidas</div>
    <div style="color:#cfc9f5;font-size:15px">Ofertas, novidades e bastidores todo dia 🍻</div>
  </div>`;
}

function telaSplash(app){
  const itens=produtosDestaque();
  // monta os "slides": grupos de 3 produtos, com um card de Instagram a cada 4 rotações
  const grupos=[];
  for(let i=0;i<itens.length;i+=3) grupos.push(itens.slice(i,i+3));
  const slides=[];
  grupos.forEach((g,i)=>{
    slides.push({tipo:"produtos",itens:g});
    if((i+1)%4===0) slides.push({tipo:"instagram"});
  });
  if(!slides.length) slides.push({tipo:"produtos",itens:[]});

  const slidesHtml=slides.map((sl,i)=>`
    <div class="slideCard" data-i="${i}" style="
      position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;
      opacity:${i===0?1:0};transition:opacity 1.2s ease-in-out;padding:10px 24px">
      ${sl.tipo==="instagram"?cardInstagramHtml():`<div style="display:flex;width:100%;justify-content:center;gap:18px;flex-wrap:wrap">${sl.itens.map(cardProdutoHtml).join("")}</div>`}
    </div>
  `).join("");

  app.innerHTML=`
  <div onclick="if(_splashTimer)clearInterval(_splashTimer);S.etapa='inicio';render()" style="
    position:fixed;inset:0;display:flex;flex-direction:column;
    cursor:pointer;overflow:hidden;text-align:center;
    background:radial-gradient(circle at 50% 25%,#2b2870 0%,#181542 55%,#0c0a24 100%)">
    <div style="position:absolute;inset:0;background:
      repeating-linear-gradient(45deg,rgba(255,0,130,.03) 0 2px,transparent 2px 40px);pointer-events:none"></div>

    <div style="flex:0 0 auto;display:flex;flex-direction:column;align-items:center;z-index:1;padding:40px 24px 10px">
      <img src="${LOGO}" style="height:80px;margin-bottom:8px;filter:drop-shadow(0 0 24px rgba(255,0,130,.4))">
      <div style="font-size:16px;font-weight:900;letter-spacing:2px;color:#cfc9f5">ATACADO DE BEBIDAS · OFERTAS</div>
    </div>

    <div style="position:relative;flex:1 1 auto;width:100%;z-index:1;min-height:0">${itens.length?slidesHtml:`
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#9a95c9;font-size:18px;padding:0 30px">Monte seu pedido no atacado direto aqui</div>`}</div>

    <div id="tocarComecar" style="
      flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:14px;z-index:1;padding:20px 24px 50px">
      <div style="width:72px;height:72px;border-radius:50%;background:var(--mag,#FF0082);display:flex;align-items:center;justify-content:center;
        font-size:32px;animation:pulseAnel 1.6s ease-out infinite">👆</div>
      <div style="font-size:25px;font-weight:900;letter-spacing:2px;color:#fff;animation:pulseTexto 1.6s ease-in-out infinite;text-shadow:0 2px 10px rgba(0,0,0,.6)">TOQUE PARA COMEÇAR</div>
    </div>
  </div>
  <style>
    @keyframes pulseAnel{
      0%{box-shadow:0 0 0 0 rgba(255,0,130,.55)}
      70%{box-shadow:0 0 0 26px rgba(255,0,130,0)}
      100%{box-shadow:0 0 0 0 rgba(255,0,130,0)}
    }
    @keyframes pulseTexto{ 0%,100%{opacity:1} 50%{opacity:.45} }
  </style>`;

  // carrossel — troca a cada 5s com crossfade
  if(_splashTimer) clearInterval(_splashTimer);
  if(slides.length>1){
    let atual=0;
    _splashTimer=setInterval(()=>{
      const els=document.querySelectorAll(".slideCard");
      if(!els.length){ clearInterval(_splashTimer); return; }
      const prox=(atual+1)%els.length;
      els[atual].style.opacity=0;
      els[prox].style.opacity=1;
      atual=prox;
    },5000);
  }
}

  app.innerHTML=header(false)+`<div class="center">

    <div class="sub">Para começar seu pedido no atacado, identifique-se com CPF ou CNPJ.</div>

    <button class="btn btn-mag big" onclick="identificar()">Continuar</button>
    <button class="btn btn-ghost big" onclick="semIdentificacao()">Continuar sem identificação</button>
    <div style="margin:16px 0;border-top:1px solid #2c2660;padding-top:16px">
      <div class="muted" style="margin-bottom:10px">Prefere ver tudo de uma vez?</div>

async function identificar(){
  const d=soDig(S.doc);
  if(!docValido(d)){ alert("CPF ou CNPJ inválido. Confira os números."); return; }
  S.identificado=true; S.doc=d;
  await checarDoc();
  S.etapa="catalogo"; S.catAtiva=0; render();
}
function semIdentificacao(){ S.identificado=false; S.doc=""; S.docNome=null; S.docInfo=null; S.docChecado=false; S.etapa="catalogo"; S.catAtiva=0; render(); }
async function checarDoc(){
  const d=soDig(S.doc);
  if(d.length!==11 && d.length!==14){ S.docNome=null; S.docChecado=false; render(); return; }
  try{
    const r=await fetch(BACKEND+"/api/contatos?doc="+d);
    const j=await r.json();
    if(j.encontrado && j.contato){
      const c=j.contato;
      S.docNome = c.nome||"Cliente cadastrado";
      S.docInfo = c; // guarda dados completos para exibir
      // pré-preenche TODOS os campos com dados do cadastro
      if(c.nome) S.nome=c.nome;
      if(c.celular||c.telefone) S.telefone=c.celular||c.telefone;
      if(c.email) S.email=c.email;
      // endereço
      const end=c.endereco||{};
      if(end.cep) S.end.cep=end.cep;
      if(end.rua) S.end.rua=end.rua;
      if(end.numero) S.end.numero=end.numero;
      if(end.complemento) S.end.complemento=end.complemento;
      if(end.bairro) S.end.bairro=end.bairro;
      if(end.cidade) S.end.cidade=end.cidade;
      if(end.uf) S.end.uf=end.uf;
    } else {
      S.docNome=null;
    }
    S.docChecado=true;
  }catch(e){ S.docChecado=false; }
  render();
}

           <div style="font-size:10px;font-weight:900;min-width:28px;text-align:center;line-height:1.3">${p.un>1?`${noCart.qtd/p.un}cx<br><span style="color:#9a95c9;font-size:9px">${noCart.qtd}un</span>`:`${noCart.qtd}un`}</div>
           <button style="width:22px;height:22px;border-radius:5px;border:none;background:var(--mag);color:#fff;font-size:15px;font-weight:900;cursor:pointer" onclick="mudaQtd('${key}',1)">+</button>`
        :`<button style="width:22px;height:22px;border-radius:5px;border:1px solid var(--mag);background:rgba(255,0,130,.2);color:#fff;font-size:15px;font-weight:900;cursor:pointer" onclick='addSingle("${p.id}")'>+</button>`}
      </div></div>`;
  }
  // multi-sabor: somatória + botão que abre modal de sabores (expandido inline)
  const totalCx=(p.sabores||[]).reduce((s,sb)=>{const it=S.carrinho[String(sb.codigo)];return s+(it?it.qtd/p.un:0);},0);
  const aberto=S.expandido===p.id;
  const sabesHTML=aberto?`<div style="background:rgba(0,0,0,.25);padding:4px 6px 6px">${
    [...(p.sabores||[])].sort((a,b)=>{const ta=/(tradicional|original)/i.test(a.nome)?1:0,tb=/(tradicional|original)/i.test(b.nome)?1:0;return tb-ta||(b.estoque||0)-(a.estoque||0);})
    .map(s=>{
      const cap=maxUnid(s.estoque,p.un),key=String(s.codigo),noCart=S.carrinho[key];
      const nm=s.nome.replace(p.nome,"").trim().replace(/^[-–,\s]+/,"").trim()||s.nome;
      if(!cap)return`<div style="display:flex;align-items:center;gap:6px;padding:3px 0;opacity:.45;font-size:10px">
        ${s.imagem?`<img src="${esc(s.imagem)}" onerror="this.remove()" style="width:28px;height:28px;object-fit:contain;background:#fff;border-radius:4px;flex-shrink:0">`:""}<span style="flex:1">${esc(nm)}</span><span style="color:#ff9db0;font-size:9px">sem estoque</span></div>`;
      return`<div style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:10px">
        ${s.imagem?`<img src="${esc(s.imagem)}" onerror="this.remove()" style="width:28px;height:28px;object-fit:contain;background:#fff;border-radius:4px;flex-shrink:0">`:""}<span style="flex:1">${esc(nm)}</span>
        <div style="display:flex;align-items:center;gap:2px;flex-shrink:0;width:66px;justify-content:flex-end">${noCart
          ?`<button style="width:20px;height:20px;border-radius:4px;border:none;background:var(--mag);color:#fff;font-size:13px;cursor:pointer" onclick="mudaQtd('${key}',-1)">−</button>

          :`<button style="width:20px;height:20px;border-radius:4px;border:1px solid var(--mag);background:rgba(255,0,130,.2);color:#fff;font-size:13px;cursor:pointer" onclick='addFlav("${p.id}","${key}")'>+</button>`}
        </div></div>`;

  return`<div>

        <div style="font-size:10px;color:#F2C94C;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${brl(p.preco)}<span style="color:rgba(255,255,255,.4);font-size:9px">/un</span>${cxSpan}</div></div>
      <div style="display:flex;align-items:center;gap:3px;flex-shrink:0;width:72px;justify-content:flex-end">
        ${totalCx>0?`<div style="text-align:right"><span style="font-size:10px;font-weight:900;color:#ffd23f">${p.un>1?`${totalCx}cx`:`${totalCx*p.un}un`}</span>${p.un>1?`<br><span style="color:#9a95c9;font-size:9px">${totalCx*p.un}un</span>`:``}</div>`:""}
        <button style="width:22px;height:22px;border-radius:5px;border:1px solid var(--mag);background:${aberto?'var(--mag)':'rgba(255,0,130,.2)'};color:#fff;font-size:13px;font-weight:900;cursor:pointer" onclick="S.expandido=S.expandido==='${p.id}'?null:'${p.id}';render()">${aberto?"−":"+"}</button>
      </div>

function maskFone(v){
  const d=soDig(v||""); if(d.length<8) return v||"";
  const meio="*".repeat(Math.max(d.length-6,3));
  return `(${d.slice(0,2)}) ${meio}-${d.slice(-4)}`;
}
function maskEmail(v){
  if(!v||!v.includes("@")) return v||"";
  const [u,dom]=v.split("@");
  const visivel=u.slice(0,Math.min(2,u.length));
  return `${visivel}${"*".repeat(Math.max(u.length-2,3))}@${dom}`;
}
function maskEndereco(end){
  if(!end) return "";
  // mostra só bairro/cidade — rua e número completos não aparecem na confirmação
  return [end.bairro,end.cidade].filter(Boolean).join(" — ");
}

function cardCliente(){
  if(!S.docChecado||!S.docNome||!S.docInfo) return "";
  const c=S.docInfo;
  return `<div style="background:#0a2a1a;border:1px solid #2f9e6b;border-radius:10px;padding:12px;margin-bottom:12px">
    <div style="font-weight:900;color:#a8f0c8;margin-bottom:6px">✅ Cliente encontrado</div>
    <div style="font-size:14px;font-weight:700">${esc(c.nome||"")}</div>
    ${c.celular||c.telefone?`<div style="font-size:12px;color:#9a95c9;margin-top:2px">📱 ${esc(maskFone(c.celular||c.telefone))}</div>`:""}
    ${c.email?`<div style="font-size:12px;color:#9a95c9">✉️ ${esc(maskEmail(c.email))}</div>`:""}
    ${c.endereco?.rua?`<div style="font-size:12px;color:#9a95c9">📍 ${esc(maskEndereco(c.endereco))}</div>`:""}
    <div style="font-size:11px;color:#514c96;margin-top:4px">Dados protegidos — confira só os campos abaixo</div>
  </div>`;
}

function mudarCategoria(i){
  S.busca=''; S.catAtiva=i; S.expandido=null;
  render();
}

function telaCatalogo(app){
  const busca=S.busca.trim().toLowerCase();
  let lista, titulo;
  if(busca){
    lista=todosProdutos().filter(p=>p.nome.toLowerCase().includes(busca));
    titulo=`Busca: "${esc(S.busca)}"`;
  }else{
    const c=CAT[S.catAtiva]||CAT[0];
    lista=(c?c.produtos:[]).filter(produtoDisp); // esconde esgotados na navegação
    titulo=c?c.nome:"";
  }
  const cats=CAT.map((c,i)=>`<div class="cat ${!busca&&i===S.catAtiva?"on":""}" onclick="mudarCategoria(${i})">${esc(c.nome)}</div>`).join("");
  const side=CAT.map((c,i)=>`<div class="scat ${!busca&&i===S.catAtiva?"on":""}" onclick="mudarCategoria(${i})">${esc(c.nome)}</div>`).join("");
  const cards=lista.map(p=>cardProduto(p,busca)).join("") || `<div class="muted">Nenhum produto encontrado.</div>`;

  const boasVindas = ""; // removido — cardCliente() já mostra essa info
  app.innerHTML=header(true)+ boasVindas +

     <div class="cats">${cats}</div>
     <div class="wrap"><div class="layout">
       <div class="side">${side}</div>
       <div style="flex:1;min-width:0"><div id="produtos-lista" style="font-weight:800;margin:2px 0 10px">${esc(titulo)}</div><div class="grid">${cards}</div></div>
     </div></div>`
    + barra();
}

function cardProduto(p,busca){
  const disp=saboresDisp(p);
  const multi=(p.sabores||[]).length>1;
  const esgotado=disp.length===0;
  const precoCx = p.preco*(p.un||1);
  const cxTxt = (p.un>1)?`<div class="cx">caixa c/ ${p.un} = ${brl(precoCx)}</div>`:``;
  let acao="";
  if(esgotado){
    acao=`<div class="tag">SEM ESTOQUE</div>`;
  }else if(multi){
    const aberto=S.expandido===p.id;
    acao=`<div class="addrow"><button class="btn btn-mag" onclick="toggleFlav('${p.id}')">${aberto?"Fechar sabores":"Escolher sabor"}</button></div>`;
    if(aberto){
      const fonte = busca ? ordenarSabores(p.sabores||[]) : disp;
      acao+=`<div class="flavs">`+fonte.map(s=>{
        const cap=maxUnid(s.estoque,p.un); const key=String(s.codigo); const noCart=S.carrinho[key];
        if(cap<=0) return `<div class="flav esg"><div style="display:flex;align-items:center;gap:8px">${s.imagem?`<img src="${esc(s.imagem)}" onerror="this.remove()" style="width:40px;height:40px;object-fit:contain;background:#fff;border-radius:6px;flex-shrink:0">`:""}<span>${esc(s.nome)}</span></div><span class="tag">sem estoque</span></div>`;
        return `<div class="flav"><div style="display:flex;align-items:center;gap:8px;flex:1">${s.imagem?`<img src="${esc(s.imagem)}" onerror="this.remove()" style="width:40px;height:40px;object-fit:contain;background:#fff;border-radius:6px;flex-shrink:0">`:""}<span>${esc(s.nome)} <small style="color:#8f8ac0">(est ${s.estoque})</small></span></div>`+
          (noCart? stepperMini(key) : `<button onclick='addFlav("${p.id}","${key}")'>+ ${p.un>1?"caixa":"add"}</button>`)+`</div>`;
      }).join("")+`</div>`;
    }
  }else{
    const s=disp[0]||(p.sabores||[])[0];
    const key=s?String(s.codigo):null;
    const noCart=key&&S.carrinho[key];
    acao=`<div class="addrow">`+(noCart?stepper(key):`<button class="btn btn-mag" onclick='addSingle("${p.id}")'>+ Adicionar</button>`)+`</div>`;
  }
  const estTxt = !esgotado && !multi && disp[0]?`<div class="est">estoque: ${disp[0].estoque} un</div>`:``;
  return `<div class="card ${esgotado?"esg":""}">
    ${p.imagem?`<img class="pimg" src="${esc(p.imagem)}" onerror="this.remove()">`:""}
    <div class="nm">${esc(p.nome)} ${p.obs?`<span class="obs">${esc(p.obs)}</span>`:""}</div>
    <div class="pr">${brl(p.preco)} <span class="cx">/un</span></div>${cxTxt}${estTxt}
    ${acao}</div>`;
}
function pack(qtd,un){ un=un||1; return un===1 ? `${qtd} un` : `${qtd/un} cx (${qtd} un)`; }
function stepper(key){ const it=S.carrinho[key]; const lbl = it.un===1 ? `${it.qtd} un` : `${it.qtd} un<br><small style="color:#b9b4e6">${it.qtd/it.un} cx</small>`; return `<div class="step"><button onclick="mudaQtd('${key}',-1)">−</button><div class="q">${lbl}</div><button onclick="mudaQtd('${key}',1)">+</button></div>`; }
function stepperMini(key){
  const it=S.carrinho[key];
  const lbl = it.un===1
    ? `${it.qtd} un`
    : `${it.qtd} un<br><small style="color:#b9b4e6">${it.qtd/it.un} cx</small>`;
  return `<div class="step"><button onclick="mudaQtd('${key}',-1)">−</button><div class="q" style="min-width:60px;text-align:center">${lbl}</div><button onclick="mudaQtd('${key}',1)">+</button></div>`;
}

function findProd(id){ for(const c of CAT){ const p=c.produtos.find(x=>String(x.id)===String(id)); if(p) return p; } return null; }
function toggleFlav(id){ S.expandido = S.expandido===id?null:id; render(); }
function addSingle(id){ const p=findProd(id); const s=saboresDisp(p)[0]||(p.sabores||[])[0]; if(s) addItem(p,s); }
function addFlav(id,codigo){ const p=findProd(id); const s=(p.sabores||[]).find(x=>String(x.codigo)===String(codigo)); if(s) addItem(p,s); }

function barra(){
  if(contagem()===0) return "";
  return `<div class="bar"><div class="barbox"><div class="tot">${brl(subtotal())}<br><small class="muted">${contagem()} item(ns)</small></div>
    <button class="btn btn-mag" onclick="irCarrinho()">Ver carrinho →</button></div></div>`;
}

function irCarrinho(){ if(contagem()===0){alert("Seu carrinho está vazio.");return;} S.etapa="carrinho"; render(); }
function telaCarrinho(app){
  const lines=itens().map(i=>`<div class="line">${i.imagem?`<img src="${esc(i.imagem)}" onerror="this.remove()" style="width:52px;height:52px;object-fit:contain;background:#fff;border-radius:8px;flex-shrink:0">`:""}<div class="info"><div style="font-weight:800">${esc(i.nomeProduto)}${i.sabor&&i.sabor!==i.nomeProduto?` — ${esc(i.sabor)}`:""}</div>
     <div class="muted">${brl(i.preco)}/un · ${pack(i.qtd,i.un)} = <b style="color:#ffd23f">${brl(i.preco*i.qtd)}</b></div>
     <div class="step" style="margin-top:6px"><button onclick="mudaQtd('${i.key}',-1)">−</button><div class="q">${i.un===1?`${i.qtd} un`:`${i.qtd/i.un} cx`}</div><button onclick="mudaQtd('${i.key}',1)">+</button></div></div>
     <button class="rm" onclick="removeItem('${i.key}')">🗑</button></div>`).join("");
  const min=minAtual();
  const falta=(min!=null)&&subtotal()<min;
  const infoMin=(min==null)
    ? `<div class="muted" style="margin:8px 0">Pedido mínimo: ${brl(MIN_ID)} com cadastro · ${brl(MIN_ANON)} sem cadastro. Informe seu CPF/CNPJ no próximo passo.</div>`
    : (falta?`<div class="warn">Pedido mínimo de ${brl(min)}${S.docNome?" (com cadastro)":" (sem cadastro)"}. Faltam ${brl(min-subtotal())}.</div>`:"");
  app.innerHTML=header(false)+`<div class="wrap"><h1 style="font-size:22px">Seu carrinho</h1>
    ${lines||'<div class="muted">Carrinho vazio.</div>'}
    ${infoMin}
    <div style="height:90px"></div></div>
    <div class="bar"><div class="barbox"><div class="tot">${brl(subtotal())}</div>
      <button class="btn btn-out" onclick="S.etapa='catalogo';render()">+ Itens</button>
      <button class="btn btn-mag" ${falta?"disabled":""} onclick="irCheckout()">Continuar</button></div></div>`;
}

function irCheckout(){ const m=minAtual(); if(m!=null && subtotal()<m){alert("Abaixo do mínimo.");return;} S.etapa="checkout"; render(); }
function enderecoObrig(){ return S.docChecado || S.entrega==='entrega'; }
function enderecoTexto(){ const e=S.end; if(!e.rua) return ""; return `${e.rua}, ${e.numero||"s/n"}${e.complemento?" "+e.complemento:""} - ${e.bairro}, ${e.cidade} - ${e.uf}, CEP ${e.cep}`; }
function endValido(){ const e=S.end; return soDig(e.cep).length===8 && e.rua.trim() && e.numero.trim() && e.bairro.trim() && e.cidade.trim() && e.uf.trim(); }

function telaCheckout(app){
  const podeEntrega = subtotal()>=(META.entrega?.minEntrega ?? 1000);
  const novo = S.docChecado && !S.docNome;
  const mostraEndereco = enderecoObrig();
  app.innerHTML=header(false)+`<div class="wrap"><h1 style="font-size:22px">Finalizar pedido</h1>
    <div class="muted">Subtotal: <b style="color:#ffd23f">${brl(subtotal())}</b></div>

    <div style="font-weight:800;margin-top:14px">Identificação (obrigatória)</div>
    <input placeholder="CPF ou CNPJ*" inputmode="numeric" value="${esc(S.doc)}" oninput="S.doc=this.value;S.docChecado=false" onblur="checarDoc()">
    ${cardCliente()}
    ${S.docChecado
      ? (S.docNome
          ? ``
          : `<div class="warn">🆕 Novo cliente — preencha os dados abaixo para criar o cadastro.</div>`)
      : (soDig(S.doc).length>=11 ? `<button class="btn btn-out" style="width:100%" onclick="checarDoc()">Verificar cadastro</button>` : "")}

    ${(()=>{
      const temNome=!!S.nome.trim();
      const temFone=!!S.telefone.trim();
      const temEnd=S.end.rua.trim()&&S.end.cidade.trim()&&S.end.uf.trim();
      const faltaCampos=S.docNome&&(!temFone||!temEnd);
      return `
        ${faltaCampos?`<div style="background:#2a1a00;border:1px solid #ffd23f;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:12px">
          ⚠️ Complete os dados abaixo para finalizar:
          ${!temFone?'<br>📱 Telefone obrigatório':''}
          ${!temEnd?'<br>📍 Endereço obrigatório':''}
        </div>`:''}
        ${S.docNome
          ? `<div style="background:#151233;border:1px solid #514c96;border-radius:10px;padding:12px;font-size:14px;font-weight:700;color:#cfc9f5">${esc(S.nome)}</div>`
          : `<input placeholder="Nome completo*" value="${esc(S.nome)}" oninput="S.nome=this.value" style="${!temNome?'border-color:#ffd23f':''}">`
        }
        ${S.docNome&&temFone
          ? `<div style="background:#151233;border:1px solid #514c96;border-radius:10px;padding:12px;font-size:14px;font-weight:700;color:#cfc9f5">📱 ${esc(maskFone(S.telefone))}</div>`
          : `<input placeholder="Celular / WhatsApp*" inputmode="tel" value="${esc(S.telefone)}" oninput="S.telefone=this.value" style="${!temFone?'border-color:#ffd23f':''}">`
        }
        ${novo?`<input placeholder="E-mail (opcional)" inputmode="email" value="${esc(S.email)}" oninput="S.email=this.value">`:''}
      `;
    })()}
    ${(enderecoObrig()||!S.end.rua)?blocoEndereco(novo,S.docNome&&!!S.end.rua.trim()):""}

    <div style="font-weight:800;margin-top:14px">Como quer receber?</div>
    <div class="radio">
      <label class="${S.entrega==='retirada'?'on':''}" onclick="S.entrega='retirada';S.frete=null;render()">🏪 Retirada<br><small class="muted">grátis</small></label>
      <label class="${S.entrega==='entrega'?'on':''} ${podeEntrega?'':'esg'}" onclick="${podeEntrega?"S.entrega='entrega';render()":"alert('Entrega disponível a partir de '+'"+brl(META.entrega?.minEntrega??1000)+"'+'. Abaixo disso, só retirada.')"}">🛵 Entrega<br><small class="muted">${podeEntrega?"calcular taxa":"a partir de "+brl(META.entrega?.minEntrega??1000)}</small></label>
    </div>
    ${S.entrega==='entrega'?blocoFrete():""}
    ${S.entrega==='retirada'?`<div class="ok">Retirada na loja — sem taxa.</div>`:""}

    <div style="height:120px"></div></div>
    <div class="bar"><div class="barbox" style="flex-wrap:wrap;gap:8px">
      <button class="btn btn-ghost" onclick="S.etapa='catalogo';render()" style="flex:1">+ Adicionar itens</button>
      <div style="display:flex;align-items:center;gap:8px;flex:2"><div class="tot" style="flex:1">${brl(totalFinal())}<br><small class="muted">${S.entrega==='entrega'&&S.frete?`inclui frete ${brl(S.frete.taxa)}`:"total"}</small></div>
      <button class="btn btn-mag" onclick="finalizar()" ${S.enviando?"disabled":""}>${S.enviando?"Enviando…":"Finalizar pedido"}</button></div>
    </div></div>`;
}
function blocoEndereco(novo,bloqueado){
  const e=S.end;
  const tituloEnd=novo?"Endereco (para cadastro)":(!e.rua?"Endereco obrigatorio":"Endereco");
  if(bloqueado){
    return `<div style="font-weight:800;margin-top:14px">${tituloEnd}</div>
    <div style="background:#151233;border:1px solid #514c96;border-radius:10px;padding:12px;font-size:13px;color:#cfc9f5">
      📍 ${esc(e.bairro)}${e.cidade?" — "+esc(e.cidade):""}${e.uf?"/"+esc(e.uf):""}
    </div>
    <div style="font-size:11px;color:#514c96">Endereço completo do cadastro será usado na entrega — não editável aqui. Pra corrigir, procure um atendente.</div>`;
  }
  return `<div style="font-weight:800;margin-top:14px">${tituloEnd}</div>
    <input placeholder="CEP*" inputmode="numeric" value="${esc(e.cep)}" oninput="S.end.cep=this.value" onblur="buscarCep()">
    ${S.cepMsg?`<div class="muted">${esc(S.cepMsg)}</div>`:""}
    <input placeholder="Rua / logradouro*" value="${esc(e.rua)}" oninput="S.end.rua=this.value">
    <div style="display:flex;gap:8px">
      <input placeholder="Número*" style="flex:1" value="${esc(e.numero)}" oninput="S.end.numero=this.value">
      <input placeholder="Complemento" style="flex:1" value="${esc(e.complemento)}" oninput="S.end.complemento=this.value">
    </div>
    <input placeholder="Bairro*" value="${esc(e.bairro)}" oninput="S.end.bairro=this.value">
    <div style="display:flex;gap:8px">
      <input placeholder="Cidade*" style="flex:2" value="${esc(e.cidade)}" oninput="S.end.cidade=this.value">
      <input placeholder="UF*" style="flex:1" maxlength="2" value="${esc(e.uf)}" oninput="S.end.uf=this.value.toUpperCase()">
    </div>`;
}
function blocoFrete(){
  return `<button class="btn btn-out" style="width:100%;margin-top:8px" onclick="calcularFrete()">Calcular taxa de entrega</button>
    ${S.freteMsg?`<div class="warn">${esc(S.freteMsg)}</div>`:""}
    ${S.frete&&S.frete.entregaDisponivel?`<div class="ok">Distância ${S.frete.km} km · ${S.frete.gratis?"Frete GRÁTIS":`Taxa ${brl(S.frete.taxa)} (${brl(S.frete.porKm)}/km)`}</div>`:""}`;
}
function totalFinal(){ let t=subtotal(); if(S.entrega==='entrega'&&S.frete&&S.frete.entregaDisponivel) t+=Number(S.frete.taxa||0); return t; }

async function buscarCep(){
  const cep=soDig(S.end.cep);
  if(cep.length!==8) return;
  S.cepMsg="Buscando CEP…"; render();
  try{
    const r=await fetch(`https://viacep.com.br/ws/${cep}/json/`); const j=await r.json();
    if(j.erro){ S.cepMsg="CEP não encontrado. Preencha manualmente."; }
    else{ S.end.rua=j.logradouro||S.end.rua; S.end.bairro=j.bairro||S.end.bairro; S.end.cidade=j.localidade||S.end.cidade; S.end.uf=j.uf||S.end.uf; S.cepMsg=""; }
  }catch(e){ S.cepMsg="Não consegui buscar o CEP. Preencha manualmente."; }
  render();
}

async function calcularFrete(){
  const txt=enderecoTexto();
  if(!txt){ alert("Preencha o endereço (CEP, rua, número) para calcular a entrega."); return; }
  S.freteMsg="Calculando…"; S.frete=null; render();
  try{
    const u=BACKEND+"/api/frete?endereco="+encodeURIComponent(txt)+"&valor="+subtotal();
    const r=await fetch(u); const j=await r.json();
    if(j.entregaDisponivel){ S.frete=j; S.freteMsg=""; }
    else{ S.frete=null; S.freteMsg=j.motivo||"Não foi possível calcular a entrega."; }
  }catch(e){ S.freteMsg="Erro ao calcular. Tente de novo."; }
  render();
}

async function finalizar(){
  const _erros=[];
  if(!S.nome.trim()) _erros.push("Nome completo");
  if(!S.telefone.trim()) _erros.push("Celular / WhatsApp");
  if(!S.end.rua.trim()) _erros.push("Endereço (Rua)");
  if(!S.end.cidade.trim()) _erros.push("Cidade");
  if(!S.end.uf.trim()) _erros.push("UF (estado)");
  if(_erros.length){ alert("Preencha os campos obrigatórios:\n- "+_erros.join("\n- ")); return; }
  const dd=soDig(S.doc);
  if(!docValido(dd)){ alert("CPF ou CNPJ inválido. Confira os números para finalizar."); return; }
  S.doc=dd;
  if(!S.docChecado) await checarDoc();
  const novo = !S.docNome;
  const min = S.docNome?MIN_ID:MIN_ANON;
  if(subtotal()<min){ alert(`Pedido mínimo de ${brl(min)} ${S.docNome?"(cliente com cadastro)":"(sem cadastro — para mínimo de "+brl(MIN_ID)+", use um CPF/CNPJ já cadastrado)"}. Faltam ${brl(min-subtotal())}.`); return; }
  if(!S.entrega){ alert("Escolha Retirada ou Entrega."); return; }
  if(novo && !S.email.trim()){ alert("Informe o e-mail para o cadastro."); return; }
  if(novo && !/^\S+@\S+\.\S+$/.test(S.email.trim())){ alert("Informe um e-mail válido (ex.: nome@email.com)."); return; }
  if((novo || S.entrega==='entrega') && !endValido()){ alert("Preencha o endereço completo: CEP, rua, número, bairro, cidade e UF."); return; }
  if(S.entrega==='entrega' && (!S.frete || !S.frete.entregaDisponivel)){ alert("Calcule a taxa de entrega (ou escolha Retirada)."); return; }

  const entrega = S.entrega==='entrega'
    ? {tipo:'entrega', endereco:enderecoTexto(), taxa:S.frete.taxa}
    : {tipo:'retirada'};
  const cadastro = { endereco:{ cep:soDig(S.end.cep), rua:S.end.rua, numero:S.end.numero, complemento:S.end.complemento, bairro:S.end.bairro, cidade:S.end.cidade, uf:S.end.uf } };

  S.enviando=true; render();
  try{
    const itensPed=itens().map(i=>({produtoId:i.id, quantidade:i.qtd, valor:i.preco}));
    const r=await fetch(BACKEND+"/api/finalizar",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({documento:S.doc||"", nome:S.nome, email:S.email, telefone:S.telefone, itens:itensPed, entrega,
      cadastro:{
        endereco:{
          rua:S.end.rua, numero:S.end.numero, complemento:S.end.complemento,
          bairro:S.end.bairro, cidade:S.end.cidade, uf:S.end.uf, cep:S.end.cep
        }
      }
    })});
    const j=await r.json();
    if(r.ok && j.ok){ S.resultado={bling:true, pedido:j.pedido, entrega}; }
    else{ S.resultado={bling:false, erro:(j.erro||"erro"), detalhe:(j.body||j.detalhe), entrega}; }
  }catch(e){ S.resultado={bling:false, erro:"conexão", entrega}; }
  S.enviando=false; S.etapa="sucesso"; render();
}

function resumoTexto(){
  let l=["*PEDIDO ATACADO - B13 BEBIDAS*",""];
  l.push(`Cliente: ${S.nome}`); l.push(`Telefone: ${S.telefone}`);
  if(soDig(S.doc)) l.push(`CPF/CNPJ: ${S.doc}`);
  l.push(""); l.push("*Itens:*");
  itens().forEach(i=> l.push(`• ${i.nomeProduto}${i.sabor&&i.sabor!==i.nomeProduto?` (${i.sabor})`:""} — ${pack(i.qtd,i.un)} = ${brl(i.preco*i.qtd)}`));
  l.push(""); l.push(`Subtotal: ${brl(subtotal())}`);
  if(S.entrega==='entrega'&&S.frete){ l.push(`Entrega: ${S.endereco}`); l.push(`Taxa entrega (${S.frete.km} km): ${S.frete.gratis?"GRÁTIS":brl(S.frete.taxa)}`); }
  else l.push("Retirada na loja");
  l.push(`*TOTAL: ${brl(totalFinal())}*`);
  return l.join("\n");
}
function abrirWhatsApp(){ window.open(`https://wa.me/${WHATS}?text=`+encodeURIComponent(resumoTexto()),"_blank"); }
function imprimir(){
  document.getElementById("recibo").innerHTML=`<h2>B13 BEBIDAS — Pedido Atacado</h2><pre style="font-size:14px;white-space:pre-wrap">${esc(resumoTexto())}</pre>`;
  window.print();
}

function telaSucesso(app){
  const r=S.resultado||{};

  const nped=r.pedido?.data?.numero || pedidoId;
  const notaUrl=pedidoId?(window.location.origin+"/pedido/"+pedidoId+"/nota"):null;
  const listaItens=itens().map(i=>`
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #2a2660;font-size:13px">
      <div style="flex:1">
        <div style="font-weight:700">${esc(i.nomeProduto)}${i.sabor&&i.sabor!==i.nomeProduto?` <span style="color:#9a95c9;font-weight:400">(${esc(i.sabor)})</span>`:""}</div>
        <div style="color:#9a95c9;font-size:11px">${esc(pack(i.qtd,i.un))}</div>
      </div>
      <div style="font-weight:700">${brl(i.preco*i.qtd)}</div>
    </div>`).join("");

  let statusBling = r.bling
    ? `<div style="background:#0a2a1a;border:1px solid #2f9e6b;border-radius:10px;padding:10px 14px;font-size:13px;color:#a8f0c8;text-align:center">✅ Pedido registrado no sistema</div>`
    : `<div style="background:#2a0a00;border:1px solid #e5563f;border-radius:10px;padding:10px 14px;font-size:13px;color:#ff8090">⚠️ Não foi possível gerar no Bling (${esc(r.erro||"erro")}).${r.detalhe?`<br><small style="word-break:break-word;opacity:.8">${esc(JSON.stringify(r.detalhe))}</small>`:""}<br>A loja recebeu pelo WhatsApp.</div>`;

  app.innerHTML=header(false)+`
  <div style="max-width:480px;margin:0 auto;padding:20px 16px 40px">
    <div style="text-align:center;margin-bottom:18px">
      <div style="width:64px;height:64px;border-radius:50%;background:#0a2a1a;border:2px solid #2f9e6b;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 10px">✅</div>
      <div style="font-size:22px;font-weight:900">Pedido finalizado!</div>
      <div style="color:#9a95c9;font-size:13px;margin-top:2px">${r.entrega?.tipo==='entrega'?"Entrega a combinar":"Retirada na loja"}</div>
    </div>

    <div style="background:#151233;border:1px solid #514c96;border-radius:14px;overflow:hidden;margin-bottom:14px">
      <div style="background:#262366;padding:14px 18px;display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:900;font-size:20px">#${nped}</div>
        <div style="font-size:11px;color:#cfc9f5">${new Date().toLocaleDateString("pt-BR")}</div>
      </div>
      <div style="padding:14px 18px">
        <div style="font-size:11px;color:#9a95c9;text-transform:uppercase;font-weight:700;margin-bottom:2px">Cliente</div>
        <div style="font-weight:700;margin-bottom:10px">${esc(S.nome)}</div>
        <div style="font-size:11px;color:#9a95c9;text-transform:uppercase;font-weight:700;margin-bottom:4px">Itens (${itens().length})</div>
        ${listaItens}
        <div style="display:flex;justify-content:space-between;padding-top:12px;margin-top:4px;font-size:13px">
          <span style="color:#9a95c9">Subtotal</span><span>${brl(subtotal())}</span>
        </div>
        ${S.entrega==='entrega'&&S.frete?`<div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#9a95c9">Entrega (${S.frete.km} km)</span><span>${S.frete.gratis?"GRÁTIS":brl(S.frete.taxa)}</span></div>`:`<div style="font-size:13px;color:#9a95c9">Retirada na loja</div>`}
        <div style="display:flex;justify-content:space-between;font-size:20px;font-weight:900;color:#FF0082;margin-top:8px;padding-top:8px;border-top:1px solid #2a2660">
          <span>TOTAL</span><span>${brl(totalFinal())}</span>
        </div>
      </div>
    </div>

    ${statusBling}

    <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px">
      ${notaUrl?`<a href="${notaUrl}" target="_blank" class="btn btn-mag big" style="text-decoration:none;text-align:center">🖨️ Imprimir nota (com código pro caixa)</a>`:`<button class="btn btn-ghost big" onclick="imprimir()">🖨️ Imprimir</button>`}
      <button class="btn btn-out big" onclick="abrirWhatsApp()">🟢 Enviar no WhatsApp (opcional)</button>
      <button class="btn btn-ghost big" onclick="recomecar(false)">Novo pedido</button>
    </div>
  </div>`;
}

function recomecar(perguntar){
  if(perguntar && contagem()>0 && !confirm("Recomeçar? O carrinho será esvaziado.")) return;
  S=novoEstado(); render();
}

// ------- timeout de inatividade (3 min) -------
let ultimo=Date.now();
["click","touchstart","keydown"].forEach(ev=>document.addEventListener(ev,()=>ultimo=Date.now(),true));
setInterval(()=>{ if(S.etapa!=="splash" && Date.now()-ultimo>180000){ S=novoEstado(); render(); } },5000);

// carrega carrinho salvo pelo modo tabela ou parâmetro de modo
try{
  const params=new URLSearchParams(location.search);
  if(params.get("modo")==="tabela") S.modo="tabela";
  const saved=sessionStorage.getItem("b13cart");
  if(saved && params.get("carrinho")==="1"){
    const cart=JSON.parse(saved); sessionStorage.removeItem("b13cart");
    Object.assign(S.carrinho, cart);
    S.etapa="carrinho";
  }
}catch(e){}

carregarCatalogo();
carregarInstagramPosts();
</script>
