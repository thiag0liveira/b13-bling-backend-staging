<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>B13 — Gestão de Pedidos</title>
<style>
  *{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;-webkit-tap-highlight-color:transparent}
  :root{--indigo:#262366;--indigo2:#2b2870;--mag:#FF0082;--bg:#0f0d24}
  body{margin:0;background:var(--bg);color:#fff}
  #app{max-width:1000px;margin:0 auto;min-height:100vh}
  .top{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--indigo2),var(--indigo));display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:3px solid var(--mag)}
  .top img{height:42px}.top .t{font-weight:900;font-size:18px}.top .sp{flex:1}
  .btn{border:none;border-radius:10px;font-weight:800;cursor:pointer;font-size:14px;padding:10px 14px;color:#fff}
  .btn-mag{background:var(--mag)}.btn-out{background:transparent;border:2px solid #514c96}.btn-ghost{background:#1c1846}
  .wrap{padding:16px}
  input,select{padding:12px;border-radius:10px;border:2px solid #514c96;background:#151233;color:#fff;font-size:15px}
  input:focus,select:focus{outline:none;border-color:var(--mag)}
  .center{max-width:420px;margin:14vh auto;text-align:center}
  .center input{width:100%;margin:10px 0}
  .filtros{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px}
  .fchip{white-space:nowrap;padding:8px 12px;border-radius:999px;background:#1c1846;color:#cfc9f5;font-weight:700;border:2px solid transparent;cursor:pointer;font-size:13px}
  .fchip.on{border-color:var(--mag);color:#fff}
  .card{background:#151233;border:1px solid #2c2660;border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px}
  .card:hover{border-color:var(--mag)}
  .card .info{flex:1}
  .card .n{font-weight:900;font-size:16px}
  .card .c{color:#b9b4e6;font-size:13px}
  .card .tot{font-weight:900;color:#ffd23f}
  .badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:8px;color:#111;white-space:nowrap}
  .muted{color:#9a95c9;font-size:13px}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow:auto}
  .box{background:#1c1846;border:1px solid #3a357f;border-radius:14px;max-width:640px;width:100%;padding:18px;margin-top:20px}
  .item{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid #2c2660;font-size:14px}
  .lbl{color:#9a95c9;font-size:12px}
</style>
</head>

function corSit(id){ const s=S.mapSit[id]; return s?.cor||"#cbcbcb"; }
function nomeSit(id){ const s=S.mapSit[id]; return s?.nome||("Situação "+id); }

function header(){ return `<div class="top"><img src="${LOGO}"><div class="t">Gestão de Pedidos</div><div class="sp"></div>
  ${S.logado?`<button class="btn btn-out" onclick="carregar()">↻ Atualizar</button><button class="btn btn-ghost" onclick="sair()">Sair</button>`:""}</div>`; }

function render(){
  const app=document.getElementById("app");
  if(!S.logado){ app.innerHTML=header()+`<div class="center"><img src="${LOGO}" style="height:64px;margin-bottom:10px"><h2>Acesso restrito</h2>
    <input id="pw" type="password" placeholder="Senha" onkeydown="if(event.key==='Enter')login()">
    <button class="btn btn-mag" style="width:100%" onclick="login()">Entrar</button>
    ${S.msg?`<div class="muted" style="margin-top:10px">${esc(S.msg)}</div>`:""}</div>`; return; }

  const chips=`<div class="fchip ${S.filtro===null?'on':''}" onclick="setFiltro(null)">Todos</div>`+
    S.situacoes.map(s=>`<div class="fchip ${S.filtro===s.id?'on':''}" onclick="setFiltro(${s.id})" style="${S.filtro===s.id?`background:${s.cor};color:#111`:''}">${esc(s.nome)}</div>`).join("");
  const lista = S.carregando ? `<div class="muted">Carregando…</div>`
    : (S.pedidos.length ? S.pedidos.map(cardPedido).join("") : `<div class="muted">Nenhum pedido encontrado neste filtro.</div>`);
  app.innerHTML=header()+`<div class="wrap"><div class="filtros">${chips}</div>${lista}</div>${S.sel?modalPedido():""}`;
}

function cardPedido(p){
  const sit=p.situacao?.id;
  return `<div class="card" onclick="abrir(${p.id})">
    <div class="info"><div class="n">Pedido ${esc(p.numero||p.id)}</div>
      <div class="c">${esc(p.contato?.nome||"—")} · ${dataBR(p.data)}</div></div>
    <div style="text-align:right"><div class="tot">${brl(p.total)}</div>
      <span class="badge" style="background:${corSit(sit)}">${esc(nomeSit(sit))}</span></div></div>`;
}

function modalPedido(){
  const p=S.sel; const ed=S.editavel;
  const itens=S.editItens.map((i,ix)=>`<div class="item">
      <span style="flex:1">${esc(i.descricao)}</span>
      ${ed?`<input type="number" min="1" value="${i.quantidade}" style="width:64px;padding:6px" onchange="editQtd(${ix},this.value)">`:`<span class="muted">x${i.quantidade}</span>`}
      <b style="width:96px;text-align:right">${brl((i.valor||0)*(i.quantidade||0))}</b>
      ${ed?`<button class="btn btn-ghost" style="padding:6px 10px" onclick="removeItem(${ix})">🗑</button>`:""}
    </div>`).join("")||`<div class="muted">Sem itens.</div>`;
  const total=S.editItens.reduce((s,i)=>s+(i.valor||0)*(i.quantidade||0),0);
  const opcoes=S.situacoes.map(s=>`<option value="${s.id}" ${p.situacao?.id===s.id?"selected":""}>${esc(s.nome)}</option>`).join("");
  const busca = ed?`<div class="lbl" style="margin-top:12px">Adicionar produto (preço de atacado)</div>
    <input placeholder="buscar produto no Bling..." value="${esc(S.buscaTerm||'')}" oninput="buscarProd(this.value)" style="width:100%">
    <div>${(S.buscaRes||[]).map((r,ix)=>`<button class="btn btn-ghost" style="display:block;width:100%;text-align:left;margin-top:4px" onclick="addProd(${ix})">${esc(r.nome)} <span class="muted">#${esc(r.codigo)} · est ${r.estoque??"?"} · ${r.precoAtacado!=null?brl(r.precoAtacado):"sem preço atacado"}</span></button>`).join("")}</div>`:"";
  return `<div class="modal" onclick="if(event.target===this)fecharModal()"><div class="box">
    <div style="display:flex;justify-content:space-between;align-items:center"><h2 style="margin:0">Pedido ${esc(p.numero||p.id)}</h2>
      <button class="btn btn-ghost" onclick="fecharModal()">✕</button></div>
    <div class="muted" style="margin:4px 0 12px">${esc(p.contato?.nome||"—")} · ${dataBR(p.data)} · <span class="badge" style="background:${corSit(p.situacao?.id)}">${esc(nomeSit(p.situacao?.id))}</span></div>
    ${!ed?`<div style="background:#e5563f;color:#fff;padding:8px 10px;border-radius:8px;margin-bottom:8px;font-weight:700">Pedido ${esc(nomeSit(p.situacao?.id))} — os itens não podem ser editados.</div>`:""}
    ${p.observacoes?`<div class="lbl">Observação</div><div style="margin-bottom:10px">${esc(p.observacoes)}</div>`:""}
    <div class="lbl">Itens</div>${itens}
    <div class="item" style="border:none"><b>Total</b><b class="tot" style="color:#ffd23f">${brl(total)}</b></div>
    ${busca}
    ${ed?`<button class="btn btn-mag" style="width:100%;margin-top:12px" onclick="salvarItens()">💾 Salvar alterações no Bling</button>`:""}
    <div class="lbl" style="margin-top:14px">Mudar situação</div>
    <div style="display:flex;gap:8px;margin-top:6px"><select id="novaSit" style="flex:1">${opcoes}</select>
      <button class="btn btn-out" onclick="mudarSituacao()">Aplicar</button></div>
    ${S.msg?`<div class="muted" style="margin-top:8px">${esc(S.msg)}</div>`:""}
  </div></div>`;
}

// ------- ações -------
function login(){ const v=document.getElementById("pw").value; if(v===SENHA){ S.logado=true; S.msg=""; try{localStorage.setItem("b13painel","ok")}catch(e){} render(); carregar(); } else { S.msg="Senha incorreta."; render(); } }
function sair(){ S.logado=false; try{localStorage.removeItem("b13painel")}catch(e){} render(); }
function setFiltro(id){ S.filtro=id; carregarPedidos(); }

async function carregar(){ await carregarSituacoes(); await carregarPedidos(); }
async function carregarSituacoes(){
  try{ const r=await fetch(BACKEND+"/api/situacoes?modulo="+MODULO_VENDAS); const j=await r.json();
    S.situacoes=(j.data||[]).map(s=>({id:s.id,nome:s.nome,cor:s.cor||"#cbcbcb"}));
    S.mapSit={}; S.situacoes.forEach(s=>S.mapSit[s.id]=s);
  }catch(e){ S.situacoes=[]; }
}
async function carregarPedidos(){
  S.carregando=true; render();
  try{
    let u=BACKEND+"/api/pedidos?limite=50"; if(S.filtro!==null) u+="&idsSituacoes="+S.filtro;
    const r=await fetch(u); const j=await r.json(); S.pedidos=j.data||[];
  }catch(e){ S.pedidos=[]; S.msg="Erro ao carregar pedidos."; }
  S.carregando=false; render();
}
async function abrir(id){
  S.msg="Carregando pedido…"; render();
  try{ const r=await fetch(BACKEND+"/api/pedidos/"+id); const j=await r.json(); const p=j.data||j; S.sel=p;
    S.editItens=(p.itens||[]).map(i=>({produtoId:i.produto?.id, descricao:i.descricao||i.produto?.nome||("Produto "+(i.produto?.id||"")), quantidade:i.quantidade||1, valor:i.valor||0}));
    S.editavel=!(p.situacao?.id===9 || p.situacao?.id===12);
    S.buscaRes=[]; S.buscaTerm=""; S.msg="";
  }catch(e){ S.msg="Erro ao abrir o pedido."; }
  render();
}
function fecharModal(){ S.sel=null; S.editItens=[]; S.buscaRes=[]; S.buscaTerm=""; S.msg=""; render(); }
function editQtd(ix,v){ if(S.editItens[ix]) S.editItens[ix].quantidade=Math.max(1,parseInt(v)||1); render(); }
function removeItem(ix){ S.editItens.splice(ix,1); render(); }
let _bt;
function buscarProd(term){ S.buscaTerm=term; clearTimeout(_bt); if((term||"").trim().length<2){ S.buscaRes=[]; return; } _bt=setTimeout(async()=>{ try{ const r=await fetch(BACKEND+"/api/buscar-atacado?nome="+encodeURIComponent(term.trim())); const j=await r.json(); S.buscaRes=j.data||[]; }catch(e){ S.buscaRes=[]; } render(); },400); }
function addProd(ix){ const r=S.buscaRes[ix]; if(!r) return; if(r.precoAtacado==null && !confirm("Este produto não tem preço de atacado na tabela. Adicionar com R$ 0,00? (ajuste depois no Bling)")) return; S.editItens.push({produtoId:r.id, descricao:r.nome, quantidade:1, valor:r.precoAtacado||0}); S.buscaRes=[]; S.buscaTerm=""; render(); }
async function salvarItens(){
  if(!S.editItens.length){ alert("O pedido precisa ter pelo menos um item."); return; }
  S.msg="Salvando…"; render();
  try{
    const r=await fetch(BACKEND+"/api/pedidos/"+S.sel.id+"/itens",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({itens:S.editItens.map(i=>({produtoId:i.produtoId,quantidade:i.quantidade,valor:i.valor}))})});
    const j=await r.json();
    if(r.ok && !j.erro){ S.msg="✅ Itens atualizados no Bling!"; render(); carregarPedidos(); }
    else{ S.msg="Falha: "+(j.erro||"erro")+(j.body?" — "+JSON.stringify(j.body):""); render(); }
  }catch(e){ S.msg="Erro de conexão."; render(); }
}

async function mudarSituacao(){
  const idSit=Number(document.getElementById("novaSit").value); if(!idSit||!S.sel) return;
  S.msg="Alterando…"; render();
  try{
    const r=await fetch(BACKEND+"/api/pedidos/"+S.sel.id+"/situacao",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({idSituacao:idSit})});
    const j=await r.json();
    if(r.ok && !j.erro){ if(S.sel.situacao) S.sel.situacao.id=idSit; else S.sel.situacao={id:idSit}; S.msg="✅ Situação alterada!"; render(); carregarPedidos(); }
    else{ S.msg="Falha: "+(j.erro||"erro")+(j.body?" — "+JSON.stringify(j.body):""); render(); }
  }catch(e){ S.msg="Erro de conexão."; render(); }
}

render();
if(S.logado) carregar();
</script>
</body>
</html>
