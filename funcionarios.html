<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>B13 — Funcionários</title>
<style>
  *{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;margin:0;padding:0}
  :root{--indigo:#262366;--mag:#FF0082;--bg:#0f0d24;--card:#151233;--border:#2c2660}
  body{background:var(--bg);color:#fff;min-height:100vh}
  #app{max-width:900px;margin:0 auto}
  .top{background:linear-gradient(180deg,#2b2870,var(--indigo));border-bottom:3px solid var(--mag);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
  .top img{height:38px}.top .t{font-weight:900;font-size:17px}.top .sp{flex:1}
  .btn{border:none;border-radius:9px;font-weight:800;cursor:pointer;font-size:13px;padding:9px 14px;color:#fff}
  .btn-mag{background:var(--mag)}.btn-out{background:transparent;border:2px solid #514c96}
  .btn-ghost{background:#1c1846}.btn-red{background:#c0392b}.btn-grn{background:#2f9e6b}
  .wrap{padding:16px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
  .card .info{flex:1}
  .card .nome{font-weight:900;font-size:15px}
  .card .nivel{font-size:12px;color:#9a95c9}
  .badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:800}
  .badge-gerente{background:#262366;color:#a0a0ff}
  .badge-expedicao{background:#00aaff22;color:#00aaff}
  .badge-admin{background:#ff008222;color:#ff0082}
  .inativo{opacity:.5}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
  .mbox{background:#1c1846;border:1px solid #3a357f;border-radius:14px;max-width:440px;width:100%;padding:20px}
  .mbox h3{margin-bottom:14px}
  .mbox input,.mbox select{width:100%;padding:11px;border-radius:9px;border:1px solid #514c96;background:#0f0d24;color:#fff;font-size:14px;margin-bottom:10px}
  .mbox input:focus,.mbox select:focus{outline:none;border-color:var(--mag)}
  .mbox .lbl{font-size:12px;color:#9a95c9;margin-bottom:4px}
  .ok{background:#183a2a;color:#a8f0c8;border-radius:8px;padding:8px 12px;font-size:13px;margin:8px 0}
  .err{background:#3a2030;color:#ffbfce;border-radius:8px;padding:8px 12px;font-size:13px;margin:8px 0}
  .muted{color:#9a95c9;font-size:13px}
  .login-wrap{max-width:380px;margin:12vh auto;text-align:center}
  .login-wrap input{width:100%;padding:13px;border-radius:10px;border:2px solid #514c96;background:var(--card);color:#fff;font-size:16px;margin-bottom:10px}
</style>
<script src="/nav.js"></script>
<style>
  body.b13nav-open{ overflow:hidden }
  @media(min-width:900px){
    #b13nav{transform:translateX(0%) !important}
    #b13navOverlay{display:none !important}
    button[onclick="b13ToggleNav()"]{display:none !important}
    body > *:not(#b13nav):not([onclick="b13ToggleNav()"]):not(#b13navOverlay){ margin-left:200px }
  }
</style>
</head>
<body><script>
  (function(){
    if(!b13RequireLogin()) return;
    document.addEventListener("DOMContentLoaded",function(){
      const nav=document.createElement("div");
      nav.innerHTML=b13RenderNav("/funcionarios");
      document.body.insertBefore(nav,document.body.firstChild);
    });
  })();
</script>
<div id="app"></div>
<div id="modal" style="display:none" class="modal" onclick="if(event.target===this)fecharModal()">
  <div class="mbox" id="mbox"></div>
</div>
<script>
const B=location.protocol.indexOf("http")===0?"":"https://b13-bling-backend-production.up.railway.app";
const LOGO="/logo";
const NIVEIS={admin:"Admin",gerente:"Gerente",expedicao:"Expedição",financeiro_atacado:"Financeiro",vendedor:"Vendedor",conferente:"Conferente"};
let logado=false, funcs=[], msg="";
try{ const sess=typeof b13GetSession==="function"?b13GetSession():null; if(sess&&(sess.nivel==="admin"||(sess.permissoes||[]).includes("admin"))) logado=true; }catch(e){}

const esc=s=>(s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

async function carregar(){
  try{ const r=await fetch(B+"/api/funcionarios"); const j=await r.json(); funcs=j.data||[]; }
  catch(e){ msg=`<div class="err">Erro ao carregar funcionários</div>`; }
  render();
}

function render(){
  const app=document.getElementById("app");
  const top=`<div class="top"><img src="${LOGO}"><div class="t">Gestão de Funcionários</div><div class="sp"></div>
    ${logado?`<button class="btn btn-mag" onclick="abrirNovo()">+ Novo funcionário</button>
    <a href="/gestao" class="btn btn-out" style="text-decoration:none">← Gestão</a>
    <button class="btn btn-ghost" onclick="sair()">Sair</button>`:""}
  </div>`;

  if(!logado){
    app.innerHTML=top+`<div class="login-wrap">
      <div style="font-size:48px;margin-bottom:10px">👥</div>
      <h2 style="margin-bottom:16px">Acesso Administrativo</h2>
      <input id="pwInp" type="password" placeholder="Senha admin" onkeydown="if(event.key==='Enter')login()">
      <button class="btn btn-mag" style="width:100%" onclick="login()">Entrar</button>
      <div id="pwErr" class="muted" style="margin-top:8px"></div>
    </div>`; return;
  }

  const cards=funcs.length ? funcs.map(f=>`
    <div class="card ${!f.ativo?'inativo':''}">
      <div style="font-size:28px">${f.nivel==='admin'?'👑':f.nivel==='gerente'?'🧑‍💼':'🔧'}</div>
      <div class="info">
        <div class="nome">${esc(f.nome)} <span class="badge badge-${f.nivel}">${esc(NIVEIS[f.nivel]||f.nivel)}</span>
          ${!f.ativo?'<span class="badge" style="background:#3a2030;color:#ff9db0">Inativo</span>':''}</div>
        <div class="nivel">${f.login?`Login: <b>${esc(f.login)}</b> · `:""}ID: ${esc(f.id)}</div>
      </div>
      <button class="btn btn-ghost" onclick="abrirEditar('${f.id}')">✏️ Editar</button>
      <button class="btn ${f.ativo?'btn-red':'btn-grn'}" onclick="toggleAtivo('${f.id}',${!f.ativo})">${f.ativo?'Desativar':'Ativar'}</button>
    </div>`).join("")
    : `<div class="muted" style="text-align:center;padding:30px">Nenhum funcionário cadastrado.<br><br>
        <button class="btn btn-mag" onclick="abrirNovo()">+ Adicionar primeiro funcionário</button></div>`;

  app.innerHTML=top+`<div class="wrap">${msg}${cards}</div>`;
  msg="";
}

function login(){ location.href="/login?next=/funcionarios"; }
function sair(){ logado=false; if(typeof b13ClearSession==="function") b13ClearSession(); render(); }
function fecharModal(){ document.getElementById("modal").style.display="none"; }

function abrirNovo(){
  document.getElementById("modal").style.display="flex";
  document.getElementById("mbox").innerHTML=`<h3>Novo Funcionário</h3>
    <div class="lbl">Nome</div><input id="fNome" placeholder="Nome completo">
    <div class="lbl">Login (usuário de acesso)</div><input id="fLogin" placeholder="Ex.: joao.silva">
    <div class="lbl">Senha</div><input id="fSenha" type="password" placeholder="Senha de acesso">
    <div class="lbl">Permissões</div>
    <div id="fPerms" style="background:#0f0d24;border:1px solid #514c96;border-radius:9px;padding:10px;margin-bottom:10px">
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:13px"><input type="checkbox" value="ver_aguardando"> Ver pedidos aguardando</label>
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:13px"><input type="checkbox" value="receber_pagamento"> Receber pagamento</label>
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:13px"><input type="checkbox" value="enviar_separacao"> Enviar para separação</label>
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:13px"><input type="checkbox" value="ver_separacao"> Ver fila de separação</label>
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:13px"><input type="checkbox" value="ver_pend"> Ver pendências</label>
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:13px"><input type="checkbox" value="ver_separado"> Ver separados</label>
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:13px"><input type="checkbox" value="conferir"> Conferir pedidos</label>
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:13px"><input type="checkbox" value="editar_pedido"> Editar pedidos</label>
      <label style="display:flex;gap:8px;align-items:center;font-size:13px"><input type="checkbox" value="admin"> Admin (tudo)</label>
    </div>
    <div class="lbl">Nível (referência)</div>
    <select id="fNivel">
      <option value="expedicao">Expedição</option>
      <option value="financeiro_atacado">Financeiro Atacado</option>
      <option value="vendedor">Vendedor</option>
      <option value="conferente">Conferente</option>
      <option value="gerente">Gerente</option>
      <option value="admin">Admin</option>
    </select>
    <div id="fMsg"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-mag" style="flex:1" onclick="salvarNovo()">💾 Salvar</button>
      <button class="btn btn-ghost" style="flex:1" onclick="fecharModal()">Cancelar</button>
    </div>`;
}

function abrirEditar(id){
  const f=funcs.find(x=>x.id===id); if(!f) return;
  const perms=f.permissoes||[f.nivel];
  const chk=(v)=>perms.includes(v)?'checked':'';
  document.getElementById("modal").style.display="flex";
  document.getElementById("mbox").innerHTML=`<h3>Editar — ${esc(f.nome)}</h3>
    <div class="lbl">Nome</div><input id="fNome" value="${esc(f.nome)}">
    <div class="lbl">Login</div><input id="fLogin" value="${esc(f.login||f.id)}">
    <div class="lbl">Nova senha (deixe em branco pra manter)</div><input id="fSenha" type="password" placeholder="Nova senha (opcional)">
    <div class="lbl">Permissões</div>
    <div id="fPerms" style="background:#0f0d24;border:1px solid #514c96;border-radius:9px;padding:10px;margin-bottom:10px">
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:13px"><input type="checkbox" value="ver_aguardando" ${chk('ver_aguardando')}> Ver pedidos aguardando</label>
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:13px"><input type="checkbox" value="receber_pagamento" ${chk('receber_pagamento')}> Receber pagamento</label>
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:13px"><input type="checkbox" value="enviar_separacao" ${chk('enviar_separacao')}> Enviar para separação</label>
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:13px"><input type="checkbox" value="ver_separacao" ${chk('ver_separacao')}> Ver fila de separação</label>
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:13px"><input type="checkbox" value="ver_pend" ${chk('ver_pend')}> Ver pendências</label>
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:13px"><input type="checkbox" value="ver_separado" ${chk('ver_separado')}> Ver separados</label>
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:13px"><input type="checkbox" value="conferir" ${chk('conferir')}> Conferir pedidos</label>
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:13px"><input type="checkbox" value="editar_pedido" ${chk('editar_pedido')}> Editar pedidos</label>
      <label style="display:flex;gap:8px;align-items:center;font-size:13px"><input type="checkbox" value="admin" ${chk('admin')}> Admin (tudo)</label>
    </div>
    <div class="lbl">Nível (referência)</div>
    <select id="fNivel">
      <option value="expedicao" ${f.nivel==='expedicao'?'selected':''}>Expedição</option>
      <option value="financeiro_atacado" ${f.nivel==='financeiro_atacado'?'selected':''}>Financeiro Atacado</option>
      <option value="vendedor" ${f.nivel==='vendedor'?'selected':''}>Vendedor</option>
      <option value="conferente" ${f.nivel==='conferente'?'selected':''}>Conferente</option>
      <option value="gerente" ${f.nivel==='gerente'?'selected':''}>Gerente</option>
      <option value="admin" ${f.nivel==='admin'?'selected':''}>Admin</option>
    </select>
    <div id="fMsg"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-mag" style="flex:1" onclick="salvarEditar('${id}')">💾 Salvar</button>
      <button class="btn btn-ghost" style="flex:1" onclick="fecharModal()">Cancelar</button>
    </div>`;
}

async function salvarNovo(){
  const nome=document.getElementById("fNome").value.trim();
  const senha=document.getElementById("fSenha").value;
  const nivel=document.getElementById("fNivel").value;
  const permissoes=[...document.querySelectorAll("#fPerms input:checked")].map(c=>c.value);
  if(!nome||!senha){ document.getElementById("fMsg").innerHTML=`<div class="err">Preencha nome e senha</div>`; return; }
  if(!permissoes.length){ document.getElementById("fMsg").innerHTML=`<div class="err">Selecione ao menos uma permissão</div>`; return; }
  try{
    const r=await fetch(B+"/api/funcionarios",{method:"POST",headers:{"Content-Type":"application/json","X-Auth-Token":b13GetSession()?.token||""},body:JSON.stringify({nome,login:document.getElementById("fLogin").value.trim().toLowerCase().replace(/\s+/g,""),senha,nivel,permissoes})});
    const j=await r.json();
    if(r.ok&&j.ok){ fecharModal(); msg=`<div class="ok">✅ Funcionário criado!</div>`; carregar(); }
    else document.getElementById("fMsg").innerHTML=`<div class="err">${esc(j.erro||"Erro")}</div>`;
  }catch(e){ document.getElementById("fMsg").innerHTML=`<div class="err">Erro de conexão</div>`; }
}

async function salvarEditar(id){
  const nome=document.getElementById("fNome").value.trim();
  const senha=document.getElementById("fSenha").value;
  const nivel=document.getElementById("fNivel").value;
  const login=document.getElementById("fLogin").value.trim().toLowerCase();
  const permissoes=[...document.querySelectorAll("#fPerms input:checked")].map(c=>c.value);
  if(!permissoes.length){ document.getElementById("fMsg").innerHTML=`<div class="err">Selecione ao menos uma permissão</div>`; return; }
  const body={nome,nivel,login,permissoes}; if(senha) body.senha=senha;
  try{
    const r=await fetch(B+"/api/funcionarios/"+id,{method:"PATCH",headers:{"Content-Type":"application/json","X-Auth-Token":b13GetSession()?.token||""},body:JSON.stringify(body)});
    const j=await r.json();
    if(r.ok&&j.ok){ fecharModal(); msg=`<div class="ok">✅ Funcionário atualizado!</div>`; carregar(); }
    else document.getElementById("fMsg").innerHTML=`<div class="err">${esc(j.erro||"Erro")}</div>`;
  }catch(e){ document.getElementById("fMsg").innerHTML=`<div class="err">Erro de conexão</div>`; }
}

async function toggleAtivo(id,ativo){
  if(!confirm(`${ativo?'Ativar':'Desativar'} este funcionário?`)) return;
  try{
    await fetch(B+"/api/funcionarios/"+id,{method:"PATCH",headers:{"Content-Type":"application/json","X-Auth-Token":b13GetSession()?.token||""},body:JSON.stringify({ativo})});
    carregar();
  }catch(e){}
}

document.getElementById("app").innerHTML=`<div class="top"><img src="${LOGO}"></div>`;
document.querySelector(".top img").src=LOGO;
if(logado) carregar(); else render();
</script>
</body>
</html>
